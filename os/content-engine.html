<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FluxAI OS™ | Motor de Conteúdo</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="./styles/os-theme.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --os-bg: #050505;
            --os-surface: #0a0a0a;
            --os-border: rgba(255,255,255,0.08);
            --os-primary: #a855f7;
            --os-accent-gradient: linear-gradient(135deg, #a855f7 0%, #7c3aed 100%);
            --os-text-muted: #888;
        }

        body { background: var(--os-bg); color: white; margin: 0; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        
        .os-main-content { margin-left: 260px; padding: 40px; min-height: 100vh; }
        
        .os-grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 40px; }
        
        .metric-card { 
            background: var(--os-surface); 
            border: 1px solid var(--os-border); 
            padding: 20px; 
            border-radius: 16px; 
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .metric-card:hover { border-color: rgba(168, 85, 247, 0.4); transform: translateY(-2px); box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        
        .pipeline-table { width: 100%; border-collapse: separate; border-spacing: 0 10px; }
        .pipeline-table th { text-align: left; padding: 15px; color: var(--os-text-muted); font-size: 0.65rem; text-transform: uppercase; letter-spacing: 1.5px; }
        .pipeline-table td { padding: 18px; background: #0d0d0d; border-top: 1px solid var(--os-border); border-bottom: 1px solid var(--os-border); }
        .pipeline-table tr td:first-child { border-left: 1px solid var(--os-border); border-radius: 12px 0 0 12px; }
        .pipeline-table tr td:last-child { border-right: 1px solid var(--os-border); border-radius: 0 12px 12px 0; }
        
        .status-badge { padding: 5px 12px; border-radius: 20px; font-size: 0.6rem; font-weight: 800; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); }
        
        .btn-ai { background: var(--os-accent-gradient); color: white; border: none; padding: 12px 24px; border-radius: 10px; cursor: pointer; font-weight: 700; display: flex; align-items: center; gap: 10px; font-size: 0.85rem; }
        .btn-ai:hover { filter: brightness(1.1); box-shadow: 0 0 20px rgba(168, 85, 247, 0.3); }

        .os-btn-secondary { background: rgba(255,255,255,0.03); border: 1px solid var(--os-border); color: white; padding: 12px 20px; border-radius: 10px; cursor: pointer; display: flex; align-items: center; gap: 8px; font-size: 0.8rem; font-weight: 600; }
        .os-btn-secondary:hover { background: rgba(255,255,255,0.08); }

        .os-select { background: #111; border: 1px solid var(--os-border); color: white; border-radius: 10px; padding: 10px 15px; outline: none; }
    </style>
</head>
<body class="os-dark-theme">
    <!-- ESTRUTURA DE NAVEGAÇÃO -->
    <div id="os-sidebar-container"></div>
    
    <main class="os-main-content">
        <div id="os-topbar-container"></div>

        <div class="os-content-wrapper" style="max-width: 1400px; margin: 0 auto;">
            <!-- HEADER OPERACIONAL -->
            <div style="display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 40px; border-bottom: 1px solid var(--os-border); padding-bottom: 30px;">
                <div>
                    <div style="display: flex; align-items: center; gap: 10px; margin-bottom: 10px;">
                        <span style="background: var(--os-primary); width: 12px; height: 12px; border-radius: 3px;"></span>
                        <span style="font-size: 0.7rem; font-weight: 800; color: var(--os-text-muted); text-transform: uppercase; letter-spacing: 2px;">Core Intelligence</span>
                    </div>
                    <h1 style="font-size: 2.8rem; font-weight: 900; margin: 0; letter-spacing: -1.5px; background: linear-gradient(to right, #fff 30%, #555 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">Motor de Conteúdo</h1>
                    <p style="color: var(--os-text-muted); margin: 8px 0 0 0; font-size: 1rem;">Orquestração de ativos de autoridade para o ecossistema FluxAI.</p>
                </div>
                
                <div style="display: flex; align-items: center; gap: 12px;">
                    <select id="project-filter" class="os-select" style="min-width: 240px; height: 48px;"></select>
                    
                    <button id="btn-ai-planner" class="btn-ai">
                        <i class="fa-solid fa-wand-magic-sparkles"></i> PLANEJAMENTO IA
                    </button>
                    
                    <button class="os-btn-secondary" style="height: 48px;" onclick="window.location.href='/os/flux-calendar.html'">
                        <i class="fa-solid fa-calendar-days"></i> CALENDÁRIO
                    </button>
                </div>
            </div>

            <!-- MÉTRICAS DE PRODUÇÃO -->
            <div id="os-metrics-grid" class="os-grid-4">
                <div id="metric-assets"></div>
                <div id="metric-approval"></div>
                <div id="metric-production"></div>
                <div id="metric-schedule"></div>
            </div>

            <!-- ESTEIRA DE PRODUÇÃO -->
            <div style="margin-top: 40px;">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                    <h3 style="margin: 0; font-size: 1.1rem; font-weight: 700;">Esteira Operacional</h3>
                    <div id="workflow-deadline" style="font-size: 0.7rem; color: var(--os-text-muted); font-weight: 600; background: rgba(255,255,255,0.03); padding: 6px 12px; border-radius: 6px;">DEADLINE: DIA 28</div>
                </div>
                
                <table class="pipeline-table">
                    <thead>
                        <tr>
                            <th>Ativo / Estratégia</th>
                            <th>Status</th>
                            <th>Prioridade</th>
                            <th>Plataforma</th>
                            <th>Aprovação</th>
                            <th>Ações</th>
                        </tr>
                    </thead>
                    <tbody id="pipeline-table-body">
                        <tr>
                            <td colspan="6" style="text-align: center; padding: 100px; color: var(--os-text-muted);">
                                <i class="fa-solid fa-circle-notch fa-spin"></i> Sincronizando dados mestre...
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <script type="module">
        import { OS_UI, OS_AUTH } from './js/os-core.js';
        import { getSupabase } from './services/supabase-client.js';

        async function boot() {
            try {
                // Injeção de dependências globais
                window.getSupabase = getSupabase;
                window.OS_UI = OS_UI;
                window.OS_AUTH = OS_AUTH;

                // Renderização da UI Base
                OS_UI.renderSidebar('content-engine', 'ADMIN');
                OS_UI.renderTopbar();

                const user = await OS_AUTH.check();
                if (!user) { window.location.href = '/os/login.html'; return; }

                // Carregar lógica operacional
                await import('./modules/content-engine/content-engine.js?v=' + Date.now());
                console.log('[FLUXAI OS] Motor Online.');

            } catch (err) {
                console.error('[BOOT ERROR]', err);
            }
        }

        boot();
    </script>
</body>
</html>
