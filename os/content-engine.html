<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FluxAI OS™ | Motor de Conteúdo</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/os/styles/os-theme.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --os-bg: #050505;
            --os-surface: #0a0a0a;
            --os-border: rgba(255,255,255,0.1);
            --os-primary: #a855f7;
            --os-accent-gradient: linear-gradient(135deg, #a855f7 0%, #7c3aed 100%);
            --os-text-muted: #888;
        }

        body { background: var(--os-bg); color: white; margin: 0; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        
        /* Layout Estruturado */
        .os-layout { display: flex; min-height: 100vh; }
        #os-sidebar-container { width: 260px; height: 100vh; position: fixed; left: 0; top: 0; background: #000; border-right: 1px solid var(--os-border); z-index: 1000; }
        .os-main-content { flex: 1; margin-left: 260px; padding: 40px; }
        
        /* Cards de Métricas Premium */
        .os-grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 40px; }
        .metric-card { 
            background: var(--os-surface); 
            border: 1px solid var(--os-border); 
            padding: 24px; 
            border-radius: 16px; 
            position: relative;
            overflow: hidden;
        }
        .metric-card::before { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 2px; background: var(--os-accent-gradient); opacity: 0.3; }
        .metric-label { font-size: 0.65rem; color: var(--os-text-muted); text-transform: uppercase; letter-spacing: 1.5px; font-weight: 800; margin-bottom: 8px; }
        .metric-value { font-size: 2.2rem; font-weight: 900; letter-spacing: -1px; }
        .metric-meta { font-size: 0.7rem; color: var(--os-text-muted); margin-top: 4px; }

        /* Tabela Operacional */
        .pipeline-table { width: 100%; border-collapse: separate; border-spacing: 0 12px; }
        .pipeline-table th { text-align: left; padding: 15px; color: var(--os-text-muted); font-size: 0.65rem; text-transform: uppercase; letter-spacing: 1.5px; }
        .pipeline-table td { padding: 20px; background: rgba(255,255,255,0.02); border-top: 1px solid var(--os-border); border-bottom: 1px solid var(--os-border); }
        .pipeline-table tr td:first-child { border-left: 1px solid var(--os-border); border-radius: 12px 0 0 12px; }
        .pipeline-table tr td:last-child { border-right: 1px solid var(--os-border); border-radius: 0 12px 12px 0; }
        
        .btn-ai { background: var(--os-accent-gradient); color: white; border: none; padding: 14px 28px; border-radius: 12px; cursor: pointer; font-weight: 800; display: flex; align-items: center; gap: 12px; font-size: 0.9rem; transition: all 0.3s; }
        .btn-ai:hover { transform: translateY(-2px); box-shadow: 0 10px 25px rgba(168, 85, 247, 0.4); }

        .os-select { background: #111; border: 1px solid var(--os-border); color: white; border-radius: 12px; padding: 12px 20px; outline: none; font-weight: 600; }
        
        /* Estado de Carga */
        #loading-overlay { position: fixed; inset: 0; background: #000; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: opacity 0.5s; }
        .spinner { width: 40px; height: 40px; border: 3px solid rgba(168, 85, 247, 0.1); border-top-color: var(--os-primary); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div id="loading-overlay">
        <div class="spinner"></div>
        <p style="color: var(--os-text-muted); margin-top: 20px; font-size: 0.8rem; letter-spacing: 2px;">SINCRONIZANDO FLUXAI OS™</p>
        <button id="btn-force-load" style="display:none; margin-top:20px; background:none; border:1px solid #333; color:#555; padding:8px 16px; border-radius:6px; cursor:pointer; font-size:0.7rem;">FORÇAR CARREGAMENTO</button>
    </div>

    <div class="os-layout">
        <div id="os-sidebar-container"></div>
        
        <main class="os-main-content">
            <div id="os-topbar-container"></div>

            <div class="os-content-wrapper" style="max-width: 1400px; margin: 0 auto;">
                <!-- HEADER -->
                <div style="display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 50px; padding-bottom: 30px; border-bottom: 1px solid var(--os-border);">
                    <div>
                        <div style="display: flex; align-items: center; gap: 10px; margin-bottom: 15px;">
                            <span style="background: var(--os-primary); width: 10px; height: 10px; border-radius: 2px; box-shadow: 0 0 10px var(--os-primary);"></span>
                            <span style="font-size: 0.7rem; font-weight: 800; color: var(--os-text-muted); text-transform: uppercase; letter-spacing: 3px;">Operational Intelligence</span>
                        </div>
                        <h1 style="font-size: 3.2rem; font-weight: 900; margin: 0; letter-spacing: -2px;">Motor de Conteúdo</h1>
                        <p style="color: var(--os-text-muted); margin-top: 10px; font-size: 1.1rem;">Gestão de ativos estratégicos para escala e autoridade.</p>
                    </div>
                    
                    <div style="display: flex; align-items: center; gap: 15px;">
                        <select id="project-filter" class="os-select" style="min-width: 260px;"></select>
                        <button id="btn-ai-planner" class="btn-ai">
                            <i class="fa-solid fa-wand-magic-sparkles"></i> PLANEJAMENTO IA
                        </button>
                    </div>
                </div>

                <!-- MÉTRICAS -->
                <div class="os-grid-4">
                    <div id="metric-assets" class="metric-card"></div>
                    <div id="metric-approval" class="metric-card"></div>
                    <div id="metric-production" class="metric-card"></div>
                    <div id="metric-schedule" class="metric-card"></div>
                </div>

                <!-- ESTEIRA -->
                <div style="margin-top: 20px;">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px;">
                        <h3 style="margin: 0; font-size: 1.2rem; font-weight: 800; letter-spacing: -0.5px;">Esteira de Produção</h3>
                        <div style="font-size: 0.65rem; color: var(--os-text-muted); background: rgba(255,255,255,0.03); padding: 8px 16px; border-radius: 8px; border: 1px solid var(--os-border); font-weight: 700;">PRODUÇÃO ATIVA: DIA 28</div>
                    </div>
                    
                    <table class="pipeline-table">
                        <thead>
                            <tr>
                                <th>Ativo Estratégico</th>
                                <th>Status</th>
                                <th>Prioridade</th>
                                <th>Plataforma</th>
                                <th>Aprovação</th>
                                <th>Ações</th>
                            </tr>
                        </thead>
                        <tbody id="pipeline-table-body">
                            <tr><td colspan="6" style="text-align:center; padding:100px; color:#444;">Aguardando sincronização mestre...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <script type="module">
        import { OS_UI, OS_AUTH } from '/os/js/os-core.js';
        import { getSupabase } from '/os/services/supabase-client.js';

        async function initSystem() {
            console.log('[BOOT] Iniciando Sequência Blindada...');
            
            // Timeout de segurança para o overlay
            setTimeout(() => { document.getElementById('btn-force-load').style.display = 'block'; }, 4000);

            try {
                // 1. Garantir Containers (Retentativas)
                let attempts = 0;
                while (!document.getElementById('os-sidebar-container') && attempts < 10) {
                    await new Promise(r => setTimeout(r, 100));
                    attempts++;
                }

                // 2. Injetar Globais
                window.getSupabase = getSupabase;
                window.OS_UI = OS_UI;
                window.OS_AUTH = OS_AUTH;

                // 3. Renderizar UI com Proteção
                if (OS_UI) {
                    OS_UI.renderSidebar('content-engine', 'ADMIN');
                    OS_UI.renderTopbar();
                }

                // 4. Autenticação
                const user = await OS_AUTH.check();
                if (!user) { window.location.href = '/os/login.html'; return; }

                // 5. Carregar Módulo de Conteúdo com Cache Busting
                await import(`/os/modules/content-engine/content-engine.js?v=${Date.now()}`);
                
                // 6. Finalizar Carga
                setTimeout(() => {
                    document.getElementById('loading-overlay').style.opacity = '0';
                    setTimeout(() => { document.getElementById('loading-overlay').style.display = 'none'; }, 500);
                }, 800);

            } catch (err) {
                console.error('[FATAL ERROR]', err);
                // Fallback de emergência para não deixar a tela preta
                document.getElementById('loading-overlay').innerHTML = `<div style="padding:40px; text-align:center;">
                    <h2 style="color:#ff4444;">Erro de Inicialização</h2>
                    <p>${err.message}</p>
                    <button onclick="location.reload()" class="btn-ai" style="margin:20px auto;">TENTAR NOVAMENTE</button>
                </div>`;
            }
        }

        document.getElementById('btn-force-load').onclick = () => {
            document.getElementById('loading-overlay').style.display = 'none';
        };

        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', initSystem);
        } else {
            initSystem();
        }
    </script>
</body>
</html>
