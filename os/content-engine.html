<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FluxAI OS™ | Motor de Conteúdo</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/os/styles/os-theme.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --os-bg: #050505;
            --os-surface: #0a0a0a;
            --os-border: rgba(255,255,255,0.1);
            --os-primary: #a855f7;
            --os-accent-gradient: linear-gradient(135deg, #a855f7 0%, #7c3aed 100%);
            --os-text-muted: #888;
        }

        body { background: var(--os-bg); color: white; margin: 0; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        
        /* Sidebar Fixa e Blindada */
        .os-sidebar { width: 260px; height: 100vh; position: fixed; left: 0; top: 0; background: #000; border-right: 1px solid var(--os-border); padding: 30px 20px; box-sizing: border-box; }
        .os-logo { font-weight: 900; font-size: 1.2rem; letter-spacing: -1px; margin-bottom: 40px; display: flex; align-items: center; gap: 10px; }
        .os-logo span { color: var(--os-primary); }
        .os-nav-item { display: flex; align-items: center; gap: 12px; padding: 12px 15px; color: var(--os-text-muted); text-decoration: none; border-radius: 8px; margin-bottom: 5px; font-size: 0.9rem; font-weight: 600; transition: all 0.2s; }
        .os-nav-item:hover { background: rgba(255,255,255,0.05); color: white; }
        .os-nav-item.active { background: var(--os-accent-gradient); color: white; }

        .os-main-content { margin-left: 260px; padding: 40px; min-height: 100vh; }
        
        .os-grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 40px; }
        .metric-card { background: var(--os-surface); border: 1px solid var(--os-border); padding: 24px; border-radius: 16px; position: relative; }
        .metric-card::before { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 2px; background: var(--os-accent-gradient); opacity: 0.3; }
        .metric-label { font-size: 0.65rem; color: var(--os-text-muted); text-transform: uppercase; letter-spacing: 1.5px; font-weight: 800; margin-bottom: 8px; }
        .metric-value { font-size: 2rem; font-weight: 900; letter-spacing: -1px; }

        .pipeline-table { width: 100%; border-collapse: separate; border-spacing: 0 10px; }
        .pipeline-table th { text-align: left; padding: 15px; color: var(--os-text-muted); font-size: 0.65rem; text-transform: uppercase; letter-spacing: 1.5px; }
        .pipeline-table td { padding: 20px; background: rgba(255,255,255,0.02); border-top: 1px solid var(--os-border); border-bottom: 1px solid var(--os-border); }
        .pipeline-table tr td:first-child { border-left: 1px solid var(--os-border); border-radius: 12px 0 0 12px; }
        .pipeline-table tr td:last-child { border-right: 1px solid var(--os-border); border-radius: 0 12px 12px 0; }
        
        .btn-ai { background: var(--os-accent-gradient); color: white; border: none; padding: 14px 28px; border-radius: 12px; cursor: pointer; font-weight: 800; display: flex; align-items: center; gap: 12px; }
        .os-select { background: #111; border: 1px solid var(--os-border); color: white; border-radius: 12px; padding: 12px 20px; outline: none; }

        #loading-overlay { position: fixed; inset: 0; background: #000; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: opacity 0.5s; }
        .spinner { width: 30px; height: 30px; border: 2px solid rgba(168, 85, 247, 0.1); border-top-color: var(--os-primary); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div id="loading-overlay">
        <div class="spinner"></div>
        <p style="color: #444; margin-top: 20px; font-size: 0.7rem; letter-spacing: 2px; font-weight: 800;">BOOTING FLUXAI OS™</p>
    </div>

    <!-- SIDEBAR ESTÁTICA (BLINDADA CONTRA ERROS JS) -->
    <aside class="os-sidebar">
        <div class="os-logo">FLUXAI <span>OS™</span></div>
        <nav>
            <a href="/os/workspace.html" class="os-nav-item"><i class="fa-solid fa-house"></i> Dashboard</a>
            <a href="/os/content-engine.html" class="os-nav-item active"><i class="fa-solid fa-wand-magic-sparkles"></i> Motor de Conteúdo</a>
            <a href="/os/crm-intelligence.html" class="os-nav-item"><i class="fa-solid fa-users"></i> CRM Intelligence</a>
            <a href="/os/analytics.html" class="os-nav-item"><i class="fa-solid fa-chart-line"></i> Analytics</a>
            <a href="/os/governance.html" class="os-nav-item"><i class="fa-solid fa-shield-halved"></i> Governança</a>
        </nav>
    </aside>

    <main class="os-main-content">
        <div style="max-width: 1400px; margin: 0 auto;">
            <!-- HEADER -->
            <div style="display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 50px; padding-bottom: 30px; border-bottom: 1px solid var(--os-border);">
                <div>
                    <h1 style="font-size: 3rem; font-weight: 900; margin: 0; letter-spacing: -2px;">Motor de Conteúdo</h1>
                    <p style="color: var(--os-text-muted); margin-top: 10px; font-size: 1rem;">Orquestração estratégica para ativos de autoridade.</p>
                </div>
                
                <div style="display: flex; align-items: center; gap: 15px;">
                    <select id="project-filter" class="os-select" style="min-width: 240px;"></select>
                    <button id="btn-ai-planner" class="btn-ai">
                        <i class="fa-solid fa-wand-magic-sparkles"></i> PLANEJAMENTO IA
                    </button>
                </div>
            </div>

            <!-- MÉTRICAS -->
            <div class="os-grid-4">
                <div id="metric-assets" class="metric-card"></div>
                <div id="metric-approval" class="metric-card"></div>
                <div id="metric-production" class="metric-card"></div>
                <div id="metric-schedule" class="metric-card"></div>
            </div>

            <!-- ESTEIRA -->
            <div style="margin-top: 20px;">
                <h3 style="margin-bottom: 25px; font-size: 1.2rem; font-weight: 800;">Esteira de Produção</h3>
                <table class="pipeline-table">
                    <thead>
                        <tr>
                            <th>Ativo Estratégico</th>
                            <th>Status</th>
                            <th>Prioridade</th>
                            <th>Plataforma</th>
                            <th>Aprovação</th>
                            <th>Ações</th>
                        </tr>
                    </thead>
                    <tbody id="pipeline-table-body">
                        <tr><td colspan="6" style="text-align:center; padding:100px; color:#444;">Aguardando dados...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <script type="module">
        import { OS_UI, OS_AUTH } from '/os/js/os-core.js';
        import { getSupabase } from '/os/services/supabase-client.js';

        async function init() {
            try {
                // Injetar globais
                window.getSupabase = getSupabase;
                window.OS_UI = OS_UI;
                window.OS_AUTH = OS_AUTH;

                // 1. Verificar Login
                const user = await OS_AUTH.check();
                if (!user) { window.location.href = '/os/login.html'; return; }

                // 2. Carregar Motor Operacional (Onde estão os dados)
                await import(`/os/modules/content-engine/content-engine.js?v=${Date.now()}`);
                
                // 3. Remover Overlay
                document.getElementById('loading-overlay').style.display = 'none';

            } catch (err) {
                console.error('Erro de Boot:', err);
                document.getElementById('loading-overlay').innerHTML = `<p style="color:red;">Erro: ${err.message}</p>`;
            }
        }

        init();
    </script>
</body>
</html>
