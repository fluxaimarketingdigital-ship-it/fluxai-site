<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FluxAI OS™ | Motor de Conteúdo</title>
    <link rel="stylesheet" href="/src/styles/os/interface.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        .os-tab-btn { background: transparent; border: 1px solid var(--os-border); color: var(--os-text-muted); padding: 10px 20px; font-weight: 700; cursor: pointer; border-radius: 4px; transition: 0.2s; font-size: 0.8rem; }
        .os-tab-btn.active { background: rgba(107, 122, 69, 0.1); color: var(--os-primary); border-color: var(--os-primary); }
        
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 10px; margin-top: 20px; }
        .calendar-day { background: var(--os-card); border: 1px solid var(--os-border); border-radius: 4px; min-height: 120px; padding: 12px; position: relative; }
        .day-number { font-size: 0.75rem; font-weight: 800; color: var(--os-text-muted); margin-bottom: 8px; }
        .calendar-event { background: rgba(107, 122, 69, 0.1); border-left: 3px solid var(--os-primary); padding: 6px; border-radius: 2px; font-size: 0.65rem; margin-bottom: 5px; cursor: pointer; color: #eee; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        .pipeline-table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        .pipeline-table th { text-align: left; padding: 15px; font-size: 0.65rem; text-transform: uppercase; letter-spacing: 1.5px; color: var(--os-text-muted); border-bottom: 1px solid var(--os-border); }
        .pipeline-table td { padding: 15px; font-size: 0.85rem; border-bottom: 1px solid var(--os-border); color: var(--os-text-main); }
        
        .btn-ai { background: var(--os-primary); color: white; border: none; padding: 0 20px; border-radius: 4px; cursor: pointer; font-weight: 800; display: flex; align-items: center; gap: 10px; font-size: 0.75rem; height: 40px; }
        .os-select { background: var(--os-sidebar); border: 1px solid var(--os-border); color: white; border-radius: 4px; padding: 0 15px; outline: none; height: 40px; font-size: 0.85rem; }

        #loading-overlay { position: fixed; inset: 0; background: #000; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .spinner { width: 30px; height: 30px; border: 2px solid rgba(107, 122, 69, 0.1); border-top-color: var(--os-primary); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body class="os-mode">
    <div id="loading-overlay">
        <div class="spinner"></div>
        <p style="color: #444; margin-top: 20px; font-size: 0.6rem; letter-spacing: 3px; font-weight: 800; text-transform: uppercase;">Booting Content Engine™</p>
    </div>

    <div class="os-shell">
        <aside class="os-sidebar"></aside>

        <div class="os-viewport-wrapper" style="display: flex; flex-direction: column; width: 100%;">
            <header class="os-topbar"></header>

            <main class="os-viewport">
                <div class="os-page-title" style="display: flex; justify-content: space-between; align-items: flex-end;">
                    <div>
                        <h1>Motor de Conteúdo</h1>
                        <p>Orquestração estratégica para ativos de autoridade institucional.</p>
                    </div>
                    <div style="display: flex; gap: 10px;">
                        <select id="project-filter" class="os-select"></select>
                        <button id="btn-ai-planner" class="btn-ai">
                            <i class="fa-solid fa-wand-magic-sparkles"></i> PLANEJAMENTO IA
                        </button>
                    </div>
                </div>

                <div class="os-widget-grid" style="margin-bottom: 40px;">
                    <div class="os-widget" id="metric-assets" style="grid-column: span 3;"></div>
                    <div class="os-widget" id="metric-approval" style="grid-column: span 3;"></div>
                    <div class="os-widget" id="metric-production" style="grid-column: span 3;"></div>
                    <div class="os-widget" id="metric-schedule" style="grid-column: span 3;"></div>
                </div>

                <div class="os-tabs" style="display: flex; gap: 10px; margin-bottom: 30px;">
                    <button class="os-tab-btn active" onclick="window.switchTab('esteira')"><i class="fa-solid fa-list-check"></i> Esteira Operacional</button>
                    <button class="os-tab-btn" onclick="window.switchTab('calendario')"><i class="fa-solid fa-calendar-days"></i> Calendário Estratégico</button>
                </div>

                <div id="tab-esteira" class="os-widget" style="padding: 0; background: transparent; border: none;">
                    <table class="pipeline-table">
                        <thead>
                            <tr>
                                <th>Ativo Estratégico</th>
                                <th>Status</th>
                                <th>Prioridade</th>
                                <th>Plataforma</th>
                                <th>Aprovação</th>
                                <th style="text-align: right;">Ações</th>
                            </tr>
                        </thead>
                        <tbody id="pipeline-table-body">
                            <tr><td colspan="6" style="text-align:center; padding:100px; color:#444;">Sincronizando ativos...</td></tr>
                        </tbody>
                    </table>
                </div>

                <div id="tab-calendario" style="display: none;">
                    <div class="calendar-grid" id="calendar-body">
                        <!-- Preenchido via JS -->
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script type="module">
        import { OS_UI, OS_AUTH } from '/os/js/os-core.js';
        import { getSupabase } from '/os/services/supabase-client.js';

        async function bootContentEngine() {
            console.log('[BOOT] content-engine.html started');
            try {
                // Injetar globais para o módulo legacy
                window.getSupabase = getSupabase;
                window.OS_UI = OS_UI;
                window.OS_AUTH = OS_AUTH;

                const user = await OS_AUTH.check('OPERATOR');
                if (!user) return;

                OS_UI.renderSidebar('content-engine', user.role);
                await OS_UI.renderTopbar();

                await import(`/os/modules/content-engine/content-engine.js?v=${Date.now()}`);
                
                document.getElementById('loading-overlay').style.display = 'none';
            } catch (err) {
                console.error('Erro de Boot:', err);
                document.getElementById('loading-overlay').innerHTML = `<p style="color:var(--os-danger); font-size:0.8rem; font-weight:800;">CRITICAL BOOT ERROR: ${err.message}</p>`;
            }
        }

        bootContentEngine();
    </script>
</body>
</html>
