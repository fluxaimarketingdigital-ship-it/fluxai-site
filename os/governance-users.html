<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FluxAI OS™ | Gestão de Usuários</title>
    <link rel="stylesheet" href="/src/styles/os/interface.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
    <style>
        .user-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; margin-top: 20px; }
        .user-card { background: var(--os-card); border: 1px solid var(--os-border); border-radius: 4px; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .user-header { display: flex; align-items: center; gap: 15px; }
        .user-avatar { width: 40px; height: 40px; background: var(--os-primary); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 0.9rem; }
        .user-info h3 { font-size: 0.9rem; margin-bottom: 2px; }
        .user-info p { font-size: 0.75rem; color: var(--os-text-muted); }
        .role-selector { display: flex; gap: 5px; }
        .role-btn { flex: 1; padding: 8px; font-size: 0.65rem; font-weight: 700; border: 1px solid var(--os-border); background: rgba(255,255,255,0.02); color: var(--os-text-muted); cursor: pointer; border-radius: 2px; text-transform: uppercase; transition: all 0.2s; }
        .role-btn.active { border-color: var(--os-primary); color: var(--os-primary); background: rgba(77, 148, 255, 0.1); }
        .role-btn:hover:not(.active) { background: rgba(255,255,255,0.05); }
    </style>
</head>
<body class="os-mode">

    <div class="os-shell">
        <aside class="os-sidebar"></aside>

        <div class="os-viewport-wrapper" style="display: flex; flex-direction: column; width: 100%;">
            <header class="os-topbar"></header>

            <main class="os-viewport">
                <div class="os-page-title">
                    <h1>Gestão de Identidades</h1>
                    <p>Controle de níveis de autorização e governança multiusuário.</p>
                </div>

                <div id="users-container" class="user-grid">
                    <!-- Injetado via JS -->
                </div>
            </main>
        </div>
    </div>

    <script type="module">
        import { OS_UI, OS_AUTH } from './js/os-core.js';
        import { getSupabase } from './services/supabase-client.js';
        
        async function initPage() {
            const user = await OS_AUTH.check('ADMIN');
            if (!user) return;

            OS_UI.renderSidebar('governance-users', user.role);
            await OS_UI.renderTopbar();

            await renderUsers();
        }

        const getMockUsers = () => {
            let mock = localStorage.getItem('fluxai_mock_users');
            if (!mock) {
                const initialMock = [
                    { id: 'u1', full_name: 'Admin FluxAI', email: 'admin@fluxai.com', role: 'ADMIN' },
                    { id: 'u2', full_name: 'Kassia Gomes', email: 'kassia@fluxai.com', role: 'OPERATOR' },
                    { id: 'u3', full_name: 'Maria Aparecida', email: 'maria.nutri@gmail.com', role: 'CLIENT' }
                ];
                localStorage.setItem('fluxai_mock_users', JSON.stringify(initialMock));
                return initialMock;
            }
            return JSON.parse(mock);
        };

        const saveMockUsers = (users) => {
            localStorage.setItem('fluxai_mock_users', JSON.stringify(users));
        };

        const renderUsers = async () => {
            const container = document.getElementById('users-container');
            const supabase = getSupabase();
            let users = [];

            if (supabase) {
                try {
                    const { data, error } = await supabase
                        .from('profiles')
                        .select('*')
                        .order('full_name');
                    
                    if (error) throw error;
                    users = data || [];
                } catch (e) {
                    console.warn('[GOVERNANCE] Erro ao carregar Supabase. Usando local mock.', e);
                    users = getMockUsers();
                }
            } else {
                users = getMockUsers();
            }

            container.innerHTML = '';
            users.forEach(u => {
                const initials = u.full_name ? u.full_name.split(' ').map(n => n[0]).join('').substring(0,2).toUpperCase() : '??';
                const card = document.createElement('div');
                card.className = 'user-card';
                card.innerHTML = `
                    <div class="user-header">
                        <div class="user-avatar">${initials}</div>
                        <div class="user-info">
                            <h3>${u.full_name || 'Usuário Sem Nome'}</h3>
                            <p>${u.email}</p>
                        </div>
                    </div>
                    <div class="role-selector">
                        <button class="role-btn ${u.role === 'ADMIN' ? 'active' : ''}" onclick="window.updateRole('${u.id}', 'ADMIN')">Admin</button>
                        <button class="role-btn ${u.role === 'OPERATOR' ? 'active' : ''}" onclick="window.updateRole('${u.id}', 'OPERATOR')">Operador</button>
                        <button class="role-btn ${u.role === 'CLIENT' ? 'active' : ''}" onclick="window.updateRole('${u.id}', 'CLIENT')">Cliente</button>
                    </div>
                `;
                container.appendChild(card);
            });
        };

        window.updateRole = async (userId, newRole) => {
            const supabase = getSupabase();
            const btn = event.target;
            const originalText = btn.innerText;
            
            btn.innerText = '...';
            
            if (supabase && !userId.startsWith('u')) {
                try {
                    const { error } = await supabase
                        .from('profiles')
                        .update({ role: newRole })
                        .eq('id', userId);

                    if (error) throw error;

                    await supabase.from('audit_logs').insert({
                        action: `Alterado cargo de usuário para ${newRole}`,
                        module: 'governance'
                    });
                } catch (error) {
                    alert('Erro ao atualizar no banco de dados: ' + error.message);
                    btn.innerText = originalText;
                    return;
                }
            } else {
                // Mock update
                const mockUsers = getMockUsers();
                const userIndex = mockUsers.findIndex(u => u.id === userId);
                if (userIndex !== -1) {
                    mockUsers[userIndex].role = newRole;
                    saveMockUsers(mockUsers);
                }
            }
            
            await renderUsers();
        };

        initPage();
    </script>
</body>
</html>
