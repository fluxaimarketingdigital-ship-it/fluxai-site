<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FluxAI OS™ | Gestão de Identidades</title>
    <link rel="stylesheet" href="./styles/interface.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" integrity="sha384-PPIZEGYM1v8zp5Py7UjFb79S58UeqCL9pYVnVPURKEqvioPROaVAJKKLzvH2rDnI" crossorigin="anonymous" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
    <style>
        .governance-header-actions {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 25px;
        }
        .btn-add-user {
            background: linear-gradient(135deg, var(--os-primary) 0%, #a855f7 100%);
            color: #000;
            font-weight: 800;
            padding: 12px 20px;
            border-radius: 6px;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.8rem;
            letter-spacing: 1px;
            text-transform: uppercase;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(168, 85, 247, 0.2);
        }
        .btn-add-user:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(168, 85, 247, 0.4);
            opacity: 0.95;
        }
        .user-grid { 
            display: flex; 
            flex-direction: column;
            gap: 10px; 
            margin-top: 20px; 
        }
        .user-card { 
            background: var(--os-sidebar); 
            border: 1px solid var(--os-border); 
            border-radius: 6px; 
            display: flex; 
            flex-direction: column; 
            position: relative;
            overflow: hidden;
            transition: all 0.3s ease;
        }
        .user-card:hover {
            border-color: rgba(142, 158, 104, 0.4);
        }
        .user-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 3px;
            height: 100%;
            background: var(--os-border);
            z-index: 2;
        }
        .user-card.role-admin::before { background: #a855f7; }
        .user-card.role-operator::before { background: #f59e0b; }
        .user-card.role-client::before { background: var(--os-primary); }
        
        .user-card-header {
            display: grid;
            grid-template-columns: 250px 1fr 200px 50px;
            align-items: center;
            padding: 15px 20px;
            cursor: pointer;
            gap: 15px;
        }
        
        .user-card-body {
            display: none;
            padding: 20px;
            border-top: 1px solid rgba(255,255,255,0.05);
            background: rgba(0,0,0,0.2);
        }
        
        .user-card.expanded .user-card-body {
            display: block;
        }
        
        .user-card.expanded .toggle-icon {
            transform: rotate(180deg);
        }

        .user-header { display: flex; align-items: center; gap: 15px; }
        .user-avatar { 
            width: 36px; 
            height: 36px; 
            border-radius: 50%; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-weight: 800; 
            font-size: 0.85rem; 
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--os-border);
            color: #fff;
        }
        .user-card.role-admin .user-avatar { border-color: rgba(168, 85, 247, 0.4); color: #c084fc; background: rgba(168, 85, 247, 0.1); }
        .user-card.role-operator .user-avatar { border-color: rgba(245, 158, 11, 0.4); color: #fbbf24; background: rgba(245, 158, 11, 0.1); }
        .user-card.role-client .user-avatar { border-color: rgba(142, 158, 104, 0.4); color: var(--os-primary); background: rgba(142, 158, 104, 0.1); }

        .user-info h3 { font-size: 0.9rem; margin-bottom: 2px; font-weight: 700; color: #fff; }
        .user-info p { font-size: 0.7rem; color: var(--os-text-muted); font-family: 'JetBrains Mono', monospace; }
        
        .role-badge {
            font-size: 0.55rem;
            font-weight: 800;
            padding: 3px 8px;
            border-radius: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            display: inline-block;
        }
        .role-badge.admin { background: rgba(168, 85, 247, 0.15); color: #c084fc; border: 1px solid rgba(168, 85, 247, 0.3); }
        .role-badge.operator { background: rgba(245, 158, 11, 0.15); color: #fbbf24; border: 1px solid rgba(245, 158, 11, 0.3); }
        .role-badge.client { background: rgba(142, 158, 104, 0.15); color: var(--os-primary); border: 1px solid rgba(142, 158, 104, 0.3); }

        /* Credenciais e Senha */
        .credentials-box {
            background: rgba(0, 0, 0, 0.25);
            border: 1px solid var(--os-border);
            border-radius: 6px;
            padding: 12px 15px;
            font-size: 0.75rem;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .credential-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .credential-label {
            color: var(--os-text-muted);
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .credential-value {
            font-family: 'JetBrains Mono', monospace;
            color: #fff;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .btn-credential-action {
            background: none;
            border: none;
            color: var(--os-text-muted);
            cursor: pointer;
            font-size: 0.8rem;
            padding: 2px;
            transition: color 0.2s;
        }
        .btn-credential-action:hover {
            color: var(--os-primary);
        }

        /* Grade de Permissões */
        .permissions-section {
            border-top: 1px solid var(--os-border);
            padding-top: 15px;
        }
        .permissions-title {
            font-size: 0.7rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--os-text-muted);
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .permissions-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
        }
        .permission-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.7rem;
            color: #ccc;
            cursor: pointer;
            padding: 6px 8px;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.04);
            border-radius: 4px;
            transition: all 0.2s ease;
        }
        .permission-item:hover {
            background: rgba(255, 255, 255, 0.05);
            border-color: rgba(142, 158, 104, 0.2);
        }
        .permission-item input {
            accent-color: var(--os-primary);
            cursor: pointer;
        }
        .permission-item.active {
            color: #fff;
            border-color: rgba(142, 158, 104, 0.3);
            background: rgba(142, 158, 104, 0.05);
        }

        /* Ações do Card */
        .card-actions {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 20px;
            justify-content: flex-end;
            border-top: 1px solid var(--os-border);
            padding-top: 15px;
        }
        .btn-card-action {
            flex: 0 1 auto;
            padding: 10px 15px;
            font-size: 0.65rem;
            font-weight: 700;
            border-radius: 4px;
            border: 1px solid var(--os-border);
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            transition: all 0.2s ease;
        }
        .btn-card-reset {
            background: rgba(245, 158, 11, 0.05);
            color: #fbbf24;
            border-color: rgba(245, 158, 11, 0.2);
        }
        .btn-card-reset:hover {
            background: rgba(245, 158, 11, 0.15);
            border-color: rgba(245, 158, 11, 0.4);
        }
        .btn-card-delete {
            background: rgba(239, 68, 68, 0.05);
            color: #f87171;
            border-color: rgba(239, 68, 68, 0.2);
            max-width: 40px;
        }
        .btn-card-delete:hover {
            background: rgba(239, 68, 68, 0.15);
            border-color: rgba(239, 68, 68, 0.4);
        }

        /* Glassmorphism Modal */
        .os-modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            padding: 20px;
            animation: fadeIn 0.3s ease;
        }
        .os-modal-content {
            background: var(--os-sidebar);
            border: 1px solid var(--os-border);
            border-radius: 8px;
            width: 100%;
            max-width: 460px;
            padding: 35px;
            position: relative;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
            animation: slideUp 0.3s ease;
        }
        .os-modal-close {
            position: absolute;
            top: 20px;
            right: 20px;
            background: none;
            border: none;
            color: var(--os-text-muted);
            font-size: 1.2rem;
            cursor: pointer;
            transition: color 0.2s;
        }
        .os-modal-close:hover { color: #fff; }
        
        .form-group { margin-bottom: 20px; }
        .form-group label { 
            display: block; 
            font-size: 0.65rem; 
            text-transform: uppercase; 
            letter-spacing: 1px; 
            color: var(--os-text-muted); 
            margin-bottom: 8px; 
        }
        .form-control { 
            width: 100%; 
            padding: 12px 15px; 
            background: rgba(255,255,255,0.03); 
            border: 1px solid var(--os-border); 
            border-radius: 4px; 
            color: #fff; 
            font-size: 0.85rem; 
            transition: all 0.3s; 
        }
        .form-control:focus { 
            outline: none; 
            border-color: var(--os-primary); 
            background: rgba(255,255,255,0.06); 
        }
        
        /* Notificações Toast */
        .toast-notification {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: rgba(142, 158, 104, 0.95);
            backdrop-filter: blur(5px);
            color: #000;
            padding: 12px 20px;
            border-radius: 4px;
            font-weight: 800;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            z-index: 2000;
            display: flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            animation: slideIn 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        @keyframes slideIn { from { transform: translateX(50px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    </style>

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="../assets/icons/favicon-os.png" />
    <link rel="shortcut icon" href="../assets/icons/favicon-os.png" type="image/x-icon" />
    <link rel="apple-touch-icon" href="../assets/icons/favicon-os.png" />
</head>
<body class="os-mode">

    <div class="os-shell">
        <aside class="os-sidebar"></aside>

        <div class="os-viewport-wrapper" style="display: flex; flex-direction: column; width: 100%;">
            <header class="os-topbar"></header>

            <main class="os-viewport">
                <div class="governance-header-actions">
                    <div class="os-page-title" style="margin: 0;">
                        <h1>Gestão de Identidades</h1>
                        <p>Controle de níveis de autorização, chaves de segurança e governança multiusuário.</p>
                    </div>
                    <button class="btn-add-user" id="btnAddUser">
                        <i class="fa-solid fa-user-plus"></i> Cadastrar Colaborador
                    </button>
                </div>

                <div id="users-container" class="user-grid">
                    <!-- Injetado via JS -->
                </div>
            </main>
        </div>
    </div>

    <!-- Modal Cadastrar Colaborador -->
    <div id="addUserModal" class="os-modal">
        <div class="os-modal-content">
            <button class="os-modal-close" id="btnCloseModal">&times;</button>
            <div style="margin-bottom: 25px;">
                <h2 style="font-size: 1.1rem; color: #fff; margin-bottom: 5px;">Cadastrar Colaborador</h2>
                <p style="color: var(--os-text-muted); font-size: 0.75rem;">Adicione operadores ou administradores no ecossistema.</p>
            </div>
            <form id="addUserForm">
                <div class="form-group">
                    <label>Nome Completo</label>
                    <input type="text" id="newFullName" class="form-control" placeholder="Ex: Kassia Gomes" required />
                </div>
                <div class="form-group">
                    <label>E-mail (Login Operacional)</label>
                    <input type="email" id="newEmail" class="form-control" placeholder="exemplo@fluxai.com" required />
                </div>
                <div class="form-group">
                    <label>Cargo Operacional (Nível de Acesso)</label>
                    <select id="newRole" class="form-control" style="background: #111; cursor: pointer;">
                        <option value="OPERATOR">Operador (Acesso a Módulos Selecionados)</option>
                        <option value="ADMIN">Administrador (Controle Total)</option>
                    </select>
                </div>
                <div class="form-group" style="margin-bottom: 30px;">
                    <label>Senha Provisória Padrão</label>
                    <input type="text" class="form-control" value="fluxai@2026" readonly style="font-family: 'JetBrains Mono', monospace; opacity: 0.6;" />
                    <span style="font-size: 0.6rem; color: var(--os-text-muted); display: block; margin-top: 5px;">O colaborador deverá alterar a senha no primeiro acesso à plataforma.</span>
                </div>
                
                <button type="submit" class="btn-add-user" style="width: 100%; justify-content: center; padding: 14px;">
                    ATIVAR COLABORADOR <i class="fa-solid fa-check"></i>
                </button>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.106.2/dist/umd/supabase.min.js" integrity="sha384-4Cjkyy4cE1EgIS0C+Y3xzGmJ2noQFRRU91yKAW8IxtPfVtbQXPMqadSc3sYnjwou" crossorigin="anonymous"></script>
    <script type="module">
        import { OS_UI, OS_AUTH } from './js/os-core.js';
        import { getSupabase } from './services/supabase-client.js';
        
        const MODULES_METADATA = [
            { id: 'command-center', label: 'Centro de Comando' },
            { id: 'onboarding', label: 'Onboarding Estratégico' },
            { id: 'content-engine', label: 'Motor de Conteúdo' },
            { id: 'crm-intelligence', label: 'Inteligência de CRM' },
            { id: 'analytics', label: 'Análise de Dados' },
            { id: 'automation-hub', label: 'Central de Automação' },
            { id: 'client-portal', label: 'Portal do Cliente' },
            { id: 'contracts-finance', label: 'Contratos & Financeiro' },
            { id: 'governance-users', label: 'Gestão de Usuários' }
        ];

        async function initPage() {
            const user = await OS_AUTH.check('ADMIN');
            if (!user) return;

            OS_UI.renderSidebar('governance-users', user.role);
            await OS_UI.renderTopbar();

            // Configurar Modal
            const modal = document.getElementById('addUserModal');
            document.getElementById('btnAddUser').onclick = () => modal.style.display = 'flex';
            document.getElementById('btnCloseModal').onclick = () => modal.style.display = 'none';
            modal.onclick = (e) => { if(e.target === modal) modal.style.display = 'none'; };

            document.getElementById('addUserForm').onsubmit = handleAddUser;

            await renderUsers();
        }

        const getMockUsers = () => {
            let mock = JSON.parse(localStorage.getItem('fluxai_mock_users'));
            if (!mock || mock.some(u => u.id === 'u3' && u.email === 'maria.nutri@gmail.com')) {
                const initialMock = [
                    { id: 'u1', full_name: 'Admin FluxAI', email: 'admin@fluxai.com', password: 'fluxai@2026', role: 'ADMIN', needsPasswordChange: false, permissions: ['command-center', 'content-engine', 'crm-intelligence', 'analytics', 'automation-hub', 'contracts-finance', 'client-portal', 'governance-users'] },
                    { id: 'u2', full_name: 'Kassia Gomes', email: 'kassia@fluxai.com', password: 'fluxai@2026', role: 'OPERATOR', needsPasswordChange: false, permissions: ['command-center', 'content-engine', 'crm-intelligence', 'analytics', 'automation-hub'] }
                ];
                localStorage.setItem('fluxai_mock_users', JSON.stringify(initialMock));
                return initialMock;
            }
            return mock;
        };

        const saveMockUsers = (users) => {
            localStorage.setItem('fluxai_mock_users', JSON.stringify(users));
        };

        const fetchUsers = async () => {
            try {
                const supabase = getSupabase();
                if (supabase) {
                    const { data, error } = await supabase.from('governance_users').select('*');
                    if (!error && data && data.length > 0) {
                        return data.map(u => ({
                            id: u.id, full_name: u.name, email: u.email, password: 'fluxai@2026', role: u.role, permissions: u.permissions || []
                        }));
                    }
                }
            } catch (e) {
                console.warn('[GOV] Fallback local para usuários', e);
            }
            return getMockUsers();
        };

        // Renderização dos Usuários com Grid e Grid de Permissões
        const renderUsers = async () => {
            const container = document.getElementById('users-container');
            const mockUsers = await fetchUsers();
            
            container.innerHTML = '';
            
            mockUsers.forEach(u => {
                const initials = u.full_name ? u.full_name.split(' ').map(n => n[0]).join('').substring(0,2).toUpperCase() : '??';
                const card = document.createElement('div');
                card.className = `user-card role-${u.role.toLowerCase()}`;
                
                // Mapear role badge
                let roleClass = 'client';
                let roleLabel = 'Cliente';
                if (u.role === 'ADMIN') { roleClass = 'admin'; roleLabel = 'Administrador'; }
                else if (u.role === 'OPERATOR') { roleClass = 'operator'; roleLabel = 'Operador'; }

                // Garantir objeto de permissões válido
                const activePerms = u.permissions || [];
                const gridHtml = document.createElement('div');
                gridHtml.className = 'permissions-grid';
                MODULES_METADATA.forEach(m => { 
                    const isChecked = activePerms.includes(m.id); 
                    const lbl = document.createElement('label');
                    lbl.className = `permission-item ${isChecked ? 'active' : ''}`;
                    lbl.dataset.userId = u.id;
                    lbl.dataset.moduleId = m.id;
                    
                    const inp = document.createElement('input');
                    inp.type = 'checkbox';
                    inp.checked = isChecked;
                    inp.onchange = function() { window.togglePermission(u.id, m.id, this.checked); };
                    lbl.appendChild(inp);
                    
                    const sp = document.createElement('span');
                    sp.textContent = m.label;
                    lbl.appendChild(sp);
                    
                    gridHtml.appendChild(lbl);
                }); 
 
                // Header do card
                const header = document.createElement('div');
                header.className = 'user-card-header';
                header.onclick = function() { this.parentElement.classList.toggle('expanded'); };
                
                const uHeader = document.createElement('div');
                uHeader.className = 'user-header';
                
                const avatarDiv = document.createElement('div');
                avatarDiv.className = 'user-avatar safe-avatar';
                avatarDiv.textContent = initials;
                
                const uInfo = document.createElement('div');
                uInfo.className = 'user-info';
                const h3Name = document.createElement('h3');
                h3Name.className = 'safe-name';
                h3Name.textContent = u.full_name || 'Usuário Sem Nome';
                const pEmail = document.createElement('p');
                pEmail.className = 'safe-email';
                pEmail.textContent = u.email;
                uInfo.appendChild(h3Name);
                uInfo.appendChild(pEmail);
                uHeader.appendChild(avatarDiv);
                uHeader.appendChild(uInfo);
                
                const roleDiv = document.createElement('div');
                const roleSpan = document.createElement('span');
                roleSpan.className = `role-badge ${roleClass}`;
                roleSpan.textContent = roleLabel;
                roleDiv.appendChild(roleSpan);
                
                const keyDiv = document.createElement('div');
                
                const kSpan = document.createElement('span');
                kSpan.style.cssText = 'font-size: 0.7rem; color: var(--os-text-muted);';
                const iKey = document.createElement('i');
                iKey.className = 'fa-solid fa-key';
                kSpan.appendChild(iKey);
                kSpan.appendChild(document.createTextNode(' Chave: '));
                const maskSpan = document.createElement('span');
                maskSpan.id = 'pass-' + u.id;
                maskSpan.className = 'mask-password';
                maskSpan.textContent = '•••••••••';
                kSpan.appendChild(maskSpan);
                keyDiv.appendChild(kSpan);

                
                const caretDiv = document.createElement('div');
                caretDiv.style.cssText = 'text-align: right; color: var(--os-text-muted);';
                
                const iCaret = document.createElement('i');
                iCaret.className = 'fa-solid fa-chevron-down toggle-icon';
                iCaret.style.transition = 'transform 0.3s ease';
                caretDiv.appendChild(iCaret);

                
                header.appendChild(uHeader);
                header.appendChild(roleDiv);
                header.appendChild(keyDiv);
                header.appendChild(caretDiv);
                
                // Body do card
                const body = document.createElement('div');
                body.className = 'user-card-body';
                
                
                // Credenciais box
                const credBox = document.createElement('div');
                credBox.className = 'credentials-box';
                credBox.style.marginBottom = '20px';

                // Login Operacional
                const row1 = document.createElement('div');
                row1.className = 'credential-row';
                const lbl1 = document.createElement('span');
                lbl1.className = 'credential-label';
                lbl1.textContent = 'Login Operacional';
                const val1 = document.createElement('span');
                val1.className = 'credential-value safe-email-val';
                val1.style.fontSize = '0.8rem';
                val1.textContent = u.email;
                row1.appendChild(lbl1);
                row1.appendChild(val1);

                // Chave de Acesso Externa
                const row2 = document.createElement('div');
                row2.className = 'credential-row';
                const lbl2 = document.createElement('span');
                lbl2.className = 'credential-label';
                lbl2.textContent = 'Chave de Acesso Externa';
                const val2 = document.createElement('span');
                val2.className = 'credential-value';

                const btnRev = document.createElement('button');
                btnRev.className = 'btn-credential-action safe-reveal-btn';
                btnRev.title = 'Revelar Senha';
                const iEye = document.createElement('i');
                iEye.id = 'eye-icon-' + u.id;
                iEye.className = 'fa-solid fa-eye';
                btnRev.appendChild(iEye);
                btnRev.appendChild(document.createTextNode(' Revelar'));
                btnRev.addEventListener('click', () => window.togglePasswordReveal(u.id, u.password));

                const btnCop = document.createElement('button');
                btnCop.className = 'btn-credential-action safe-copy-btn';
                btnCop.title = 'Copiar Senha';
                const iCopy = document.createElement('i');
                iCopy.className = 'fa-solid fa-copy';
                btnCop.appendChild(iCopy);
                btnCop.appendChild(document.createTextNode(' Copiar'));
                btnCop.addEventListener('click', () => window.copyToClipboard(u.password));

                val2.appendChild(btnRev);
                val2.appendChild(btnCop);
                row2.appendChild(lbl2);
                row2.appendChild(val2);

                credBox.appendChild(row1);
                credBox.appendChild(row2);

                // Grade Módulos
                const permSec = document.createElement('div');
                permSec.className = 'permissions-section';
                const pTitle = document.createElement('div');
                pTitle.className = 'permissions-title';
                const pSpan = document.createElement('span');
                pSpan.textContent = 'Módulos Autorizados (RBAC)';
                pTitle.appendChild(pSpan);
                const safeGrid = document.createElement('div');
                safeGrid.className = 'safe-grid-container';
                safeGrid.appendChild(gridHtml); // gridHtml is a DOM element created before this
                permSec.appendChild(pTitle);
                permSec.appendChild(safeGrid);

                // Ações do Cartão
                const cardAct = document.createElement('div');
                cardAct.className = 'card-actions';

                const btnRes = document.createElement('button');
                btnRes.className = 'btn-card-action btn-card-reset safe-reset-btn';
                btnRes.title = 'Resetar senha para fluxai@2026';
                const iKeyCard = document.createElement('i');
                iKeyCard.className = 'fa-solid fa-key';
                btnRes.appendChild(iKeyCard);
                btnRes.appendChild(document.createTextNode(' Resetar Senha'));
                btnRes.addEventListener('click', () => window.resetUserPassword(u.id));

                const btnTog = document.createElement('button');
                btnTog.className = 'btn-card-action safe-toggle-btn';
                btnTog.title = 'Ativar / Inativar Contrato';
                btnTog.style.cssText = 'background: rgba(245,158,11,0.1); color: #f59e0b; border: 1px solid rgba(245,158,11,0.2);';
                const iTog = document.createElement('i');
                iTog.className = 'fa-solid fa-toggle-on';
                btnTog.appendChild(iTog);
                btnTog.appendChild(document.createTextNode(' Ativar/Inativar'));
                btnTog.addEventListener('click', () => window.toggleContractStatus(u.id, u.email));

                const btnDel = document.createElement('button');
                btnDel.className = 'btn-card-action btn-card-delete safe-del-btn';
                btnDel.title = 'Excluir Usuário';
                btnDel.style.maxWidth = 'none';
                const iDel = document.createElement('i');
                iDel.className = 'fa-solid fa-trash-can';
                btnDel.appendChild(iDel);
                btnDel.appendChild(document.createTextNode(' Excluir'));
                btnDel.addEventListener('click', () => window.deleteUser(u.id, u.email));

                cardAct.appendChild(btnRes);
                cardAct.appendChild(btnTog);
                cardAct.appendChild(btnDel);

                body.appendChild(credBox);
                body.appendChild(permSec);
                body.appendChild(cardAct);

                
                card.appendChild(header);
                card.appendChild(body);
 
                container.appendChild(card);
            });
        };

        // Manipula adição de novo Colaborador
        const handleAddUser = async (e) => {
            e.preventDefault();
            const fullName = document.getElementById('newFullName').value.trim();
            const email = document.getElementById('newEmail').value.trim();
            const role = document.getElementById('newRole').value;

            const mockUsers = await fetchUsers();
            if (mockUsers.some(u => u.email.toLowerCase() === email.toLowerCase())) {
                alert('Este email de login já está em uso.');
                return;
            }

            // Módulos padrão baseados no cargo
            const defaultPermissions = role === 'ADMIN' 
                ? ['command-center', 'onboarding', 'content-engine', 'crm-intelligence', 'analytics', 'automation-hub', 'contracts-finance', 'client-portal', 'governance-users'] 
                : ['command-center', 'onboarding', 'content-engine', 'crm-intelligence', 'analytics', 'automation-hub'];

            const newCollab = {
                id: 'u_' + Date.now(),
                full_name: fullName,
                email: email,
                password: "fluxai@2026",
                role: role,
                permissions: defaultPermissions,
                needsPasswordChange: true
            };

            try {
                const supabase = getSupabase();
                if (supabase) {
                    await supabase.from('governance_users').insert([{
                        name: fullName,
                        email: email,
                        role: role,
                        permissions: defaultPermissions
                    }]);
                } else {
                    mockUsers.push(newCollab);
                    saveMockUsers(mockUsers);
                }
            } catch (err) {
                mockUsers.push(newCollab);
                saveMockUsers(mockUsers);
            }

            showToast('Colaborador ativado e credenciais geradas!');
            document.getElementById('addUserForm').reset();
            document.getElementById('addUserModal').style.display = 'none';
            await renderUsers();
        };

        // Ações Globais Interativas (anexadas ao window para facilidade no HTML gerado)
        window.togglePasswordReveal = (userId, actualPassword) => {
            const passSpan = document.getElementById(`pass-${userId}`);
            const eyeIcon = document.getElementById(`eye-icon-${userId}`);
            if (passSpan.innerText === '••••••••') {
                passSpan.innerText = actualPassword;
                eyeIcon.className = 'fa-solid fa-eye-slash';
            } else {
                passSpan.innerText = '••••••••';
                eyeIcon.className = 'fa-solid fa-eye';
            }
        };

        window.copyToClipboard = (text) => {
            navigator.clipboard.writeText(text);
            showToast('Chave copiada para a área de transferência!');
        };

        window.togglePermission = (userId, moduleId, isChecked) => {
            const mockUsers = getMockUsers();
            const userIndex = mockUsers.findIndex(u => u.id === userId);
            if (userIndex !== -1) {
                let permissions = mockUsers[userIndex].permissions || [];
                if (isChecked) {
                    if (!permissions.includes(moduleId)) permissions.push(moduleId);
                } else {
                    permissions = permissions.filter(id => id !== moduleId);
                }
                mockUsers[userIndex].permissions = permissions;
                saveMockUsers(mockUsers);
                
                // Feedback visual na lista
                const label = document.querySelector(`.permission-item[data-user-id="${userId}"][data-module-id="${moduleId}"]`);
                if(label) {
                    if(isChecked) label.classList.add('active');
                    else label.classList.remove('active');
                }

                showToast('Permissão atualizada com sucesso!');
            }
        };

        window.resetUserPassword = (userId) => {
            if(confirm('Tem certeza que deseja resetar a senha deste usuário para a senha padrão provisória ("fluxai@2026")? Ele deverá redefini-la no próximo login.')) {
                const mockUsers = getMockUsers();
                const index = mockUsers.findIndex(u => u.id === userId);
                if (index !== -1) {
                    mockUsers[index].password = 'fluxai@2026';
                    mockUsers[index].needsPasswordChange = true;
                    saveMockUsers(mockUsers);
                    showToast('Senha resetada com sucesso!');
                    renderUsers();
                }
            }
        };

        window.deleteUser = async (userId, userEmail) => {
            if(confirm('Excluir PERMANENTEMENTE este cliente/usuário do sistema?')) {
                // Remove do localStorage
                const mockUsers = getMockUsers();
                const filtered = mockUsers.filter(u => u.id !== userId);
                saveMockUsers(filtered);

                // Remove do Supabase
                try {
                    const supabase = getSupabase();
                    if (supabase) {
                        // Deleta governance_user
                        await supabase.from('governance_users').delete().eq('id', userId);
                        // Deleta projetos vinculados ao email
                        if (userEmail) {
                            const { data: projs } = await supabase.from('projects').select('id').eq('client_email', userEmail);
                            if (projs && projs.length > 0) {
                                const ids = projs.map(p => p.id);
                                await supabase.from('contracts').delete().in('project_id', ids);
                                await supabase.from('content_assets').delete().in('project_id', ids);
                                await supabase.from('projects').delete().in('id', ids);
                            }
                        }
                    }
                } catch(err) {
                    console.warn('[GOV] Erro ao deletar no Supabase:', err);
                }

                showToast('Cliente removido do sistema.');
                await renderUsers();
            }
        };

        window.toggleContractStatus = async (userId, userEmail) => {
            try {
                const supabase = getSupabase();
                if (supabase && userEmail) {
                    const { data: projs } = await supabase.from('projects').select('id, status').eq('client_email', userEmail);
                    if (projs && projs.length > 0) {
                        const proj = projs[0];
                        const newStatus = proj.status === 'ATIVO' ? 'INATIVO' : 'ATIVO';
                        await supabase.from('projects').update({ status: newStatus }).eq('id', proj.id);
                        await supabase.from('contracts').update({ status: newStatus }).eq('project_id', proj.id);
                        showToast(`Contrato ${newStatus === 'ATIVO' ? '✅ Ativado' : '⛔ Inativado'} com sucesso!`);
                        return;
                    }
                }
                showToast('Contrato não encontrado no banco de dados.');
            } catch(err) {
                console.warn('[GOV] Erro ao atualizar status:', err);
                showToast('Erro ao atualizar status. Verifique o Supabase.');
            }
        };

        // Toast Notification System
        function showToast(message) {
            const existing = document.querySelector('.toast-notification');
            if(existing) existing.remove();

            const toast = document.createElement('div');
            toast.className = 'toast-notification';
            toast.replaceChildren();
            const icon = document.createElement('i');
            icon.className = 'fa-solid fa-circle-check';
            toast.appendChild(icon);
            toast.appendChild(document.createTextNode(` ${message}`));
            document.body.appendChild(toast);

            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transform = 'translateY(10px)';
                toast.style.transition = 'all 0.3s ease';
                setTimeout(() => toast.remove(), 300);
            }, 2500);
        }

        initPage();
    </script>
</body>
</html>
