<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FluxAI OS™ | Leads (Operação Make)</title>
    <link rel="stylesheet" href="./styles/interface.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" integrity="sha384-PPIZEGYM1v8zp5Py7UjFb79S58UeqCL9pYVnVPURKEqvioPROaVAJKKLzvH2rDnI" crossorigin="anonymous" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />


    <!-- Favicon -->
    <link rel="icon" type="image/png" href="../assets/icons/favicon-os.png" />
    <link rel="shortcut icon" href="../assets/icons/favicon-os.png" type="image/x-icon" />
    <link rel="apple-touch-icon" href="../assets/icons/favicon-os.png" />
</head>
<body class="os-mode">
    <div class="os-bg-glow"></div>
    <div class="os-shell">
        <aside class="os-sidebar"></aside>
        <div class="os-viewport-wrapper">
            <header class="os-topbar"></header>
            <main class="os-viewport">
                <div class="os-page-title" style="display: flex; justify-content: space-between; align-items: flex-end;">
                    <div>
                        <h1>Leads (Site & CRM)</h1>
                        <p>Leads entrantes processados pelos Webhooks do Make.</p>
                    </div>
                    <div>
                        <select id="project-filter" style="padding: 8px 15px; background: #0a0a0a; border: 1px solid #333; color: #fff; font-size: 0.8rem; border-radius: 4px; outline: none; font-weight: 600; font-family: 'Inter', sans-serif;">
                            <option value="">Selecione um Cliente...</option>
                        </select>
                    </div>
                </div>
                <div class="os-widget">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
                        <span class="os-widget-label" style="margin-bottom: 0;">Fluxo de Oportunidades</span>
                        <button id="btn-new-lead" style="background: var(--os-primary); color: #000; border: none; padding: 6px 12px; border-radius: 4px; font-weight: 800; font-size: 0.7rem; cursor: pointer; display: none;">
                            <i class="fa-solid fa-plus" style="margin-right: 5px;"></i> NOVO LEAD
                        </button>
                    </div>
                    <div id="leads-table-container">Carregando...</div>
                </div>
            </main>
        </div>
    </div>

    <!-- Modal Novo Lead -->
    <div id="modal-new-lead" class="os-modal-overlay" style="display: none;">
        <div class="os-modal">
            <div class="os-modal-header">
                <h3><i class="fa-solid fa-user-plus" style="color:var(--os-primary);"></i> Cadastrar Novo Lead</h3>
                <button onclick="document.getElementById('modal-new-lead').style.display='none'" class="os-btn-close"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <div class="os-modal-body" style="padding-top: 15px;">
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 15px;">
                    <div>
                        <label style="display:block; font-size:0.6rem; color:var(--os-text-muted); margin-bottom:5px; font-weight:800;">NOME DO LEAD</label>
                        <input type="text" id="new-lead-name" style="width:100%; padding:10px; background:#000; border:1px solid #333; color:#fff; border-radius:4px;" placeholder="Ex: João Silva">
                    </div>
                    <div>
                        <label style="display:block; font-size:0.6rem; color:var(--os-text-muted); margin-bottom:5px; font-weight:800;">EMPRESA</label>
                        <input type="text" id="new-lead-company" style="width:100%; padding:10px; background:#000; border:1px solid #333; color:#fff; border-radius:4px;" placeholder="Ex: Acme Corp">
                    </div>
                </div>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 15px;">
                    <div>
                        <label style="display:block; font-size:0.6rem; color:var(--os-text-muted); margin-bottom:5px; font-weight:800;">CONTATO (E-MAIL/WHATSAPP)</label>
                        <input type="text" id="new-lead-contact" style="width:100%; padding:10px; background:#000; border:1px solid #333; color:#fff; border-radius:4px;" placeholder="Ex: 11999999999">
                    </div>
                    <div>
                        <label style="display:block; font-size:0.6rem; color:var(--os-text-muted); margin-bottom:5px; font-weight:800;">SERVIÇO DE INTERESSE</label>
                        <input type="text" id="new-lead-service" style="width:100%; padding:10px; background:#000; border:1px solid #333; color:#fff; border-radius:4px;" placeholder="Ex: Implantação FluxAI">
                    </div>
                </div>
                <div style="margin-bottom: 20px;">
                    <label style="display:block; font-size:0.6rem; color:var(--os-text-muted); margin-bottom:5px; font-weight:800;">ORIGEM</label>
                    <select id="new-lead-origin" style="width:100%; padding:10px; background:#000; border:1px solid #333; color:#fff; border-radius:4px;">
                        <option value="Prospecção Ativa">Prospecção Ativa</option>
                        <option value="Inbound">Inbound (Site)</option>
                        <option value="Indicação">Indicação</option>
                        <option value="Instagram">Instagram</option>
                    </select>
                </div>
                <button id="btn-submit-lead" style="width:100%; padding:12px; background:var(--os-primary); color:#000; border:none; border-radius:4px; font-weight:800; cursor:pointer;">
                    CRIAR LEAD
                </button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.106.2/dist/umd/supabase.min.js" integrity="sha384-4Cjkyy4cE1EgIS0C+Y3xzGmJ2noQFRRU91yKAW8IxtPfVtbQXPMqadSc3sYnjwou" crossorigin="anonymous"></script>
    <script type="module" src="./js/modules/leads.js"></script>
</body>
</html>
