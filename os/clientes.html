<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FluxAI OS™ | Clientes (Operação Make)</title>
    <link rel="stylesheet" href="./styles/interface.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
    <style>
        :root {
            --os-primary: #8e9e68;
            --os-bg: #050705;
            --os-surface: rgba(15, 18, 15, 0.7);
            --os-border: rgba(142, 158, 104, 0.15);
            --os-text: #e0e0e0;
            --os-text-muted: #888;
        }

        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background-color: var(--os-bg);
            color: var(--os-text);
            overflow: hidden;
        }

        .os-bg-glow {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 0% 0%, rgba(142, 158, 104, 0.15) 0%, transparent 40%),
                        radial-gradient(circle at 100% 100%, rgba(142, 158, 104, 0.1) 0%, transparent 40%);
            z-index: -1;
        }

        .os-shell { display: flex; height: 100vh; }
        .os-sidebar { width: 280px; background: rgba(10, 12, 10, 0.8); backdrop-filter: blur(20px); border-right: 1px solid var(--os-border); z-index: 100; }
        .os-viewport-wrapper { flex: 1; display: flex; flex-direction: column; overflow: hidden; position: relative; }
        .os-topbar { height: 70px; background: rgba(10, 12, 10, 0.4); backdrop-filter: blur(15px); border-bottom: 1px solid var(--os-border); display: flex; align-items: center; justify-content: space-between; padding: 0 40px; z-index: 90; }
        .os-viewport { flex: 1; padding: 40px; overflow-y: auto; }

        .os-page-title h1 { font-size: 2.2rem; font-weight: 800; margin: 0; background: linear-gradient(to right, #fff, var(--os-primary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .os-page-title p { color: var(--os-text-muted); font-size: 0.9rem; margin-top: 5px; }

        .os-widget { background: var(--os-surface); border: 1px solid var(--os-border); border-radius: 16px; padding: 20px; margin-top: 30px; position: relative; overflow: hidden; }
        .os-widget-label { font-size: 0.65rem; font-weight: 800; text-transform: uppercase; letter-spacing: 2px; color: var(--os-primary); }

        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { text-align: left; padding: 12px; border-bottom: 1px solid var(--os-border); font-size: 0.85rem; }
        th { color: var(--os-text-muted); font-weight: 600; text-transform: uppercase; font-size: 0.7rem; letter-spacing: 1px; }
        
        .badge { padding: 4px 8px; border-radius: 12px; font-size: 0.7rem; font-weight: 700; text-transform: uppercase; }
        .badge.ativo { background: rgba(16, 185, 129, 0.1); color: #10b981; border: 1px solid rgba(16, 185, 129, 0.3); }
        .badge.inativo { background: rgba(239, 68, 68, 0.1); color: #ef4444; border: 1px solid rgba(239, 68, 68, 0.3); }
        .badge.pendente { background: rgba(245, 158, 11, 0.1); color: #f59e0b; border: 1px solid rgba(245, 158, 11, 0.3); }
    </style>
</head>
<body>
    <div class="os-bg-glow"></div>
    <div class="os-shell">
        <aside class="os-sidebar"></aside>
        <div class="os-viewport-wrapper">
            <header class="os-topbar"></header>
            <main class="os-viewport">
                <div class="os-page-title" style="display: flex; justify-content: space-between; align-items: center;">
                    <div>
                        <h1>Clientes (Make Sync)</h1>
                        <p>Status operacional e serviços conectados.</p>
                    </div>
                    <button class="os-btn-primary" onclick="document.getElementById('modal-extra').style.display='flex'" style="background: var(--os-primary); color: #000; font-weight: 800; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; transition: all 0.2s; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px;">
                        <i class="fa-solid fa-plus"></i> Adicionar Serviço Extra
                    </button>
                </div>
                
                <div class="os-widget">
                    <span class="os-widget-label">Base de Clientes</span>
                    <div id="clients-table-container">Carregando...</div>
                </div>

                <!-- Modal Adicionar Serviço Extra -->
                <div id="modal-extra" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 999; justify-content: center; align-items: center; backdrop-filter: blur(5px);">
                    <div style="background: #111; border: 1px solid var(--os-border); border-radius: 12px; padding: 30px; width: 500px; max-width: 90%; max-height: 90vh; overflow-y: auto;">
                        <h2 style="margin: 0 0 20px; color: var(--os-primary); font-size: 1.2rem; text-transform: uppercase;">Adicionar Serviço Extra</h2>
                        
                        <div style="display: flex; flex-direction: column; gap: 15px;">
                            <div>
                                <label style="font-size: 0.75rem; color: var(--os-text-muted);">Cliente Alvo</label>
                                <select id="extra-client-id" class="os-input" style="width: 100%; background: rgba(0,0,0,0.3); border: 1px solid var(--os-border); padding: 10px; color: #fff;"></select>
                            </div>
                            <div>
                                <label style="font-size: 0.75rem; color: var(--os-text-muted);">Serviço Extra (Catálogo)</label>
                                <select id="extra-catalog-id" class="os-input" style="width: 100%; background: rgba(0,0,0,0.3); border: 1px solid var(--os-border); padding: 10px; color: #fff;"></select>
                            </div>
                            <div>
                                <label style="font-size: 0.75rem; color: var(--os-text-muted);">Status do Extra</label>
                                <select id="extra-status" class="os-input" style="width: 100%; background: rgba(0,0,0,0.3); border: 1px solid var(--os-border); padding: 10px; color: #fff;">
                                    <option value="solicitado">Solicitado</option>
                                    <option value="em_orcamento">Em Orçamento</option>
                                    <option value="orcamento_enviado">Orçamento Enviado</option>
                                    <option value="aprovado">Aprovado</option>
                                    <option value="em_producao">Em Produção</option>
                                    <option value="entregue">Entregue</option>
                                </select>
                            </div>
                            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                                <div>
                                    <label style="font-size: 0.75rem; color: var(--os-text-muted);">Valor Estimado</label>
                                    <input type="text" id="extra-valor-est" class="os-input" style="width: 100%; background: rgba(0,0,0,0.3); border: 1px solid var(--os-border); padding: 10px; color: #fff;" />
                                </div>
                                <div>
                                    <label style="font-size: 0.75rem; color: var(--os-text-muted);">Valor Aprovado</label>
                                    <input type="text" id="extra-valor-apr" class="os-input" style="width: 100%; background: rgba(0,0,0,0.3); border: 1px solid var(--os-border); padding: 10px; color: #fff;" />
                                </div>
                            </div>
                            <div>
                                <label style="font-size: 0.75rem; color: var(--os-text-muted);">Impacto no Planejamento GPT?</label>
                                <select id="extra-impact" class="os-input" style="width: 100%; background: rgba(0,0,0,0.3); border: 1px solid var(--os-border); padding: 10px; color: #fff;">
                                    <option value="nao">Não</option>
                                    <option value="sim">Sim (Alterar escopo)</option>
                                </select>
                            </div>
                            <div>
                                <label style="font-size: 0.75rem; color: var(--os-text-muted);">Observações</label>
                                <textarea id="extra-obs" class="os-input" style="width: 100%; background: rgba(0,0,0,0.3); border: 1px solid var(--os-border); padding: 10px; color: #fff; height: 60px;"></textarea>
                            </div>
                        </div>

                        <div style="margin-top: 25px; display: flex; justify-content: flex-end; gap: 10px;">
                            <button onclick="document.getElementById('modal-extra').style.display='none'" style="background: transparent; color: #888; border: none; padding: 10px 20px; cursor: pointer;">Cancelar</button>
                            <button id="btn-save-extra" style="background: var(--os-primary); color: #000; font-weight: bold; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer;">Salvar</button>
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script type="module" src="./js/modules/clients.js"></script>
</body>
</html>
