<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FluxAI OS™ | Clientes e Controles Operacionais</title>
    <link rel="stylesheet" href="./styles/interface.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" integrity="sha384-PPIZEGYM1v8zp5Py7UjFb79S58UeqCL9pYVnVPURKEqvioPROaVAJKKLzvH2rDnI" crossorigin="anonymous" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
    <style>
        /* CONTROL PANEL */
        .controls-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
            gap: 15px;
            flex-wrap: wrap;
        }

        .filter-tabs {
            display: flex;
            gap: 4px;
            background: rgba(0, 0, 0, 0.4);
            padding: 3px;
            border-radius: 4px;
            border: 1px solid rgba(255, 255, 255, 0.03);
        }

        .filter-tab {
            background: transparent;
            border: none;
            color: var(--os-text-muted);
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            padding: 6px 12px;
            border-radius: 3px;
            cursor: pointer;
            transition: all 0.15s ease;
            letter-spacing: 0.5px;
        }

        .filter-tab:hover { color: #fff; }
        .filter-tab.active {
            background: rgba(142, 158, 104, 0.12);
            color: var(--os-primary);
            border: 1px solid rgba(142, 158, 104, 0.2);
        }

        .search-box {
            display: flex;
            align-items: center;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--os-border);
            border-radius: 4px;
            padding: 0 12px;
            width: 250px;
        }

        .search-box input {
            background: transparent;
            border: none;
            color: #fff;
            font-size: 0.75rem;
            padding: 8px 0;
            width: 100%;
            outline: none;
        }

        .search-box i { color: var(--os-text-muted); margin-right: 8px; font-size: 0.8rem; }

        /* TABLE */
        table { width: 100%; border-collapse: collapse; text-align: left; }
        th, td { padding: 12px 15px; border-bottom: 1px solid rgba(255, 255, 255, 0.02); font-size: 0.75rem; vertical-align: middle; }
        th { background: rgba(0,0,0,0.4); border-bottom: 1px solid var(--os-border); color: var(--os-text-muted); font-weight: 700; text-transform: uppercase; font-size: 0.65rem; letter-spacing: 1px; }

        .badge-status {
            font-size: 0.6rem;
            font-weight: 800;
            padding: 2px 6px;
            border-radius: 2px;
            text-transform: uppercase;
            display: inline-block;
        }
        .badge-status.ativo { background: rgba(142, 158, 104, 0.1); color: var(--os-success); }
        .badge-status.pausado { background: rgba(217, 119, 6, 0.1); color: var(--os-warning); }
        .badge-status.inativo { background: rgba(239, 68, 68, 0.1); color: var(--os-danger); }
        .badge-status.onboarding { background: rgba(59, 130, 246, 0.1); color: var(--os-info); }

        .action-btn-group {
            display: flex;
            gap: 6px;
        }

        .row-action-btn {
            background: rgba(255,255,255,0.02);
            border: 1px solid var(--os-border);
            color: var(--os-text);
            padding: 4px 8px;
            border-radius: 3px;
            font-size: 0.65rem;
            font-weight: 700;
            cursor: pointer;
            text-transform: uppercase;
            transition: all 0.15s;
        }

        .row-action-btn:hover {
            border-color: var(--os-primary);
            color: var(--os-primary);
            background: rgba(142,158,104,0.05);
        }

        .row-action-btn.danger:hover {
            border-color: var(--os-danger);
            color: var(--os-danger);
            background: rgba(239, 68, 68, 0.05);
        }

        /* MODAL */
        .os-modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 999;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(5px);
        }

        .os-modal-content {
            background: #111;
            border: 1px solid var(--os-border);
            border-radius: 6px;
            padding: 30px;
            width: 480px;
            max-width: 90%;
        }

        .os-input {
            width: 100%;
            background: rgba(0,0,0,0.3);
            border: 1px solid var(--os-border);
            padding: 10px;
            color: #fff;
            border-radius: 4px;
            margin-top: 5px;
            outline: none;
            box-sizing: border-box;
        }
        .os-input:focus { border-color: var(--os-primary); }
    </style>

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="../assets/icons/favicon-os.png" />
    <link rel="shortcut icon" href="../assets/icons/favicon-os.png" type="image/x-icon" />
    <link rel="apple-touch-icon" href="../assets/icons/favicon-os.png" />
</head>
<body class="os-mode">
    <div class="os-shell">
        <aside class="os-sidebar"></aside>
        <div class="os-viewport-wrapper">
            <header class="os-topbar"></header>
            <main class="os-viewport">
                <div class="os-page-title" style="display: flex; justify-content: space-between; align-items: flex-end;">
                    <div>
                        <h1>Clientes</h1>
                        <p>Controle de status operacional, acessos, automações e IA do ecossistema.</p>
                    </div>
                    <button class="row-action-btn" onclick="document.getElementById('modal-extra').style.display='flex'" style="background: var(--os-primary); color: #000; border: none; padding: 10px 20px; border-radius: 4px; font-weight: 800;">
                        <i class="fa-solid fa-plus"></i> Adicionar Serviço Extra
                    </button>
                </div>
                
                <div class="os-widget">
                    <span class="os-widget-label">Central Operacional de Clientes</span>
                    
                    <div class="controls-row">
                        <!-- Left: Status Tabs -->
                        <div class="filter-tabs" id="status-tabs">
                            <button class="filter-tab active" data-status="ALL">Todos <span id="count-all">0</span></button>
                            <button class="filter-tab" data-status="ativo">Ativos <span id="count-ativo">0</span></button>
                            <button class="filter-tab" data-status="pausado">Pausados <span id="count-pausado">0</span></button>
                            <button class="filter-tab" data-status="inativo">Inativos/Arq. <span id="count-inativo">0</span></button>
                            <button class="filter-tab" data-status="onboarding">Onboarding <span id="count-onboarding">0</span></button>
                        </div>
                        
                        <!-- Right: Search -->
                        <div class="search-box">
                            <i class="fa-solid fa-magnifying-glass"></i>
                            <input type="text" id="client-search" placeholder="Buscar por cliente, ID, rede..." />
                        </div>
                    </div>
                    
                    <div id="clients-table-container">Carregando...</div>
                </div>

                <!-- Modal Adicionar Serviço Extra -->
                <div id="modal-extra" class="os-modal">
                    <div class="os-modal-content" style="max-height: 90vh; overflow-y: auto;">
                        <h2 style="margin: 0 0 20px; color: var(--os-primary); font-size: 1.1rem; text-transform: uppercase; letter-spacing: 1px;">Adicionar Serviço Extra</h2>
                        
                        <div style="display: flex; flex-direction: column; gap: 15px;">
                            <div>
                                <label style="font-size: 0.75rem; color: var(--os-text-muted);">Cliente Alvo</label>
                                <select id="extra-client-id" class="os-input"></select>
                            </div>
                            
                            <div>
                                <label style="font-size: 0.75rem; color: var(--os-text-muted);">Tipo de Serviço Extra</label>
                                <select id="extra-catalog-id" class="os-input">
                                    <option value="">Nenhum Serviço Extra</option>
                                    <optgroup label="FLUXAI (Agência & Marketing)">
                                        <option value="[FluxAI] Gravação / Captação Audiovisual">Gravação / Captação Audiovisual (Rec. R$ 400)</option>
                                        <option value="[FluxAI] Produção de Reels Extra (Unidade)">Produção de Reels Extra - Unidade (Rec. R$ 100)</option>
                                        <option value="[FluxAI] Produção de Carrosséis Extra (Unidade)">Produção de Carrosséis Extra - Unidade (Rec. R$ 80)</option>
                                        <option value="[FluxAI] Apresentação Comercial / Pitch Deck">Apresentação Comercial / Pitch Deck (Rec. R$ 500)</option>
                                        <option value="[FluxAI] Branding & Identidade Visual Express">Branding & Identidade Visual Express (Rec. R$ 1.200)</option>
                                        <option value="[FluxAI] Gestão de Anúncios Meta Ads">Gestão de Anúncios Meta Ads (Rec. R$ 600)</option>
                                    </optgroup>
                                    <optgroup label="FLUXAI LABS (Tecnologia & Sistemas)">
                                        <option value="[FluxAI Labs] Automação de Processos (Make / n8n)">Automação de Processos - Make/n8n (Rec. R$ 800)</option>
                                        <option value="[FluxAI Labs] Landing Page (LP) de Alta Conversão">Landing Page (LP) de Alta Conversão (Rec. R$ 1.500)</option>
                                        <option value="[FluxAI Labs] Site Institucional Completo">Site Institucional Completo (Rec. R$ 2.500)</option>
                                        <option value="[FluxAI Labs] Arquitetura de CRM & Pipeline de Vendas">Arquitetura de CRM & Pipeline (Rec. R$ 900)</option>
                                        <option value="[FluxAI Labs] Chatbot de IA & Agente de Triagem">Chatbot de IA & Agente de Triagem (Rec. R$ 1.200)</option>
                                        <option value="[FluxAI Labs] Dashboard de Analytics Personalizado">Dashboard de Analytics Personalizado (Rec. R$ 1.000)</option>
                                    </optgroup>
                                    <option value="Outro Serviço Avulso">Outro Serviço Avulso (Customizado)</option>
                                </select>
                            </div>
                            
                            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                                <div>
                                    <label style="font-size: 0.75rem; color: var(--os-text-muted);">Valor Estimado (R$)</label>
                                    <input type="number" step="0.01" id="extra-valor-est" class="os-input" placeholder="0.00" />
                                </div>
                                <div>
                                    <label style="font-size: 0.75rem; color: var(--os-text-muted);">Valor Aprovado (R$)</label>
                                    <input type="number" step="0.01" id="extra-valor-apr" class="os-input" placeholder="0.00" />
                                </div>
                            </div>
                            
                            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                                <div>
                                    <label style="font-size: 0.75rem; color: var(--os-text-muted);">Status do Serviço</label>
                                    <select id="extra-status" class="os-input">
                                        <option value="solicitado">Solicitado</option>
                                        <option value="em_analise">Em Análise</option>
                                        <option value="orcamento_enviado">Orçamento Enviado</option>
                                        <option value="aprovado">Aprovado</option>
                                        <option value="recusado">Recusado</option>
                                        <option value="em_producao">Em Produção</option>
                                        <option value="entregue">Entregue</option>
                                        <option value="cancelado">Cancelado</option>
                                    </select>
                                </div>
                                <div>
                                    <label style="font-size: 0.75rem; color: var(--os-text-muted);">Responsável</label>
                                    <input type="text" id="extra-owner" class="os-input" placeholder="Ex: Financeiro" />
                                </div>
                            </div>

                            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                                <div>
                                    <label style="font-size: 0.75rem; color: var(--os-text-muted);">Prazo de Entrega (Dias)</label>
                                    <input type="number" id="extra-deadline" class="os-input" placeholder="Ex: 5" />
                                </div>
                                <div>
                                    <label style="font-size: 0.75rem; color: var(--os-text-muted);">Data de Vencimento</label>
                                    <input type="date" id="extra-due-date" class="os-input" />
                                </div>
                            </div>
                            
                            <div>
                                <label style="font-size: 0.75rem; color: var(--os-text-muted);">Crédito IA Necessário?</label>
                                <select id="extra-ai-credits" class="os-input">
                                    <option value="0">Não consome IA</option>
                                    <option value="1">Baixo (1 Crédito)</option>
                                    <option value="3">Médio (3 Créditos)</option>
                                    <option value="5">Alto (5 Créditos)</option>
                                </select>
                            </div>

                            <div>
                                <label style="font-size: 0.75rem; color: var(--os-text-muted);">Impacto no Planejamento GPT?</label>
                                <select id="extra-impact" class="os-input">
                                    <option value="baixo">Baixo (Não afeta entregas mensais)</option>
                                    <option value="medio">Médio (Requer ajuste de agenda)</option>
                                    <option value="alto">Alto (Pausa parcial do escopo mensal)</option>
                                </select>
                            </div>
                            
                            <div>
                                <label style="font-size: 0.75rem; color: var(--os-text-muted);">Escopo do Extra (Descrição detalhada)</label>
                                <textarea id="extra-obs" class="os-input" style="height: 60px;" placeholder="O que será entregue?"></textarea>
                            </div>

                            <div>
                                <label style="font-size: 0.75rem; color: var(--os-text-muted);"><i class="fa-brands fa-google-drive"></i> Link de Entrega (Google Drive / Doc)</label>
                                <input type="url" id="extra-drive-link" class="os-input" placeholder="https://..." />
                            </div>
                        </div>

                        <div style="margin-top: 25px; display: flex; justify-content: flex-end; gap: 10px;">
                            <button onclick="document.getElementById('modal-extra').style.display='none'" style="background: transparent; color: #888; border: none; padding: 10px 20px; cursor: pointer; font-size: 0.7rem; font-weight: 700; text-transform: uppercase;">Cancelar</button>
                            <button id="btn-save-extra" class="row-action-btn" style="background: var(--os-primary); color: #000; border: none; padding: 10px 20px; border-radius: 4px;">Salvar</button>
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.106.2/dist/umd/supabase.min.js" crossorigin="anonymous"></script>
    <script type="module" src="./js/modules/clients.js"></script>
</body>
</html>
