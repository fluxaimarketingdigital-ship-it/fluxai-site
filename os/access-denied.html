<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FluxAI OS™ | Acesso Restrito</title>
    <link rel="stylesheet" href="/src/styles/os/interface.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" integrity="sha384-PPIZEGYM1v8zp5Py7UjFb79S58UeqCL9pYVnVPURKEqvioPROaVAJKKLzvH2rDnI" crossorigin="anonymous" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet" />
    <style>
        body.access-denied {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #050505;
            color: #fff;
            text-align: center;
        }
        .denied-card {
            max-width: 500px;
            padding: 60px;
            background: rgba(255,255,255,0.02);
            border: 1px solid var(--os-border);
            border-radius: 8px;
        }
        .denied-icon {
            font-size: 3rem;
            color: var(--os-danger);
            margin-bottom: 30px;
        }
        h1 { font-size: 1.5rem; margin-bottom: 15px; letter-spacing: 1px; }
        p { color: var(--os-text-muted); line-height: 1.6; margin-bottom: 30px; }
        .btn-return {
            display: inline-block;
            padding: 12px 30px;
            background: var(--os-primary);
            color: #fff;
            text-decoration: none;
            border-radius: 4px;
            font-weight: 600;
            transition: all 0.2s;
        }
        .btn-return:hover { transform: translateY(-2px); opacity: 0.9; }
    </style>

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="../assets/icons/favicon-os.png" />
    <link rel="shortcut icon" href="../assets/icons/favicon-os.png" type="image/x-icon" />
    <link rel="apple-touch-icon" href="../assets/icons/favicon-os.png" />
</head>
<body class="os-mode access-denied">
    <div class="denied-card">
        <div class="denied-icon">
            <i class="fa-solid fa-shield-halved"></i>
        </div>
        <h1>ACESSO RESTRITO</h1>
        <p>Seu nível de autorização atual não permite o acesso a este módulo operacional. Esta tentativa foi registrada nos logs de auditoria da infraestrutura.</p>
        <a href="command-center.html" class="btn-return">RETORNAR AO COMANDO</a>
    </div>
</body>
</html>
