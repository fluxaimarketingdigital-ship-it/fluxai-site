<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FluxAI OS™ | Centro de Comando</title>
    <link rel="stylesheet" href="/src/styles/os/interface.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

</head>
<body class="os-mode">

    <div class="os-shell">
        <!-- SIDEBAR (Renderizada via Core) -->
        <aside class="os-sidebar"></aside>

        <div class="os-viewport-wrapper" style="display: flex; flex-direction: column; width: 100%;">
            <!-- TOPBAR (Renderizada via Core) -->
            <header class="os-topbar"></header>

            <main class="os-viewport">
                <div class="os-page-title">
                    <h1 id="page-title">Centro de Comando</h1>
                    <p id="page-desc">Visão geral da inteligência e estados operacionais da FluxAI Labs.</p>
                </div>

                <div class="os-widget-grid">
                    <!-- MÉTRICAS PRINCIPAIS (Containers) -->
                    <div class="os-widget" id="metric-comercial" style="grid-column: span 3;"></div>
                    <div class="os-widget" id="metric-conteudo" style="grid-column: span 3;"></div>
                    <div class="os-widget" id="metric-crm" style="grid-column: span 3;"></div>
                    <div class="os-widget" id="metric-roas" style="grid-column: span 3;"></div>

                    <!-- CENTRAL OPERACIONAL DO DIA (LOGÍSTICA) -->
                    <div class="os-widget" style="grid-column: span 8; grid-row: span 2;">
                        <div class="os-widget-header" style="display:flex; justify-content:space-between; align-items:center;">
                            <span class="os-widget-label">Central Operacional do Dia</span>
                            <span id="pub-today-count" style="font-size:0.6rem; background:var(--os-primary); color:#000; padding:2px 8px; border-radius:10px; font-weight:800;">Calculando...</span>
                        </div>
                        <div id="daily-ops-container" style="padding:15px; display:grid; grid-template-columns: 1fr 1fr; gap:15px;">
                            <!-- Injetado via JS -->
                        </div>
                    </div>

                    <!-- CENTRAL DE ALERTAS CRÍTICOS -->
                    <div class="os-widget" style="grid-column: span 4; grid-row: span 2;">
                        <div class="os-widget-header">
                            <span class="os-widget-label">Alertas Críticos de Logística</span>
                        </div>
                        <div class="os-alert-list" id="alerts-container">
                            <!-- Injetado via data -->
                        </div>
                    </div>

                    <!-- ATIVIDADE OPERACIONAL -->
                    <div class="os-widget" style="grid-column: span 8;">
                        <div class="os-widget-header">
                            <span class="os-widget-label">Atividade Operacional Recente</span>
                        </div>
                        <div class="os-activity-log" id="activity-log">
                            <!-- Injetado via data -->
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <!-- CORE ENGINE INITIALIZATION -->
    <script type="module">
        import { OS_UI, OS_AUTH } from './js/os-core.js';
        import { getSupabase } from './services/supabase-client.js';
        async function initPage() {
            const user = await OS_AUTH.check('OPERATOR');
            if (!user) return;

            OS_UI.renderSidebar('command-center', user.role);
            await OS_UI.renderTopbar();
 
            // Inicializar Logística
            await runLogisticsEngine();
            await renderActivity();
        }

        async function runLogisticsEngine() {
            const supabase = getSupabase();
            const now = new Date();
            const startOfDay = new Date(now.setHours(0,0,0,0)).toISOString();
            const endOfDay = new Date(now.setHours(23,59,59,999)).toISOString();

            // 1. Buscar Publicações de Hoje
            const { data: hoy } = await supabase.from('content_assets')
                .select('*, projects(name)')
                .gte('scheduled_at', startOfDay)
                .lte('scheduled_at', endOfDay)
                .order('scheduled_at', { ascending: true });

            const container = document.getElementById('daily-ops-container');
            const alertContainer = document.getElementById('alerts-container');
            const countBadge = document.getElementById('pub-today-count');

            if (!hoy || hoy.length === 0) {
                container.innerHTML = '<div style="grid-column:span 2; opacity:0.5; text-align:center; padding:20px;">Nenhuma publicação agendada para hoje.</div>';
                countBadge.innerText = '0 HOJE';
                return;
            }

            countBadge.innerText = `${hoy.length} HOJE`;
            
            let alertsHtml = '';
            container.innerHTML = hoy.map(c => {
                const time = new Date(c.scheduled_at).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
                const statusColor = c.status === 'PRONTO' ? 'var(--os-success)' : 'var(--os-warning)';
                
                // Lógica de Alertas
                const deadline = c.metadata?.approval_deadline ? new Date(c.metadata.approval_deadline) : null;
                const isAwaiting = c.status.includes('APROVAÇÃO') || c.status === 'PLANEJAMENTO';
                
                if (isAwaiting && deadline && deadline < new Date()) {
                    alertsHtml += `
                        <div class="os-alert-item" style="border-left: 3px solid var(--os-danger);">
                            <div class="os-alert-icon" style="color: var(--os-danger);"><i class="fa-solid fa-clock-rotate-left"></i></div>
                            <div class="os-alert-content">
                                <h4 style="font-size:0.7rem;">APROVAÇÃO ATRASADA</h4>
                                <p style="font-size:0.6rem;">${c.projects?.name} • Post ${time} bloqueado.</p>
                            </div>
                        </div>
                    `;
                }

                if (c.metadata?.risk) {
                    alertsHtml += `
                        <div class="os-alert-item" style="border-left: 3px solid var(--os-warning);">
                            <div class="os-alert-icon" style="color: var(--os-warning);"><i class="fa-solid fa-triangle-exclamation"></i></div>
                            <div class="os-alert-content">
                                <h4 style="font-size:0.7rem;">RISCO OPERACIONAL</h4>
                                <p style="font-size:0.6rem;">${c.projects?.name} • Atraso impacta o dia.</p>
                            </div>
                        </div>
                    `;
                }

                return `
                    <div style="background:rgba(255,255,255,0.03); border:1px solid #222; padding:12px; border-radius:8px; display:flex; flex-direction:column; gap:8px;">
                        <div style="display:flex; justify-content:space-between; align-items:start;">
                            <div style="font-size:0.6rem; font-weight:800; color:var(--os-primary);">${time} • ${c.projects?.name}</div>
                            <i class="fa-solid fa-rocket" style="color:${statusColor}; font-size:0.7rem;"></i>
                        </div>
                        <div style="font-size:0.75rem; font-weight:700; color:#fff;">${c.title}</div>
                        <div style="display:flex; gap:5px; margin-top:5px;">
                            <span style="font-size:0.5rem; background:#111; padding:2px 6px; border-radius:4px; border:1px solid #333;">${c.platform}</span>
                            <span style="font-size:0.5rem; background:#111; padding:2px 6px; border-radius:4px; border:1px solid #333;">${c.metadata?.responsible || 'Design'}</span>
                        </div>
                    </div>
                `;
            }).join('');

            alertContainer.innerHTML = alertsHtml || '<p style="font-size:0.7rem; opacity:0.5; text-align:center;">Nenhum alerta crítico no momento.</p>';
        }

        const renderActivity = async () => {
            const logContainer = document.getElementById('activity-log');
            const supabase = getSupabase();
            
            if (supabase) {
                const { data, error } = await supabase.from('audit_logs').select('*').limit(5).order('created_at', { ascending: false });
                if (!error && data && data.length > 0) {
                    logContainer.innerHTML = data.map(log => `
                        <div class="log-entry">
                            <span class="log-time">[${new Date(log.created_at).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}]</span>
                            <span class="log-user">SISTEMA:</span>
                            <span class="log-msg">${log.action}</span>
                        </div>
                    `).join('');
                    return;
                }
            }
 
            logContainer.innerHTML = `<div class="log-entry" style="opacity:0.5;">Aguardando novas atividades sincronizadas...</div>`;
        };

        initPage();
    </script>
</body>
</html>
