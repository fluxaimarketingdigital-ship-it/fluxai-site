<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FluxAI OS™ | Command Center</title>
    <link rel="stylesheet" href="/src/styles/os/interface.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

</head>
<body class="os-mode">

    <div class="os-shell">
        <!-- SIDEBAR (Renderizada via Core) -->
        <aside class="os-sidebar"></aside>

        <div class="os-viewport-wrapper" style="display: flex; flex-direction: column; width: 100%;">
            <!-- TOPBAR (Renderizada via Core) -->
            <header class="os-topbar"></header>

            <main class="os-viewport">
                <div class="os-page-title">
                    <h1 id="page-title">Command Center</h1>
                    <p id="page-desc">Visão geral da inteligência e estados operacionais da FluxAI Labs.</p>
                </div>

                <div class="os-widget-grid">
                    <!-- MÉTRICAS PRINCIPAIS (Containers) -->
                    <div class="os-widget" id="metric-comercial" style="grid-column: span 3;"></div>
                    <div class="os-widget" id="metric-conteudo" style="grid-column: span 3;"></div>
                    <div class="os-widget" id="metric-crm" style="grid-column: span 3;"></div>
                    <div class="os-widget" id="metric-roas" style="grid-column: span 3;"></div>

                    <!-- CENTRAL DE ALERTAS -->
                    <div class="os-widget" style="grid-column: span 4; grid-row: span 2;">
                        <div class="os-widget-header">
                            <span class="os-widget-label">Central de Alertas</span>
                        </div>
                        <div class="os-alert-list" id="alerts-container">
                            <!-- Injetado via data -->
                        </div>
                    </div>

                    <!-- PIPELINE OPERACIONAL -->
                    <div class="os-widget" style="grid-column: span 8;">
                        <div class="os-widget-header">
                            <span class="os-widget-label">Pipeline Estratégico (Fluxo de Estados)</span>
                        </div>
                        <div class="os-pipeline" id="pipeline-container">
                            <!-- Injetado via data -->
                        </div>
                    </div>

                    <!-- ATIVIDADE OPERACIONAL -->
                    <div class="os-widget" style="grid-column: span 8;">
                        <div class="os-widget-header">
                            <span class="os-widget-label">Atividade Operacional Recente</span>
                        </div>
                        <div class="os-activity-log" id="activity-log">
                            <!-- Injetado via data -->
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <!-- CORE ENGINE INITIALIZATION -->
    <script type="module">
        import { OS_UI, OS_AUTH } from './js/os-core.js';
        import { getSupabase } from './services/supabase-client.js';
        
        async function init() {
            // 1. Validar Acesso Real
            const user = await OS_AUTH.check();
            if (!user) return;

            // 2. Renderizar Base Global
            OS_UI.renderSidebar('command-center');
            await OS_UI.renderTopbar();
 
            // 3. Mock Data para demonstração inicial
            OS_UI.renderMetric('metric-comercial', { label: 'Fluxo Comercial', value: '14.2', trend: '+12.5%', meta: 'vs semana anterior' });
            OS_UI.renderMetric('metric-conteudo', { label: 'Eficiência de Conteúdo', value: '88%', trend: '-2.1%', meta: 'Ação Necessária' });
            OS_UI.renderMetric('metric-crm', { label: 'Saúde do CRM', value: '94.5', trend: '+5.2', meta: 'Pontos de Ativos' });
            OS_UI.renderMetric('metric-roas', { label: 'ROAS Operacional', value: '6.8x', trend: '+0.4x', meta: 'Estável' });
 
            // Injeção de Alertas e Pipeline (Mock por enquanto)
            document.getElementById('alerts-container').innerHTML = `
                <div class="os-alert-item">
                    <div class="os-alert-icon" style="color: var(--os-danger);"><i class="fa-solid fa-circle-exclamation"></i></div>
                    <div class="os-alert-content"><h4>Desconexão API CRM</h4><p>Impacto: Receita | Prioridade: Alta</p></div>
                </div>
                <div class="os-alert-item">
                    <div class="os-alert-icon" style="color: var(--os-success);"><i class="fa-solid fa-circle-check"></i></div>
                    <div class="os-alert-content"><h4>Lote Editorial Aprovado</h4><p>Impacto: Autoridade | 1h atrás</p></div>
                </div>
            `;
 
            document.getElementById('pipeline-container').innerHTML = `
                <div class="os-pipeline-stage"><span class="stage-label">Diagnóstico</span><div class="stage-track"><div class="stage-progress" style="width: 40%;"></div></div><span class="stage-value">08</span></div>
                <div class="os-pipeline-stage"><span class="stage-label">Implementação</span><div class="stage-track"><div class="stage-progress" style="width: 70%;"></div></div><span class="stage-value">12</span></div>
            `;
 
            // 4. Atividade Real via Supabase
            await renderActivity();
        }
 
        const renderActivity = async () => {
            const logContainer = document.getElementById('activity-log');
            const supabase = getSupabase();
            
            if (supabase) {
                const { data, error } = await supabase.from('audit_logs').select('*').limit(5).order('created_at', { ascending: false });
                if (!error && data && data.length > 0) {
                    logContainer.innerHTML = data.map(log => `
                        <div class="log-entry">
                            <span class="log-time">[${new Date(log.created_at).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}]</span>
                            <span class="log-user">SISTEMA:</span>
                            <span class="log-msg">${log.action}</span>
                        </div>
                    `).join('');
                    return;
                }
            }
 
            // Fallback mock
            logContainer.innerHTML = `
                <div class="log-entry"><span class="log-time">[17:05]</span><span class="log-user">ADMIN:</span><span class="log-msg">Atualizou protocolos de CRM Intelligence.</span></div>
                <div class="log-entry"><span class="log-time">[16:42]</span><span class="log-user">SISTEMA:</span><span class="log-msg">Auto-scaling ativado no cluster de automação.</span></div>
            `;
        };
 
        init();
    </script>
</body>
</html>
