<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FluxAI OS™ | Centro de Comando</title>
    <link rel="stylesheet" href="./styles/interface.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" integrity="sha384-PPIZEGYM1v8zp5Py7UjFb79S58UeqCL9pYVnVPURKEqvioPROaVAJKKLzvH2rDnI" crossorigin="anonymous" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
    <style>
        /* Estilos específicos para a Central de Alertas Críticos */
        .os-alert-item {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: var(--os-space-3);
            border-radius: var(--os-radius-md);
            margin-bottom: var(--os-space-2);
            display: flex;
            gap: var(--os-space-3);
            transition: var(--os-transition);
        }

        .os-alert-item:hover {
            background: rgba(255, 255, 255, 0.04);
            border-color: var(--os-border-strong);
        }
    </style>
</head>
<body class="os-mode">
    <div class="os-bg-glow"></div>
    <div class="os-shell">
        <aside class="os-sidebar"></aside>

        <div class="os-viewport-wrapper">
            <header class="os-topbar"></header>

            <main class="os-viewport">
                <div class="os-page-title">
                    <h1>Centro de Comando</h1>
                    <p>Orquestração estratégica e estados operacionais em tempo real.</p>
                </div>

                <div class="os-widget-grid" id="metrics-grid">
                    <div style="opacity: 0.5; padding: 20px; grid-column: span 12;">Sincronizando com Google Sheets via Make...</div>
                </div>

                <div class="os-widget-grid" style="margin-top: 20px;">
                    <!-- CENTRAL DE ALERTAS CRÍTICOS -->
                    <div class="os-widget" style="grid-column: span 4;">
                        <div class="os-widget-header">
                            <span class="os-widget-label">Alertas Operacionais</span>
                        </div>
                        <div class="os-alert-list" id="alerts-container">
                            <!-- Injetado via data -->
                        </div>
                    </div>

                    <!-- CLIENT HEALTH -->
                    <div class="os-widget" style="grid-column: span 8;">
                        <div class="os-widget-header">
                            <span class="os-widget-label">Client Health & Status de Integração</span>
                        </div>
                        <div id="health-table-container">
                            <!-- Injetado via JS -->
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.106.2/dist/umd/supabase.min.js" integrity="sha384-4Cjkyy4cE1EgIS0C+Y3xzGmJ2noQFRRU91yKAW8IxtPfVtbQXPMqadSc3sYnjwou" crossorigin="anonymous"></script>
    <script type="module" src="./js/modules/command-center.js"></script>
</body>
</html>
