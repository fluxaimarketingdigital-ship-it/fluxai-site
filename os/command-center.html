<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FluxAI OS™ | Centro de Comando</title>
    <link rel="stylesheet" href="./styles/interface.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
    <style>
        :root {
            --os-primary: #8e9e68;
            --os-bg: #050705;
            --os-surface: rgba(15, 18, 15, 0.7);
            --os-border: rgba(142, 158, 104, 0.15);
            --os-text: #e0e0e0;
            --os-text-muted: #888;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --os-success: #10b981;
            --os-warning: #f59e0b;
            --os-danger: #ef4444;
        }

        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background-color: var(--os-bg);
            color: var(--os-text);
            overflow: hidden;
        }

        /* BACKGROUND SYSTEM */
        .os-bg-glow {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: 
                radial-gradient(circle at 0% 0%, rgba(142, 158, 104, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 100% 100%, rgba(142, 158, 104, 0.1) 0%, transparent 40%);
            z-index: -1;
        }

        .os-shell {
            display: flex;
            height: 100vh;
            background: transparent;
        }

        /* SIDEBAR & TOPBAR REFINEMENTS */
        .os-sidebar {
            width: 280px;
            background: rgba(10, 12, 10, 0.8);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-right: 1px solid var(--os-border);
            z-index: 100;
        }

        .os-viewport-wrapper {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        .os-topbar {
            height: 70px;
            background: rgba(10, 12, 10, 0.4);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-bottom: 1px solid var(--os-border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 40px;
            z-index: 90;
        }

        .os-viewport {
            flex: 1;
            padding: 40px;
            overflow-y: auto;
            scroll-behavior: smooth;
        }

        /* TYPOGRAPHY */
        .os-page-title h1 {
            font-size: 2.2rem;
            font-weight: 800;
            letter-spacing: -1.5px;
            margin: 0;
            background: linear-gradient(to right, #fff, var(--os-primary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .os-page-title p {
            color: var(--os-text-muted);
            font-size: 0.9rem;
            margin-top: 5px;
        }

        /* GLASS WIDGETS */
        .os-widget-grid {
            display: grid;
            grid-template-columns: repeat(12, 1fr);
            gap: 20px;
            margin-top: 30px;
        }

        .os-widget {
            background: var(--os-surface);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--os-border);
            border-radius: 16px;
            padding: 20px;
            transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
            position: relative;
            overflow: hidden;
        }

        .os-widget:hover {
            transform: translateY(-5px);
            border-color: rgba(142, 158, 104, 0.4);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .os-widget::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 2px;
            background: linear-gradient(90deg, transparent, var(--os-primary), transparent);
            opacity: 0.3;
        }

        .os-widget-label {
            font-size: 0.65rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--os-primary);
            opacity: 0.8;
        }

        /* METRICS */
        .os-metric-value {
            font-size: 2rem;
            font-weight: 800;
            margin: 10px 0;
            color: #fff;
        }

        .os-metric-meta {
            font-size: 0.7rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .trend-up { color: var(--os-success); }
        .trend-down { color: var(--os-danger); }

        /* ALERTS */
        .os-alert-item {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--glass-border);
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 10px;
            display: flex;
            gap: 12px;
            transition: 0.3s;
        }

        .os-alert-item:hover {
            background: rgba(255, 255, 255, 0.04);
        }

        /* ACTIVITY LOG */
        .log-entry {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.75rem;
            padding: 8px 0;
            border-bottom: 1px solid rgba(255,255,255,0.03);
            display: flex;
            gap: 10px;
        }

        .log-time { color: var(--os-primary); opacity: 0.6; }
        .log-user { font-weight: 700; color: #fff; }
        .log-msg { color: var(--os-text-muted); }

        /* ANIMATIONS */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .os-widget { animation: fadeInUp 0.5s ease backwards; }
        .os-widget:nth-child(1) { animation-delay: 0.1s; }
        .os-widget:nth-child(2) { animation-delay: 0.15s; }
        .os-widget:nth-child(3) { animation-delay: 0.2s; }
        .os-widget:nth-child(4) { animation-delay: 0.25s; }

        /* SCROLLBAR */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(142, 158, 104, 0.2); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--os-primary); }
    </style>
</head>
<body class="os-mode">
    <div class="os-bg-glow"></div>
    <div class="os-shell">
        <aside class="os-sidebar"></aside>

        <div class="os-viewport-wrapper">
            <header class="os-topbar"></header>

            <main class="os-viewport">
                <div class="os-page-title">
                    <h1>Centro de Comando</h1>
                    <p>Orquestração estratégica e estados operacionais em tempo real.</p>
                </div>

                <div class="os-widget-grid" id="metrics-grid">
                    <div style="opacity: 0.5; padding: 20px; grid-column: span 12;">Sincronizando com Google Sheets via Make...</div>
                </div>

                <div class="os-widget-grid" style="margin-top: 20px;">
                    <!-- CENTRAL DE ALERTAS CRÍTICOS -->
                    <div class="os-widget" style="grid-column: span 4;">
                        <div class="os-widget-header">
                            <span class="os-widget-label">Alertas Operacionais</span>
                        </div>
                        <div class="os-alert-list" id="alerts-container">
                            <!-- Injetado via data -->
                        </div>
                    </div>

                    <!-- CLIENT HEALTH -->
                    <div class="os-widget" style="grid-column: span 8;">
                        <div class="os-widget-header">
                            <span class="os-widget-label">Client Health & Status de Integração</span>
                        </div>
                        <div id="health-table-container">
                            <!-- Injetado via JS -->
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script type="module" src="./js/modules/command-center.js"></script>
</body>
</html>
