<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FluxAI OS™ | Relatório Mensal (Operação Make)</title>
    <link rel="stylesheet" href="./styles/interface.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
    <style>
        :root { --os-primary: #8e9e68; --os-bg: #050705; --os-surface: rgba(15, 18, 15, 0.7); --os-border: rgba(142, 158, 104, 0.15); --os-text: #e0e0e0; --os-text-muted: #888; }
        body { margin: 0; font-family: 'Inter', sans-serif; background-color: var(--os-bg); color: var(--os-text); overflow: hidden; }
        .os-bg-glow { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle at 0% 0%, rgba(142, 158, 104, 0.15) 0%, transparent 40%), radial-gradient(circle at 100% 100%, rgba(142, 158, 104, 0.1) 0%, transparent 40%); z-index: -1; }
        .os-shell { display: flex; height: 100vh; }
        .os-sidebar { width: 280px; background: rgba(10, 12, 10, 0.8); backdrop-filter: blur(20px); border-right: 1px solid var(--os-border); z-index: 100; }
        .os-viewport-wrapper { flex: 1; display: flex; flex-direction: column; overflow: hidden; position: relative; }
        .os-topbar { height: 70px; background: rgba(10, 12, 10, 0.4); backdrop-filter: blur(15px); border-bottom: 1px solid var(--os-border); display: flex; align-items: center; justify-content: space-between; padding: 0 40px; z-index: 90; }
        .os-viewport { flex: 1; padding: 40px; overflow-y: auto; }
        .os-page-title h1 { font-size: 2.2rem; font-weight: 800; margin: 0; background: linear-gradient(to right, #fff, var(--os-primary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .os-page-title p { color: var(--os-text-muted); font-size: 0.9rem; margin-top: 5px; }
        
        .os-widget-grid { display: grid; grid-template-columns: repeat(12, 1fr); gap: 20px; margin-top: 30px; }
        .os-widget { background: var(--os-surface); border: 1px solid var(--os-border); border-radius: 16px; padding: 20px; position: relative; overflow: hidden; grid-column: span 12; }
        .os-widget.half { grid-column: span 6; }
        .os-widget-label { font-size: 0.65rem; font-weight: 800; text-transform: uppercase; letter-spacing: 2px; color: var(--os-primary); }
        
        .report-card { background: rgba(255,255,255,0.02); border: 1px solid var(--os-border); border-radius: 12px; padding: 15px; margin-bottom: 15px; }
        .report-header { display: flex; justify-content: space-between; margin-bottom: 15px; padding-bottom: 10px; border-bottom: 1px solid var(--os-border); }
        .report-title { font-weight: 700; font-size: 1.1rem; color: #fff; }
        .report-meta { color: var(--os-primary); font-size: 0.8rem; font-weight: 600; }
        
        .report-stats { display: flex; gap: 15px; margin-bottom: 15px; }
        .stat-box { background: rgba(0,0,0,0.3); padding: 10px; border-radius: 8px; flex: 1; text-align: center; border: 1px solid rgba(255,255,255,0.05); }
        .stat-value { font-size: 1.2rem; font-weight: 800; color: #fff; }
        .stat-label { font-size: 0.6rem; color: var(--os-text-muted); text-transform: uppercase; }

        .report-content h4 { margin: 10px 0 5px; font-size: 0.8rem; color: var(--os-primary); text-transform: uppercase; }
        .report-content p { font-size: 0.85rem; color: #ccc; margin: 0 0 10px 0; line-height: 1.4; }

        .badge { padding: 4px 8px; border-radius: 12px; font-size: 0.7rem; font-weight: 700; text-transform: uppercase; }
        .badge.rascunho { background: rgba(245, 158, 11, 0.1); color: #f59e0b; border: 1px solid rgba(245, 158, 11, 0.3); }
        .badge.em_revisao { background: rgba(59, 130, 246, 0.1); color: #3b82f6; border: 1px solid rgba(59, 130, 246, 0.3); }
    </style>
</head>
<body>
    <div class="os-bg-glow"></div>
    <div class="os-shell">
        <aside class="os-sidebar"></aside>
        <div class="os-viewport-wrapper">
            <header class="os-topbar"></header>
            <main class="os-viewport">
                <div class="os-page-title">
                    <h1>Relatórios Mensais</h1>
                    <p>Rascunhos consolidados pelo Make aguardando revisão interna.</p>
                </div>
                
                <div class="os-widget-grid" id="reports-grid">
                    <div style="opacity: 0.5; padding: 20px;">Sincronizando com Google Sheets via Make...</div>
                </div>
            </main>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script type="module" src="./js/modules/monthly-analysis.js"></script>
</body>
</html>
