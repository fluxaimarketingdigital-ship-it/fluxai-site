<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FluxAI OS™ | Planejamento Estratégico</title>
    <link rel="stylesheet" href="/src/styles/os/interface.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" integrity="sha384-PPIZEGYM1v8zp5Py7UjFb79S58UeqCL9pYVnVPURKEqvioPROaVAJKKLzvH2rDnI" crossorigin="anonymous" />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.106.2/dist/umd/supabase.min.js" integrity="sha384-4Cjkyy4cE1EgIS0C+Y3xzGmJ2noQFRRU91yKAW8IxtPfVtbQXPMqadSc3sYnjwou" crossorigin="anonymous"></script>
    <style>
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 10px; margin-top: 30px; }
        .calendar-day { background: var(--os-surface); border: 1px solid var(--os-border); border-radius: 12px; min-height: 140px; padding: 12px; position: relative; transition: 0.3s; }
        .calendar-day:hover { border-color: var(--os-primary); background: rgba(168,85,247,0.05); }
        .calendar-day.empty { opacity: 0.2; background: transparent; border: none; }
        .day-number { font-size: 0.8rem; font-weight: 800; color: var(--os-primary); margin-bottom: 10px; opacity: 0.5; }
        
        .calendar-event { background: rgba(107,122,69,0.15); border-left: 3px solid var(--os-primary); padding: 8px; border-radius: 6px; font-size: 0.7rem; margin-bottom: 8px; cursor: pointer; transition: 0.2s; color: #fff; line-height: 1.3; }
        .calendar-event:hover { background: var(--os-primary); transform: translateX(5px); }
        .event-status { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 6px; }
        
        .workspace-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px; border-bottom: 1px solid var(--os-border); padding-bottom: 20px; }
        .client-info { display: flex; align-items: center; gap: 20px; }
        .client-logo { width: 50px; height: 50px; border-radius: 12px; background: linear-gradient(135deg, var(--os-primary), #4c5631); display: flex; align-items: center; justify-content: center; font-weight: 900; font-size: 1.2rem; color: #fff; box-shadow: 0 4px 15px rgba(107,122,69,0.3); }
        
        .os-badge { padding: 6px 12px; border-radius: 20px; font-size: 0.75rem; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; }

        @media (max-width: 768px) {
            .calendar-grid { grid-template-columns: repeat(2, 1fr); }
            .workspace-header { flex-direction: column; align-items: flex-start; gap: 20px; }
        }
    </style>

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="../assets/icons/favicon-os.png" />
    <link rel="shortcut icon" href="../assets/icons/favicon-os.png" type="image/x-icon" />
    <link rel="apple-touch-icon" href="../assets/icons/favicon-os.png" />
</head>
<body class="os-mode">
    <div class="os-layout">
        <main class="os-viewport" style="margin-left:0; padding: 40px; max-width: 1400px; margin: 0 auto;">
            <header class="workspace-header">
                <div class="client-info">
                    <div class="client-logo" id="client-initials">FX</div>
                    <div>
                        <h1 id="client-name" style="font-size:1.8rem; margin:0; letter-spacing: -1px;">Carregando Planejamento...</h1>
                        <p id="workspace-period" style="font-size:0.9rem; opacity:0.5; margin:5px 0 0 0;">FluxAI OS™ Strategy Engine</p>
                    </div>
                </div>
                <div class="workspace-stats" style="display:flex; gap:15px;">
                    <div class="os-badge" id="stat-pending" style="background: rgba(245,158,11,0.2); color: #f59e0b; border: 1px solid #f59e0b;">-- Pendentes</div>
                    <div class="os-badge" id="stat-approved" style="background: rgba(16,185,129,0.2); color: #10b981; border: 1px solid #10b981;">-- Aprovados</div>
                </div>
            </header>

            <div class="calendar-grid" id="calendar-body">
                <!-- Conteúdo Gerado Automaticamente -->
            </div>
        </main>
    </div>

    <script type="module">
        import { getSupabase } from './services/supabase-client.js';
        import { OS_AUTH } from './js/os-core.js';
        import { OS_LOGS_ENGINE } from './services/logs-engine.js';

        async function initCalendar() {
            const statusEl = document.getElementById('client-name');

            // 1. Enforce Authentication Check
            let session = null;
            try {
                session = await OS_AUTH.check('CLIENT');
            } catch (authErr) {
                console.error('[AUTH] Falha na autenticação do calendário:', authErr);
                statusEl.innerText = "Acesso Negado: Autenticação necessária.";
                return;
            }

            if (!session) {
                statusEl.innerText = "Acesso Negado: Sessão inválida.";
                return;
            }

            const params = new URLSearchParams(window.location.search);
            let projectId = params.get('project');

            // 2. CROSS-TENANT SECURITY (IDOR PROTECTION)
            if (session.role === 'CLIENT') {
                const officialId = session.project_id;
                if (!officialId) {
                    statusEl.innerText = "Acesso Negado: Nenhum projeto vinculado a esta conta.";
                    document.getElementById('workspace-period').innerText = "Por favor, entre em contato com o suporte.";
                    return;
                }
                if (!projectId || projectId !== officialId) {
                    if (projectId && projectId !== officialId && typeof OS_LOGS_ENGINE !== 'undefined') {
                        OS_LOGS_ENGINE.security('IDOR_ATTEMPT_BLOCKED', { 
                            module: 'flux-calendar',
                            requested: projectId, 
                            official: officialId 
                        }, 'high');
                    }
                    console.error('[SECURITY] Forcing official project ID in Calendar.');
                    projectId = officialId;
                    const newUrl = window.location.protocol + "//" + window.location.host + window.location.pathname + "?project=" + encodeURIComponent(officialId);
                    window.history.replaceState({path: newUrl}, '', newUrl);
                }
            } else if (['ADMIN', 'OPERATOR'].includes(session.role)) {
                if (!projectId) {
                    statusEl.innerText = "Parâmetro 'project' ausente na URL.";
                    document.getElementById('workspace-period').innerText = "Adicione ?project=ID_DO_PROJETO para visualizar.";
                    return;
                }
                if (typeof OS_LOGS_ENGINE !== 'undefined') {
                    OS_LOGS_ENGINE.userAction(
                        'VIEW_CALENDAR', 
                        'flux-calendar', 
                        { viewed_project: projectId }, 
                        session.role, 
                        session.project_id
                    );
                }
            }

            try {
                const supabase = getSupabase();
                statusEl.innerText = "🔌 Conectando ao FluxAI Engine...";
                
                // 1. Buscar Projeto
                const { data: project, error: pErr } = await supabase.from('projects').select('company_name').eq('id', projectId).maybeSingle();
                
                if (pErr) throw pErr;
                if (!project) {
                    statusEl.innerText = "Projeto não encontrado.";
                    return;
                }

                statusEl.innerText = project.company_name;
                document.getElementById('client-initials').innerText = project.company_name.substring(0, 2).toUpperCase();
                statusEl.innerText = "📅 Sincronizando Calendário...";

                // 2. Buscar Conteúdos
                const { data: contents, error: cErr } = await supabase.from('content_assets')
                    .select('*')
                    .eq('project_id', projectId)
                    .order('scheduled_at', { ascending: true });

                if (cErr) throw cErr;

                statusEl.innerText = project.company_name;
                renderCalendar(contents || []);
                updateStats(contents || []);

            } catch (err) {
                console.error('[CRITICAL] Falha no Workspace:', err);
                statusEl.innerText = "Erro na conexão. Clique para tentar novamente.";
                statusEl.style.cursor = "pointer";
                statusEl.onclick = () => location.reload();
            }
        }

        function renderCalendar(contents) {
            const container = document.getElementById('calendar-body');
            container.innerHTML = '';
            
            let targetDate = new Date();
            if (contents.length > 0 && contents[0].scheduled_at) {
                targetDate = new Date(contents[0].scheduled_at);
            }
            
            const year = targetDate.getFullYear();
            const month = targetDate.getMonth();
            const monthNames = ["Janeiro", "Fevereiro", "Março", "Abril", "Maio", "Junho", "Julho", "Agosto", "Setembro", "Outubro", "Novembro", "Dezembro"];
            document.getElementById('workspace-period').innerText = `Planejamento Estratégico Mensal | ${monthNames[month]} ${year}`;

            const firstDay = new Date(year, month, 1).getDay();
            const daysInMonth = new Date(year, month + 1, 0).getDate();

            for (let i = 0; i < firstDay; i++) {
                container.innerHTML += `<div class="calendar-day empty"></div>`;
            }

            for (let day = 1; day <= daysInMonth; day++) {
                const dayStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
                const dayContents = contents.filter(c => c.scheduled_at && c.scheduled_at.startsWith(dayStr));
                
                let eventsHtml = dayContents.map(c => `
                    <div class="calendar-event" onclick="window.open('approval.html?id=${c.id}', '_blank')">
                        <span class="event-status" style="background:${getStatusColor(c.status)}"></span>
                        ${c.title}
                    </div>
                `).join('');

                container.innerHTML += `
                    <div class="calendar-day">
                        <div class="day-number">${day}</div>
                        ${eventsHtml}
                    </div>
                `;
            }
        }

        function getStatusColor(status) {
            if (status === 'PRONTO' || status === 'PUBLICADO') return '#10b981';
            if (status === 'AJUSTE') return '#ff4444';
            return '#f59e0b';
        }

        function updateStats(contents) {
            const pending = contents.filter(c => c.status !== 'PRONTO' && c.status !== 'PUBLICADO').length;
            const approved = contents.filter(c => c.status === 'PRONTO' || c.status === 'PUBLICADO').length;
            document.getElementById('stat-pending').innerText = `${pending} Pendentes`;
            document.getElementById('stat-approved').innerText = `${approved} Aprovados`;
        }

        // Boot
        initCalendar();
    </script>
</body>
</html>
