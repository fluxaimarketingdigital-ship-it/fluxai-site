<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <title>DEBUG: FluxAI Calendar</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; padding: 50px; }
        #debug-status { border: 2px solid #a855f7; padding: 20px; border-radius: 10px; background: #1a1a1a; }
        .loading-step { margin: 10px 0; color: #888; }
        .loading-step.active { color: #a855f7; font-weight: bold; }
        .loading-step.done { color: #10b981; }
        .loading-step.error { color: #ff4444; }
    </style>
</head>
<body>
    <div id="debug-status">
        <h1 style="color: #a855f7">FluxAI OS™ | Diagnóstico de Conexão</h1>
        <div id="step-1" class="loading-step active">1. Iniciando Script...</div>
        <div id="step-2" class="loading-step">2. Conectando ao Banco (Supabase)...</div>
        <div id="step-3" class="loading-step">3. Buscando Projeto...</div>
        <div id="step-4" class="loading-step">4. Renderizando Calendário...</div>
    </div>

    <div id="calendar-container" style="margin-top: 30px;"></div>

    <script>
        const supabaseUrl = "https://mufgwetfhfhhmhowbhjj.supabase.co";
        const supabaseKey = "sb_publishable_Ui_zR38kkGVdTxRUELcRfw_5ahurUs5";
        
        function updateStep(id, status) {
            const el = document.getElementById('step-' + id);
            if (!el) return;
            el.className = 'loading-step ' + status;
            if (status === 'active') el.innerHTML = el.innerText.split(' ')[0] + ' ' + el.innerText.split(' ').slice(1).join(' ') + ' ⏳';
            if (status === 'done') el.innerHTML = el.innerText.split(' ')[0] + ' ' + el.innerText.split(' ').slice(1).join(' ') + ' ✅';
            if (status === 'error') el.innerHTML = el.innerText.split(' ')[0] + ' ' + el.innerText.split(' ').slice(1).join(' ') + ' ❌';
        }

        async function startDiagnostic() {
            console.log('[DEBUG] Iniciando diagnóstico...');
            updateStep(1, 'done');
            updateStep(2, 'active');

            const params = new URLSearchParams(window.location.search);
            const projectId = params.get('project');

            if (!projectId) {
                updateStep(2, 'error');
                alert('ID do projeto ausente na URL');
                return;
            }

            if (!window.supabase) {
                updateStep(2, 'error');
                document.getElementById('debug-status').innerHTML += `<p style="color:red">Erro: Biblioteca Supabase não carregou!</p>`;
                return;
            }

            try {
                const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);
                
                // Teste de conexão simples
                const { data: test, error: err } = await supabase.from('projects').select('id').limit(1);
                if (err) throw err;
                updateStep(2, 'done');
                
                updateStep(3, 'active');
                const { data: contents } = await supabase.from('content_assets').select('*').eq('project_id', projectId);
                updateStep(3, 'done');

                updateStep(4, 'active');
                document.getElementById('calendar-container').innerHTML = `
                    <div style="border:1px solid #10b981; padding:20px; border-radius:8px;">
                        <h2 style="color:#10b981">Conexão Estabelecida!</h2>
                        <p>Encontramos ${contents?.length || 0} posts para este projeto.</p>
                        <button onclick="location.reload()" style="padding:10px 20px; background:#a855f7; border:none; color:white; border-radius:5px; cursor:pointer">Tentar abrir versão final</button>
                    </div>
                `;
                updateStep(4, 'done');
            } catch (e) {
                console.error(e);
                updateStep(2, 'error');
                document.getElementById('debug-status').innerHTML += `<p style="color:red">Erro na Conexão: ${e.message}</p>`;
            }
        }

        // Disparo imediato
        document.addEventListener('DOMContentLoaded', startDiagnostic);
    </script>
</body>
</html>
