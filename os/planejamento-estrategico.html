<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FluxAI OS™ | Planejamento Estratégico</title>
    <link rel="stylesheet" href="/src/styles/os/interface.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 10px; margin-top: 30px; }
        .calendar-day { background: var(--os-surface); border: 1px solid var(--os-border); border-radius: 12px; min-height: 140px; padding: 12px; position: relative; transition: 0.3s; }
        .calendar-day:hover { border-color: var(--os-primary); background: rgba(168,85,247,0.05); }
        .calendar-day.empty { opacity: 0.2; background: transparent; border: none; }
        .day-number { font-size: 0.8rem; font-weight: 800; color: var(--os-primary); margin-bottom: 10px; opacity: 0.5; }
        .calendar-event { background: rgba(107,122,69,0.15); border-left: 3px solid var(--os-primary); padding: 8px; border-radius: 6px; font-size: 0.7rem; margin-bottom: 8px; cursor: pointer; transition: 0.2s; color: #fff; line-height: 1.3; }
        .calendar-event:hover { background: var(--os-primary); transform: translateX(5px); }
        .event-status { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 6px; }
        .workspace-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px; border-bottom: 1px solid var(--os-border); padding-bottom: 20px; }
        .client-info { display: flex; align-items: center; gap: 20px; }
        .client-logo { width: 50px; height: 50px; border-radius: 12px; background: linear-gradient(135deg, var(--os-primary), #8b5cf6); display: flex; align-items: center; justify-content: center; font-weight: 900; font-size: 1.2rem; color: #fff; box-shadow: 0 4px 15px rgba(168,85,247,0.3); }
        .os-badge { padding: 6px 12px; border-radius: 20px; font-size: 0.75rem; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; }
    </style>
</head>
<body class="os-mode">
    <div class="os-layout">
        <main class="os-viewport" style="margin-left:0; padding: 40px; max-width: 1400px; margin: 0 auto;">
            <header class="workspace-header">
                <div class="client-info">
                    <div class="client-logo" id="client-initials">FX</div>
                    <div>
                        <h1 id="client-name" style="font-size:1.8rem; margin:0; letter-spacing: -1px;">🔥 INICIANDO ENGINE FLUXAI...</h1>
                        <p id="workspace-period" style="font-size:0.9rem; opacity:0.5; margin:5px 0 0 0;">FluxAI OS™ Strategy Engine</p>
                    </div>
                </div>
                <div class="workspace-stats" style="display:flex; gap:15px;">
                    <div class="os-badge" id="stat-pending" style="background: rgba(245,158,11,0.2); color: #f59e0b; border: 1px solid #f59e0b;">-- Pendentes</div>
                    <div class="os-badge" id="stat-approved" style="background: rgba(16,185,129,0.2); color: #10b981; border: 1px solid #10b981;">-- Aprovados</div>
                </div>
            </header>
            <div class="calendar-grid" id="calendar-body"></div>
        </main>
    </div>

    <script>
        const supabaseUrl = "https://mufgwetfhfhhmhowbhjj.supabase.co";
        const supabaseKey = "sb_publishable_Ui_zR38kkGVdTxRUELcRfw_5ahurUs5";

        const CLIENT_VIEW_MATRIX = {
            'Direção Estratégica Audiovisual': 'REELS',
            'Direção Estratégica Visual': 'POST',
            'Estrutura Narrativa de Carrossel': 'CARROSSEL',
            'Arquitetura Estratégica Digital': 'SITE',
            'Arquitetura de Posicionamento': 'POSICIONAMENTO',
            'Estratégia de Aquisição': 'AQUISIÇÃO',
            'Arquitetura Operacional': 'AUTOMAÇÃO',
            'Estrutura de Relacionamento': 'CRM',
            'Infraestrutura Analítica': 'DASHBOARD',
            'Inteligência Operacional': 'IA',
            'Direção de Produção': 'CAPTAÇÃO',
            'Diagnóstico Estratégico': 'DIAGNÓSTICO',
            'Estrutura de Conversão': 'LANDING PAGE',
            'Engenharia Narrativa de Legenda': 'LEGENDA',
            'Estrutura Institucional': 'APRESENTAÇÃO',
            'Sistema de Identidade Visual': 'IDENTIDADE',
            'Arquitetura de Conversão': 'FUNIL',
            'Estrutura de Descoberta': 'SEO',
            'Fluxo Conversacional': 'WHATSAPP',
            'Infraestrutura Pública Digital': 'GOVOS'
        };

        function formatClientTitle(title) {
            if (!title) return 'Sem Título';
            if (title.includes(':')) {
                const parts = title.split(':');
                const internalName = parts[0].trim();
                const objective = parts[1].trim();
                const clientPrefix = CLIENT_VIEW_MATRIX[internalName] || internalName;
                return `${clientPrefix} • ${objective}`;
            }
            return title;
        }

        async function init() {
            const statusEl = document.getElementById('client-name');
            const params = new URLSearchParams(window.location.search);
            const projectId = params.get('project');

            if (!projectId) { statusEl.innerText = "Link Inválido"; return; }
            
            // Verificação de segurança da biblioteca
            if (!window.supabase) {
                statusEl.innerText = "❌ Erro: Motor de IA não carregou. Recarregue a página.";
                return;
            }

            try {
                const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);
                statusEl.innerText = "🔌 Conectando ao Banco...";
                const { data: project } = await supabase.from('projects').select('company_name').eq('id', projectId).maybeSingle();
                if (project) {
                    statusEl.innerText = project.company_name;
                    document.getElementById('client-initials').innerText = project.company_name.substring(0, 2).toUpperCase();
                }

                statusEl.innerText = "📅 Sincronizando Estratégia...";
                const { data: contents } = await supabase.from('content_assets').select('*').eq('project_id', projectId).order('scheduled_at', { ascending: true });
                
                statusEl.innerText = project ? project.company_name : "Planejamento Estratégico";
                renderCalendar(contents || []);
                updateStats(contents || []);
            } catch (err) {
                console.error(err);
                statusEl.innerText = "Erro na conexão. Recarregue.";
            }
        }

        function renderCalendar(contents) {
            const container = document.getElementById('calendar-body');
            container.innerHTML = '';
            let targetDate = new Date();
            if (contents.length > 0 && contents[0].scheduled_at) targetDate = new Date(contents[0].scheduled_at);
            const year = targetDate.getFullYear();
            const month = targetDate.getMonth();
            const firstDay = new Date(year, month, 1).getDay();
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            for (let i = 0; i < firstDay; i++) container.innerHTML += `<div class="calendar-day empty"></div>`;
            for (let day = 1; day <= daysInMonth; day++) {
                const dayStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
                const dayContents = contents.filter(c => c.scheduled_at && c.scheduled_at.startsWith(dayStr));
                let eventsHtml = dayContents.map(c => `<div class="calendar-event" onclick="window.open('/os/approval.html?id=${c.id}', '_blank')">${formatClientTitle(c.title)}</div>`).join('');
                container.innerHTML += `<div class="calendar-day"><div class="day-number">${day}</div>${eventsHtml}</div>`;
            }
        }

        function updateStats(contents) {
            const pending = contents.filter(c => c.status !== 'PRONTO' && c.status !== 'PUBLICADO').length;
            const approved = contents.filter(c => c.status === 'PRONTO' || c.status === 'PUBLICADO').length;
            document.getElementById('stat-pending').innerText = `${pending} Pendentes`;
            document.getElementById('stat-approved').innerText = `${approved} Aprovados`;
        }

        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
