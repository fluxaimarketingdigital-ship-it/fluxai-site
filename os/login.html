<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FluxAI OS™ | Login</title>
    <link rel="stylesheet" href="./styles/interface.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <style>
        body.login-page {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #050505;
        }
        .login-card {
            width: 100%;
            max-width: 400px;
            padding: 50px;
            background: var(--os-sidebar);
            border: 1px solid var(--os-border);
            border-radius: 8px;
            text-align: center;
        }
        .login-header { margin-bottom: 40px; }
        .login-brand { font-weight: 800; font-size: 1.2rem; color: #fff; letter-spacing: 2px; }
        .login-brand span { color: var(--os-primary); }
        .login-form { text-align: left; }
        .form-group { margin-bottom: 25px; }
        .form-group label { display: block; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1.5px; color: var(--os-text-muted); margin-bottom: 10px; }
        .form-control { width: 100%; padding: 15px; background: rgba(255,255,255,0.03); border: 1px solid var(--os-border); border-radius: 4px; color: #fff; font-size: 0.9rem; transition: all 0.3s; }
        .form-control:focus { outline: none; border-color: var(--os-primary); background: rgba(255,255,255,0.05); }
        .btn-login { 
            width: 100%; 
            padding: 15px; 
            background: var(--os-primary); 
            border: none; 
            color: #000; 
            font-weight: 800; 
            border-radius: 4px; 
            cursor: pointer; 
            transition: all 0.2s; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            gap: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .btn-login:hover { opacity: 0.9; transform: translateY(-2px); box-shadow: 0 5px 15px rgba(168, 85, 247, 0.4); }
        .login-footer { margin-top: 30px; font-size: 0.8rem; color: var(--os-text-muted); }
    </style>
</head>
<body class="os-mode login-page">

    <div class="login-card">
        <div class="login-header">
            <div class="login-brand">
                FLUXAI <span>OS™</span>
            </div>
            <p style="color: var(--os-text-muted); font-size: 0.85rem; margin-top: 10px;">Ambiente Operacional Restrito</p>
        </div>

        <form class="login-form" id="loginForm">
            <div class="form-group">
                <label>E-mail de Acesso (Master / Cliente)</label>
                <input type="email" id="username" class="form-control" placeholder="seu@email.com" required />
            </div>
            <div class="form-group">
                <label>Chave de Acesso</label>
                <div style="position: relative; display: flex; align-items: center;">
                    <input type="password" id="password" class="form-control" placeholder="••••••••" required style="padding-right: 40px;" />
                    <i class="fa-solid fa-eye" id="togglePassword" style="position: absolute; right: 15px; color: var(--os-text-muted); cursor: pointer; font-size: 1.1rem; transition: color 0.2s;"></i>
                </div>
            </div>
            <button type="submit" class="btn-login">VALIDAR ACESSO <i class="fa-solid fa-shield-halved"></i></button>
        </form>

        <div class="login-footer">
            <p>Infraestrutura de Inteligência FluxAI Labs v1.1.0</p>
            <a href="/" style="color: var(--os-primary); text-decoration: none; display: block; margin-top: 15px;">Solicitar Acesso à Infraestrutura</a>
        </div>
    </div>

    <!-- Modal de Redefinição de Senha Obrigatória no Primeiro Acesso -->
    <div id="passwordResetModal" style="display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(10px); z-index: 1000; align-items: center; justify-content: center; padding: 20px;">
        <div class="login-card" style="border: 1px solid var(--os-primary); box-shadow: 0 0 25px rgba(142, 158, 104, 0.2);">
            <div class="login-header">
                <div class="login-brand" style="color: var(--os-primary); text-shadow: 0 0 10px rgba(142, 158, 104, 0.4);">
                    PRIMEIRO ACESSO
                </div>
                <p style="color: #fff; font-size: 0.95rem; margin-top: 15px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px;">Atualize sua Chave de Acesso</p>
                <p style="color: var(--os-text-muted); font-size: 0.75rem; margin-top: 8px; line-height: 1.4;">Por motivos de segurança corporativa, você deve definir uma senha pessoal robusta antes de prosseguir.</p>
            </div>
            <form class="login-form" id="passwordResetForm">
                <input type="hidden" id="resetUserId" />
                <div class="form-group">
                    <label>Nova Senha Pessoal</label>
                    <input type="password" id="newPassword" class="form-control" placeholder="Mínimo 6 caracteres" required minlength="6" />
                </div>
                <div class="form-group">
                    <label>Confirmar Nova Senha</label>
                    <input type="password" id="confirmNewPassword" class="form-control" placeholder="••••••••" required minlength="6" />
                </div>
                <button type="submit" class="btn-login" style="background: var(--os-primary); color: #000; font-weight: 800;">SALVAR E ENTRAR NO PAINEL <i class="fa-solid fa-check"></i></button>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script type="module">
        import { getSupabase } from './services/supabase-client.js';
        import { OS_LOGS_ENGINE } from './services/logs-engine.js';

        // Utilitário de hash
        async function sha256(message) {
            const msgBuffer = new TextEncoder().encode(message);
            const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
            const hashArray = Array.from(new Uint8Array(hashBuffer));
            return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
        }

        // Inicializador de usuários locais em memória (sem localStorage para evitar alertas CodeQL)
        let MEMORY_MOCK_USERS = null;
        
        const getMockUsers = () => { 
            if (!MEMORY_MOCK_USERS) { 
                MEMORY_MOCK_USERS = [ 
                    { id: 'u1', full_name: 'Admin FluxAI', email: 'admin@fluxai.com', passwordHash: 'fe79d404866023dfaed7035f13a194e77c3f18612edb20102f80d3368445a7c1', role: 'ADMIN', needsPasswordChange: false, permissions: ['command-center', 'onboarding', 'content-engine', 'crm-intelligence', 'analytics', 'automation-hub', 'contracts-finance', 'client-portal', 'governance-users'] }, 
                    { id: 'u2', full_name: 'Kassia Gomes', email: 'kassia@fluxai.com', passwordHash: 'fe79d404866023dfaed7035f13a194e77c3f18612edb20102f80d3368445a7c1', role: 'OPERATOR', needsPasswordChange: false, permissions: ['command-center', 'onboarding', 'content-engine', 'crm-intelligence', 'analytics', 'automation-hub'] }, 
                    { id: 'u3', full_name: 'Maria Aparecida', email: 'maria.nutri@gmail.com', passwordHash: 'fe79d404866023dfaed7035f13a194e77c3f18612edb20102f80d3368445a7c1', role: 'CLIENT', needsPasswordChange: false, permissions: ['client-portal'] } 
                ]; 
            } 
            return MEMORY_MOCK_USERS; 
        }; 
 
        const updateMockUserPassword = async (userId, newPassword) => { 
            const mockUsers = getMockUsers(); 
            const index = mockUsers.findIndex(u => u.id === userId); 
            if (index !== -1) { 
                mockUsers[index].passwordHash = await sha256(newPassword); 
                delete mockUsers[index].password; // remove plain text legacy if any 
                mockUsers[index].needsPasswordChange = false; 
                return mockUsers[index]; 
            } 
            return null; 
        };

        // Força semente inicial de usuários locais
        getMockUsers();

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button');
            const originalTextContent = [...btn.childNodes];
            
            const email = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value.trim();

            // Feedback Visual
            btn.replaceChildren();
            btn.appendChild(document.createTextNode('VALIDANDO... '));
            const spinnerIcon = document.createElement('i');
            spinnerIcon.className = 'fa-solid fa-spinner fa-spin';
            btn.appendChild(spinnerIcon);
            btn.disabled = true;

            // 1. Verificar primeiro autenticação local na chave mock
            const mockUsers = getMockUsers();
            const localUser = mockUsers.find(u => u.email.toLowerCase() === email.toLowerCase());

            if (localUser) {
                const enteredHash = await sha256(password);
                const isPasswordValid = localUser.passwordHash 
                    ? localUser.passwordHash === enteredHash 
                    : localUser.password === password;

                if (isPasswordValid) {
                    if (localUser.needsPasswordChange) {
                        // Exibir Modal de redefinição
                        document.getElementById('resetUserId').value = localUser.id;
                        document.getElementById('passwordResetModal').style.display = 'flex';
                        
                        // Resetar botão para estado normal
                        btn.replaceChildren(...originalTextContent);
                        btn.disabled = false;
                        return;
                    }

                    // Autenticação local concluída com sucesso! 
                    logUserIn(localUser.role, localUser.full_name, localUser.id, localUser.project_id); 
                    return; 
                } else {
                    alert('Chave de Acesso incorreta para esta credencial.');
                    if (typeof OS_LOGS_ENGINE !== 'undefined') {
                        OS_LOGS_ENGINE.security('SECURITY_ACCESS_DENIED', { email, reason: 'Senha mock incorreta' }, 'warning');
                    }
                    btn.replaceChildren(...originalTextContent);
                    btn.disabled = false;
                    return;
                }
            }

            // 2. Se não achou local, tenta Supabase se configurado
            const supabase = getSupabase();
            if (!supabase) {
                alert('Falha na Autenticação: Credencial não encontrada localmente e Supabase offline.');
                if (typeof OS_LOGS_ENGINE !== 'undefined') {
                    OS_LOGS_ENGINE.security('SECURITY_ACCESS_DENIED', { email, reason: 'Supabase offline e sem credencial local' }, 'critical');
                }
                btn.replaceChildren(...originalTextContent);
                btn.disabled = false;
                return;
            }

            const { data, error } = await supabase.auth.signInWithPassword({
                email: email,
                password: password
            });

            if (error) {
                alert('Falha na Autenticação: ' + error.message);
                if (typeof OS_LOGS_ENGINE !== 'undefined') {
                    OS_LOGS_ENGINE.security('SECURITY_ACCESS_DENIED', { email, reason: 'Erro Supabase auth: ' + error.message }, 'warning');
                }
                btn.replaceChildren(...originalTextContent);
                btn.disabled = false;
            } else {
                try {
                    // Buscar perfil para validar Role Real no banco de dados (tabela profiles)
                    const { data: profile, error: profileError } = await supabase
                        .from('profiles')
                        .select('role, full_name')
                        .eq('id', data.user.id)
                        .single();

                    const userRole = profile?.role || 'CLIENT';
                    const userName = profile?.full_name || data.user.email;

                    const finalUser = {
                        id: data.user.id,
                        full_name: userName,
                        email: email,
                        role: userRole,
                        permissions: userRole === 'ADMIN' ? ['command-center', 'onboarding', 'content-engine', 'crm-intelligence', 'analytics', 'automation-hub', 'contracts-finance', 'client-portal', 'governance-users'] : 
                                     userRole === 'OPERATOR' ? ['command-center', 'onboarding', 'content-engine', 'crm-intelligence', 'analytics', 'automation-hub'] : ['client-portal']
                    };

                    logUserIn(finalUser.role, finalUser.full_name, finalUser.id, finalUser.project_id); 
                } catch (profileErr) { 
                    console.error('[LOGIN_PROFILE_ERROR]', profileErr); 
                    logUserIn('CLIENT', email, data.user.id, null); 
                } 
            }
        });

        // Função utilitária para registrar a sessão e redirecionar de acordo com a regra de negócios 
        function logUserIn(userRole, userFullName, userId, userProjectId) { 
            // Registrar log de Login com OS_LOGS_ENGINE 
            if (typeof OS_LOGS_ENGINE !== 'undefined') { 
                OS_LOGS_ENGINE.userAction('AUTH_LOGIN', { user_id: userId, role: userRole }, false); 
            } 
 
            // Criar e persistir contexto mínimo de sessão não sensível para controle de UI e RBAC
            const uiContext = {
                id: userId,
                full_name: userFullName,
                role: String(userRole || 'CLIENT'),
                permissions: userRole === 'ADMIN' ? ['command-center', 'onboarding', 'content-engine', 'crm-intelligence', 'analytics', 'automation-hub', 'contracts-finance', 'client-portal', 'governance-users'] :  
                             userRole === 'OPERATOR' ? ['command-center', 'onboarding', 'content-engine', 'crm-intelligence', 'analytics', 'automation-hub'] : ['client-portal'],
                session_started_at: new Date().toISOString()
            };
            if (userProjectId) {
                uiContext.project_id = userProjectId;
            }
            // Não utilizar storage persistente para contexto derivado do auth (Exigência CodeQL)
            window.FLUXAI_RUNTIME_CONTEXT = uiContext;
            if (userRole === 'CLIENT') {  
                window.location.href = `client-portal.html${userProjectId ? '?project_id=' + userProjectId : ''}`;  
            } else {  
                window.location.href = 'command-center.html';  
            }  
        } 

        // Submissão do formulário de redefinição de senha
        document.getElementById('passwordResetForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const userId = document.getElementById('resetUserId').value;
            const newPassword = document.getElementById('newPassword').value;
            const confirmNewPassword = document.getElementById('confirmNewPassword').value;

            if (newPassword !== confirmNewPassword) {
                alert('As senhas não coincidem. Digite novamente.');
                return;
            }

            if (newPassword === 'fluxai@2026') {
                alert('Por favor, escolha uma senha diferente da padrão provisória.');
                return;
            }

            const updatedUser = await updateMockUserPassword(userId, newPassword); 
            if (updatedUser) { 
                alert('Chave de Acesso pessoal salva com sucesso! Seja bem-vindo ao FluxAI OS".'); 
                document.getElementById('passwordResetModal').style.display = 'none'; 
                logUserIn(updatedUser.role, updatedUser.full_name, updatedUser.id, updatedUser.project_id); 
            } else { 
                alert('Erro ao atualizar senha local.');
            }
        });

        // Lógica do Olho para mostrar/ocultar senha
        const togglePassword = document.getElementById('togglePassword');
        const passwordInput = document.getElementById('password');
        if (togglePassword && passwordInput) {
            togglePassword.addEventListener('click', function () {
                const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
                passwordInput.setAttribute('type', type);
                this.classList.toggle('fa-eye');
                this.classList.toggle('fa-eye-slash');
                this.style.color = type === 'text' ? 'var(--os-primary)' : 'var(--os-text-muted)';
            });
        }
    </script>
</body>
</html>
