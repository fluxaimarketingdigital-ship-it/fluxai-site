<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FluxAI OS™ | Login</title>
    <link rel="stylesheet" href="./styles/interface.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" integrity="sha384-PPIZEGYM1v8zp5Py7UjFb79S58UeqCL9pYVnVPURKEqvioPROaVAJKKLzvH2rDnI" crossorigin="anonymous" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <style>
        body.login-page {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #050505;
        }
        .login-card {
            width: 100%;
            max-width: 400px;
            padding: 50px;
            background: var(--os-sidebar);
            border: 1px solid var(--os-border);
            border-radius: 8px;
            text-align: center;
        }
        .login-header { margin-bottom: 40px; }
        .login-brand { font-weight: 800; font-size: 1.2rem; color: #fff; letter-spacing: 2px; }
        .login-brand span { color: var(--os-primary); }
        .login-form { text-align: left; }
        .form-group { margin-bottom: 25px; }
        .form-group label { display: block; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1.5px; color: var(--os-text-muted); margin-bottom: 10px; }
        .form-control { width: 100%; padding: 15px; background: rgba(255,255,255,0.03); border: 1px solid var(--os-border); border-radius: 4px; color: #fff; font-size: 0.9rem; transition: all 0.3s; }
        .form-control:focus { outline: none; border-color: var(--os-primary); background: rgba(255,255,255,0.05); }
        .btn-login { 
            width: 100%; 
            padding: 15px; 
            background: var(--os-primary); 
            border: none; 
            color: #000; 
            font-weight: 800; 
            border-radius: 4px; 
            cursor: pointer; 
            transition: all 0.2s; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            gap: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .btn-login:hover { opacity: 0.9; transform: translateY(-2px); box-shadow: 0 5px 15px rgba(168, 85, 247, 0.4); }
        .login-footer { margin-top: 30px; font-size: 0.8rem; color: var(--os-text-muted); }
    </style>

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="../assets/icons/favicon-os.png" />
    <link rel="shortcut icon" href="../assets/icons/favicon-os.png" type="image/x-icon" />
    <link rel="apple-touch-icon" href="../assets/icons/favicon-os.png" />
</head>
<body class="os-mode login-page">

    <div class="login-card">
        <div class="login-header">
            <div class="login-brand">
                FLUXAI <span>OS™</span>
            </div>
            <p style="color: var(--os-text-muted); font-size: 0.85rem; margin-top: 10px;">Ambiente Operacional Restrito</p>
        </div>

        <form class="login-form" id="loginForm">
            <div class="form-group">
                <label>E-mail de Acesso (Master / Cliente)</label>
                <input type="email" id="username" class="form-control" placeholder="seu@email.com" required />
            </div>
            <div class="form-group">
                <label>Chave de Acesso</label>
                <div style="position: relative; display: flex; align-items: center;">
                    <input type="password" id="password" class="form-control" placeholder="••••••••" required style="padding-right: 40px;" />
                    <i class="fa-solid fa-eye" id="togglePassword" style="position: absolute; right: 15px; color: var(--os-text-muted); cursor: pointer; font-size: 1.1rem; transition: color 0.2s;"></i>
                </div>
            </div>
            <button type="submit" class="btn-login">VALIDAR ACESSO <i class="fa-solid fa-shield-halved"></i></button>
        </form>

        <div class="login-footer">
            <p>Infraestrutura de Inteligência FluxAI Labs v1.1.0</p>
            <a href="/" style="color: var(--os-primary); text-decoration: none; display: block; margin-top: 15px;">Solicitar Acesso à Infraestrutura</a>
        </div>
    </div>

    <!-- Modal de Redefinição de Senha Obrigatória no Primeiro Acesso -->
    <div id="passwordResetModal" style="display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(10px); z-index: 1000; align-items: center; justify-content: center; padding: 20px;">
        <div class="login-card" style="border: 1px solid var(--os-primary); box-shadow: 0 0 25px rgba(142, 158, 104, 0.2);">
            <div class="login-header">
                <div class="login-brand" style="color: var(--os-primary); text-shadow: 0 0 10px rgba(142, 158, 104, 0.4);">
                    PRIMEIRO ACESSO
                </div>
                <p style="color: #fff; font-size: 0.95rem; margin-top: 15px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px;">Atualize sua Chave de Acesso</p>
                <p style="color: var(--os-text-muted); font-size: 0.75rem; margin-top: 8px; line-height: 1.4;">Por motivos de segurança corporativa, você deve definir uma senha pessoal robusta antes de prosseguir.</p>
            </div>
            <form class="login-form" id="passwordResetForm">
                <input type="hidden" id="resetUserId" />
                <div class="form-group">
                    <label>Nova Senha Pessoal</label>
                    <input type="password" id="newPassword" class="form-control" placeholder="Mínimo 6 caracteres" required minlength="6" />
                </div>
                <div class="form-group">
                    <label>Confirmar Nova Senha</label>
                    <input type="password" id="confirmNewPassword" class="form-control" placeholder="••••••••" required minlength="6" />
                </div>
                <button type="submit" class="btn-login" style="background: var(--os-primary); color: #000; font-weight: 800;">SALVAR E ENTRAR NO PAINEL <i class="fa-solid fa-check"></i></button>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.106.2/dist/umd/supabase.min.js" integrity="sha384-4Cjkyy4cE1EgIS0C+Y3xzGmJ2noQFRRU91yKAW8IxtPfVtbQXPMqadSc3sYnjwou" crossorigin="anonymous"></script>
    <script type="module">
        import { getSupabase } from './services/supabase-client.js';
        import { OS_LOGS_ENGINE } from './services/logs-engine.js';
        import { OS_AUTH } from './js/os-core.js';

        /**
         * Allowlist local (espelha a de os-core.js) para mapear e-mail → role logo após login.
         * Não contém senhas, tokens ou dados sensíveis.
         */
        const LOGIN_ALLOWED_USERS = Object.freeze({
            'kassiadgomes@hotmail.com': { id: 'ADMIN_001', full_name: 'Kássia Gomes',   role: 'ADMIN',  project_id: 'FLUXAI_LABS_001' },
            'admin@fluxai.com':         { id: 'ADMIN_002', full_name: 'Admin FluxAI',   role: 'ADMIN',  project_id: 'FLUXAI_LABS_001' },
            'kassia@fluxai.com':        { id: 'ADMIN_003', full_name: 'Kássia Gomes',   role: 'ADMIN',  project_id: 'FLUXAI_LABS_001' }
        });

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button');
            const originalNodes = [...btn.childNodes];

            const email = document.getElementById('username').value.trim().toLowerCase();
            const password = document.getElementById('password').value;

            // Feedback Visual
            btn.replaceChildren();
            btn.appendChild(document.createTextNode('VALIDANDO... '));
            const spinnerIcon = document.createElement('i');
            spinnerIcon.className = 'fa-solid fa-spinner fa-spin';
            btn.appendChild(spinnerIcon);
            btn.disabled = true;

            const supabase = getSupabase();
            if (!supabase) {
                alert('Falha na Autenticação: Serviço indisponível. Tente novamente em instantes.');
                btn.replaceChildren(...originalNodes);
                btn.disabled = false;
                return;
            }

            const { data, error } = await supabase.auth.signInWithPassword({ email, password });

            if (error) {
                alert('Falha na Autenticação: ' + error.message);
                if (typeof OS_LOGS_ENGINE !== 'undefined') {
                    OS_LOGS_ENGINE.security('SECURITY_ACCESS_DENIED', { reason: 'Erro Supabase auth' }, 'warning');
                }
                btn.replaceChildren(...originalNodes);
                btn.disabled = false;
                return;
            }

            // Login OK — construir contexto em RAM via allowlist (sem storage manual)
            const knownProfile = LOGIN_ALLOWED_USERS[email] || null;
            let safeRole, safeId, safeName, safeProjectId;

            if (knownProfile) {
                safeRole      = OS_AUTH.normalizeRole(knownProfile.role);
                safeId        = knownProfile.id;
                safeName      = knownProfile.full_name;
                safeProjectId = knownProfile.project_id || null;
            } else {
                // Buscar perfil no banco se não estiver na allowlist
                try {
                    const { data: profile, error: dbError } = await supabase
                        .from('profiles')
                        .select('role, full_name')
                        .eq('id', data.user.id)
                        .single();

                    if (dbError || !profile) throw new Error('Perfil não encontrado no sistema.');

                    safeRole      = OS_AUTH.normalizeRole(profile.role);
                    safeName      = profile.full_name;
                    safeId        = data.user.id;
                    safeProjectId = data.user.user_metadata?.client_id || null;
                } catch (err) {
                    alert('Falha de Acesso: Conta não possui um perfil operacional válido autorizado nesta infraestrutura.');
                    if (typeof OS_LOGS_ENGINE !== 'undefined') {
                        OS_LOGS_ENGINE.security('SECURITY_ACCESS_DENIED', { reason: 'No valid profile found for authenticated user', userId: data.user.id }, 'critical');
                    }
                    btn.replaceChildren(...originalNodes);
                    btn.disabled = false;
                    await supabase.auth.signOut();
                    return;
                }
            }

            // Construir contexto em RAM — zero storage manual
            window.FLUXAI_RUNTIME_CONTEXT = {
                id:          safeId,
                email:       email,
                full_name:   safeName,
                role:        safeRole,
                permissions: OS_AUTH.getPermissionsForRole(safeRole),
                project_id:  safeProjectId
            };

            if (typeof OS_LOGS_ENGINE !== 'undefined') {
                OS_LOGS_ENGINE.userAction('AUTH_LOGIN', { user_id: safeId, role: safeRole }, false);
            }

            const getRoute = (baseName, params = '') => window.location.pathname.endsWith('.html') ? `${baseName}.html${params}` : `${baseName}${params}`;

            if (safeRole === 'CLIENT') {
                const q = safeProjectId ? `?project_id=${encodeURIComponent(safeProjectId)}` : '';
                window.location.href = getRoute('client-portal', q);
            } else {
                window.location.href = getRoute('command-center');
            }
        });

        // Lógica do Olho para mostrar/ocultar senha
        const togglePassword = document.getElementById('togglePassword');
        const passwordInput = document.getElementById('password');
        if (togglePassword && passwordInput) {
            togglePassword.addEventListener('click', function () {
                const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
                passwordInput.setAttribute('type', type);
                this.classList.toggle('fa-eye');
                this.classList.toggle('fa-eye-slash');
                this.style.color = type === 'text' ? 'var(--os-primary)' : 'var(--os-text-muted)';
            });
        }
    </script>
</body>
</html>
