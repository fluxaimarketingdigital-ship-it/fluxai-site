<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FluxAI OS™ | Login</title>
    <link rel="stylesheet" href="./styles/interface.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <style>
        body.login-page {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #050505;
        }
        .login-card {
            width: 100%;
            max-width: 400px;
            padding: 50px;
            background: var(--os-sidebar);
            border: 1px solid var(--os-border);
            border-radius: 8px;
            text-align: center;
        }
        .login-header { margin-bottom: 40px; }
        .login-brand { font-weight: 800; font-size: 1.2rem; color: #fff; letter-spacing: 2px; }
        .login-brand span { color: var(--os-primary); }
        .login-form { text-align: left; }
        .form-group { margin-bottom: 25px; }
        .form-group label { display: block; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1.5px; color: var(--os-text-muted); margin-bottom: 10px; }
        .form-control { width: 100%; padding: 15px; background: rgba(255,255,255,0.03); border: 1px solid var(--os-border); border-radius: 4px; color: #fff; font-size: 0.9rem; transition: all 0.3s; }
        .form-control:focus { outline: none; border-color: var(--os-primary); background: rgba(255,255,255,0.05); }
        .btn-login { 
            width: 100%; 
            padding: 15px; 
            background: var(--os-primary); 
            border: none; 
            color: #000; 
            font-weight: 800; 
            border-radius: 4px; 
            cursor: pointer; 
            transition: all 0.2s; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            gap: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .btn-login:hover { opacity: 0.9; transform: translateY(-2px); box-shadow: 0 5px 15px rgba(168, 85, 247, 0.4); }
        .login-footer { margin-top: 30px; font-size: 0.8rem; color: var(--os-text-muted); }
    </style>
</head>
<body class="os-mode login-page">

    <div class="login-card">
        <div class="login-header">
            <div class="login-brand">
                FLUXAI <span>OS™</span>
            </div>
            <p style="color: var(--os-text-muted); font-size: 0.85rem; margin-top: 10px;">Ambiente Operacional Restrito</p>
        </div>

        <form class="login-form" id="loginForm">
            <div class="form-group">
                <label>E-mail do Operador</label>
                <input type="email" id="username" class="form-control" placeholder="seu@email.com" required />
            </div>
            <div class="form-group">
                <label>Chave de Acesso</label>
                <input type="password" id="password" class="form-control" placeholder="••••••••" required />
            </div>
            <button type="submit" class="btn-login">VALIDAR ACESSO <i class="fa-solid fa-shield-halved"></i></button>
        </form>

        <div class="login-footer">
            <p>Infraestrutura de Inteligência FluxAI Labs v1.1.0</p>
            <a href="/" style="color: var(--os-primary); text-decoration: none; display: block; margin-top: 15px;">Solicitar Acesso à Infraestrutura</a>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script type="module">
        import { getSupabase } from './services/supabase-client.js';

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button');
            const originalText = btn.innerHTML;
            
            const email = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            // Feedback Visual
            btn.innerHTML = 'VALIDANDO... <i class="fa-solid fa-spinner fa-spin"></i>';
            btn.disabled = true;

            const supabase = getSupabase();
            const { data, error } = await supabase.auth.signInWithPassword({
                email: email,
                password: password
            });

            if (error) {
                alert('Falha na Autenticação: ' + error.message);
                btn.innerHTML = originalText;
                btn.disabled = false;
            } else {
                try {
                    // Buscar perfil para validar Role Real no banco de dados (tabela profiles)
                    const { data: profile, error: profileError } = await supabase
                        .from('profiles')
                        .select('role, full_name')
                        .eq('id', data.user.id)
                        .single();

                    const userRole = profile?.role || 'CLIENT';
                    const userName = profile?.full_name || data.user.email;

                    // Registrar sessão no formato esperado pelo OS_AUTH (Síncrono)
                    localStorage.setItem('fluxai_session', JSON.stringify({
                        role: userRole, 
                        name: userName,
                        loginTime: new Date().toISOString()
                    }));
                    window.location.href = 'command-center.html';
                } catch (profileErr) {
                    console.error('[LOGIN_PROFILE_ERROR]', profileErr);
                    // Fallback seguro caso o perfil falhe
                    localStorage.setItem('fluxai_session', JSON.stringify({
                        role: 'CLIENT', 
                        name: data.user.email,
                        loginTime: new Date().toISOString()
                    }));
                    window.location.href = 'command-center.html';
                }
            }
        });
    </script>
</body>
</html>
