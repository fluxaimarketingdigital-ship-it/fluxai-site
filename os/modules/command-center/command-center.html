<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FluxAI OS™ | Centro de Comando</title>
    <link rel="stylesheet" href="../../styles/interface.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
</head>
<body class="os-mode">

    <div class="os-shell">
        <!-- SIDEBAR -->
        <aside class="os-sidebar"></aside>

        <div class="os-viewport-wrapper" style="display: flex; flex-direction: column; width: 100%;">
            <!-- TOPBAR -->
            <header class="os-topbar"></header>

            <main class="os-viewport">
                <div class="os-page-title">
                    <h1 id="page-title">Centro de Comando</h1>
                    <p id="page-desc">Visão geral da inteligência e estados operacionais da FluxAI Labs.</p>
                </div>

                <div class="os-widget-grid">
                    <div class="os-widget" id="metric-comercial" style="grid-column: span 3;"></div>
                    <div class="os-widget" id="metric-conteudo" style="grid-column: span 3;"></div>
                    <div class="os-widget" id="metric-crm" style="grid-column: span 3;"></div>
                    <div class="os-widget" id="metric-roas" style="grid-column: span 3;"></div>

                    <div class="os-widget" style="grid-column: span 4; grid-row: span 2;">
                        <div class="os-widget-header">
                            <span class="os-widget-label">Central de Alertas</span>
                        </div>
                        <div id="alerts-container"></div>
                    </div>

                    <div class="os-widget" style="grid-column: span 8;">
                        <div class="os-widget-header">
                            <span class="os-widget-label">Pipeline Estratégico</span>
                        </div>
                        <div class="os-pipeline" id="pipeline-container"></div>
                    </div>

                    <div class="os-widget" style="grid-column: span 8;">
                        <div class="os-widget-header">
                            <span class="os-widget-label">Atividade Operacional Recente</span>
                        </div>
                        <div class="os-activity-log" id="activity-log"></div>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <!-- MODULE LOGIC -->
    <script type="module" src="./command-center.js"></script>
</body>
</html>
