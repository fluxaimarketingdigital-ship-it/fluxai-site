<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FluxAI OS™ | CRM Intelligence</title>
    <link rel="stylesheet" href="../../styles/interface.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        .os-table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        .os-table th, .os-table td { text-align: left; padding: 12px; border-bottom: 1px solid var(--os-border); font-size: 0.85rem; }
        .os-table th { color: var(--os-text-muted); text-transform: uppercase; font-size: 0.65rem; letter-spacing: 1px; }
        .temp-quente { color: var(--os-danger); font-weight: 700; }
        .temp-morna { color: var(--os-warning); }
        .health-bar-bg { width: 100px; height: 4px; background: rgba(255,255,255,0.05); border-radius: 2px; }
        .health-bar-fill { height: 100%; border-radius: 2px; }
    </style>
</head>
<body class="os-mode">

    <div class="os-shell">
        <aside class="os-sidebar"></aside>

        <div class="os-viewport-wrapper" style="display: flex; flex-direction: column; width: 100%;">
            <header class="os-topbar"></header>

            <main class="os-viewport">
                <div class="os-page-title">
                    <h1>Inteligência de CRM</h1>
                    <p>Central de relacionamento operacional e inteligência de leads.</p>
                </div>

                <div class="os-widget-grid">
                    <div class="os-widget" id="metric-opps" style="grid-column: span 3;"></div>
                    <div class="os-widget" id="metric-cycle" style="grid-column: span 3;"></div>
                    <div class="os-widget" id="metric-retention" style="grid-column: span 3;"></div>
                    <div class="os-widget" id="metric-value" style="grid-column: span 3;"></div>

                    <div class="os-widget" style="grid-column: span 12;">
                        <div class="os-widget-header">
                            <span class="os-widget-label">Monitoramento de Contas Estratégicas</span>
                        </div>
                        <table class="os-table">
                            <thead>
                                <tr>
                                    <th>ID</th>
                                    <th>Organização</th>
                                    <th>Contato Chave</th>
                                    <th>Temperatura</th>
                                    <th>Saúde</th>
                                    <th>Próxima Ação</th>
                                </tr>
                            </thead>
                            <tbody id="leads-table-body"></tbody>
                        </table>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script type="module" src="./crm-intelligence.js"></script>
</body>
</html>
