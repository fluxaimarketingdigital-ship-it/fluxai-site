<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FluxAI OS™ | Analytics</title>
    <link rel="stylesheet" href="../../styles/interface.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        .os-insight-card { background: rgba(255,255,255,0.02); padding: 20px; border-left: 4px solid var(--os-primary); border-radius: 4px; margin-bottom: 15px; }
        .os-border-success { border-left-color: var(--os-success); }
        .os-border-warning { border-left-color: var(--os-warning); }
        .os-insight-card h4 { margin: 0 0 10px 0; font-size: 0.95rem; }
        .os-insight-card p { margin: 0; font-size: 0.85rem; color: var(--os-text-muted); }
        .os-behavior-item { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid var(--os-border); font-size: 0.85rem; }
        .os-behavior-item .label { color: var(--os-text-muted); }
        .os-behavior-item .value { font-weight: 700; font-family: var(--os-font-mono); }
    </style>
</head>
<body class="os-mode">

    <div class="os-shell">
        <aside class="os-sidebar"></aside>

        <div class="os-viewport-wrapper" style="display: flex; flex-direction: column; width: 100%;">
            <header class="os-topbar"></header>

            <main class="os-viewport">
                <div class="os-page-title">
                    <h1>Análise de Dados</h1>
                    <p>Central de leitura estratégica e inteligência operacional.</p>
                </div>

                <div class="os-widget-grid">
                    <div class="os-widget" id="metric-retention" style="grid-column: span 3;"></div>
                    <div class="os-widget" id="metric-cac" style="grid-column: span 3;"></div>
                    <div class="os-widget" id="metric-ltv" style="grid-column: span 3;"></div>
                    <div class="os-widget" id="metric-response" style="grid-column: span 3;"></div>

                    <div class="os-widget" style="grid-column: span 8;">
                        <div class="os-widget-header">
                            <span class="os-widget-label">Insights Decisoriais</span>
                        </div>
                        <div id="insights-container"></div>
                    </div>

                    <div class="os-widget" style="grid-column: span 4;">
                        <div class="os-widget-header">
                            <span class="os-widget-label">Comportamento de Ativos</span>
                        </div>
                        <div id="behavior-container"></div>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script type="module" src="./analytics.js"></script>
</body>
</html>
