<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FluxAI OS™ | Intelligence Layer</title>
    <link rel="stylesheet" href="../../styles/interface.css" />
    <link rel="stylesheet" href="../../styles/components.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
    <style>
        /* SILÊNCIO VISUAL E SOBRIEDADE */
        .os-learning-card { background: var(--os-card); border: 1px solid var(--os-border); padding: 24px; border-radius: 2px; margin-bottom: 20px; }
        .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .learning-id { font-family: var(--os-font-mono); font-size: 0.7rem; color: var(--os-text-muted); }
        .module-tags { display: flex; gap: 8px; }
        .tag { font-size: 0.65rem; background: rgba(255,255,255,0.03); padding: 2px 8px; border-radius: 2px; color: var(--os-text-muted); }
        
        .os-learning-card h4 { margin: 0 0 12px 0; font-size: 1.1rem; font-weight: 700; letter-spacing: -0.01em; }
        .os-learning-card p { color: var(--os-text-muted); line-height: 1.6; font-size: 0.95rem; margin-bottom: 20px; }
        .card-footer { font-size: 0.8rem; border-top: 1px solid var(--os-border); padding-top: 15px; color: var(--os-text-muted); }
        .card-footer strong { color: var(--os-text-main); }

        /* SEVERIDADES DISCRETAS */
        .severity-info { border-left: 2px solid var(--os-info); }
        .severity-attention { border-left: 2px solid var(--os-warning); }
        .severity-critical { border-left: 2px solid var(--os-danger); }

        /* INSIGHTS CONTEXTUAIS */
        .ctx-item { display: flex; justify-content: space-between; align-items: center; padding: 16px 0; border-bottom: 1px solid var(--os-border); }
        .ctx-item:last-child { border-bottom: none; }
        .ctx-info { display: flex; flex-direction: column; }
        .ctx-label { font-weight: 600; font-size: 0.9rem; }
        .ctx-context { font-size: 0.75rem; color: var(--os-text-muted); margin-top: 2px; }
        .ctx-value-group { text-align: right; }
        .ctx-value { font-family: var(--os-font-mono); font-weight: 700; font-size: 1.1rem; display: block; }
        .ctx-trend { font-size: 0.7rem; color: var(--os-success); }

        /* APOIO À DECISÃO */
        .os-decision-card { background: rgba(255,255,255,0.01); border: 1px solid var(--os-border); padding: 20px; border-radius: 2px; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; }
        .decision-content h4 { font-size: 0.9rem; margin: 0 0 5px 0; }
        .decision-content p { font-size: 0.8rem; color: var(--os-text-muted); margin: 0; max-width: 450px; }
    </style>
</head>
<body class="os-mode">

    <div class="os-shell">
        <aside class="os-sidebar"></aside>

        <div class="os-viewport-wrapper" style="display: flex; flex-direction: column; width: 100%;">
            <header class="os-topbar"></header>

            <main class="os-viewport">
                <div class="os-page-title">
                    <h1>Camada de Inteligência</h1>
                    <p>Camada de leitura contextual e interpretação operacional sistêmica.</p>
                </div>

                <div class="os-widget-grid">
                    <!-- APRENDIZADOS OPERACIONAIS -->
                    <div class="os-widget" style="grid-column: span 8;">
                        <div class="os-widget-header">
                            <span class="os-widget-label">Análise de Correlação Operacional</span>
                        </div>
                        <div id="learnings-container"></div>
                    </div>

                    <!-- INSIGHTS CONTEXTUAIS -->
                    <div class="os-widget" style="grid-column: span 4;">
                        <div class="os-widget-header">
                            <span class="os-widget-label">Métricas de Cruzamento</span>
                        </div>
                        <div id="context-container"></div>
                    </div>

                    <!-- APOIO À DECISÃO -->
                    <div class="os-widget" style="grid-column: span 12;">
                        <div class="os-widget-header">
                            <span class="os-widget-label">Apoio à Decisão Estratégica</span>
                        </div>
                        <div id="decision-container"></div>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script type="module" src="./intelligence.js"></script>
</body>
</html>
