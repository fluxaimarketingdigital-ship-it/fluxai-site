<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FluxAI OS™ | GPT Operational Layer</title>
    <link rel="stylesheet" href="../../styles/interface.css" />
    <link rel="stylesheet" href="../../styles/components.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
    <style>
        /* CONTEXT BAR */
        .context-bar { background: var(--os-card); border: 1px solid var(--os-border); padding: 12px 20px; border-radius: 2px; margin-bottom: 25px; display: flex; gap: 20px; align-items: center; }
        .context-pill { display: flex; align-items: center; gap: 10px; font-size: 0.75rem; color: var(--os-text-muted); }
        .ctx-module { font-weight: 700; color: var(--os-text-main); }
        .pulse { width: 6px; height: 6px; background: var(--os-primary); border-radius: 50%; display: inline-block; animation: pulse-anim 2s infinite; }
        @keyframes pulse-anim { 0% { opacity: 0.2; } 50% { opacity: 1; } 100% { opacity: 0.2; } }

        /* INSIGHT CARDS */
        .insights-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .os-insight-card { background: var(--os-card); border: 1px solid var(--os-border); border-top: 2px solid var(--os-primary); padding: 20px; border-radius: 2px; }
        .insight-header { display: flex; justify-content: space-between; margin-bottom: 15px; }
        .insight-type { font-size: 0.65rem; text-transform: uppercase; letter-spacing: 1px; color: var(--os-text-muted); font-weight: 700; }
        .insight-ctx { font-size: 0.7rem; font-family: var(--os-font-mono); color: var(--os-primary); }
        .insight-text { font-size: 0.9rem; line-height: 1.6; margin-bottom: 20px; }

        /* WORKFLOWS */
        .workflow-item { background: rgba(255,255,255,0.01); border: 1px solid var(--os-border); border-radius: 2px; padding: 25px; margin-bottom: 15px; display: grid; grid-template-columns: 1fr 1fr 150px; gap: 30px; align-items: center; }
        .wf-info h4 { margin: 0 0 10px 0; font-size: 1.1rem; }
        .wf-info p { font-size: 0.85rem; color: var(--os-text-muted); margin: 0; line-height: 1.5; }
        .wf-draft { background: rgba(0,0,0,0.2); padding: 15px; border-radius: 2px; border-left: 2px solid var(--os-border); }
        .draft-label { font-size: 0.65rem; color: var(--os-text-muted); display: block; margin-bottom: 5px; }
        .draft-content { font-size: 0.85rem; font-style: italic; color: var(--os-text-main); }

        /* ENGINE STATUS */
        .engine-status-bar { border-top: 1px solid var(--os-border); padding-top: 20px; display: flex; gap: 30px; }
        .status-stat { font-size: 0.75rem; color: var(--os-text-muted); }
        .status-stat strong { color: var(--os-primary); margin-left: 5px; }

        .os-btn-sm { padding: 4px 10px; font-size: 0.65rem; }
    </style>
</head>
<body class="os-mode">

    <div class="os-shell">
        <aside class="os-sidebar"></aside>

        <div class="os-viewport-wrapper" style="display: flex; flex-direction: column; width: 100%;">
            <header class="os-topbar"></header>

            <main class="os-viewport">
                <div class="os-page-title">
                    <h1>Camada GPT Operacional</h1>
                    <p>Camada inteligente de assistência contextual integrada aos ativos da FluxAI OS™.</p>
                </div>

                <div class="context-bar" id="context-injection-bar"></div>

                <div class="os-widget-grid">
                    <div class="os-widget" style="grid-column: span 12; border: none; background: none; padding: 0;">
                        <div class="os-widget-header">
                            <span class="os-widget-label">Interpretações e Sugestões Contextuais</span>
                        </div>
                        <div class="insights-grid" id="insights-grid"></div>
                    </div>

                    <div class="os-widget" style="grid-column: span 12;">
                        <div class="os-widget-header">
                            <span class="os-widget-label">Workflows Assistidos por Contexto</span>
                        </div>
                        <div id="workflow-container"></div>
                    </div>
                </div>

                <footer class="engine-status-bar" id="engine-status"></footer>
            </main>
        </div>
    </div>

    <script type="module" src="./gpt-layer.js"></script>
</body>
</html>
