<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal do Cliente | FluxAI OS™</title>
    <link rel="stylesheet" href="/os/styles/interface.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --os-primary: #8e9e68;
            --os-bg: #050505;
            --os-widget-bg: #0d0d0d;
            --os-border: #1a1a1a;
            --os-text: #ffffff;
            --os-text-muted: #666666;
        }
        body { background: var(--os-bg); color: var(--os-text); font-family: 'Inter', sans-serif; }
        .portal-header { padding: 40px 20px; text-align: center; border-bottom: 1px solid var(--os-border); margin-bottom: 40px; }
        .portal-header h1 { font-size: 1.8rem; letter-spacing: -1px; margin-bottom: 10px; }
        .portal-header p { color: var(--os-text-muted); font-size: 0.9rem; }
        
        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 10px;
            padding: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }
        .calendar-day {
            background: var(--os-widget-bg);
            border: 1px solid var(--os-border);
            padding: 10px;
            border-radius: 4px;
            position: relative;
            min-height: 80px;
        }
        .day-num { font-size: 0.7rem; color: var(--os-text-muted); margin-bottom: 8px; font-weight: 800; }
        
        .asset-card {
            font-size: 0.65rem;
            padding: 6px;
            border-radius: 3px;
            margin-bottom: 4px;
            cursor: pointer;
            transition: 0.2s;
            border: 1px solid transparent;
        }
        .asset-card:hover { transform: translateY(-2px); border-color: var(--os-primary); }
        
        .status-aprovação-planejamento { background: rgba(59, 130, 246, 0.15); color: #60a5fa; border: 1px solid rgba(59, 130, 246, 0.4); }
        .status-revisão-gestão { background: rgba(139, 92, 246, 0.15); color: #a78bfa; border: 1px solid rgba(139, 92, 246, 0.4); }
        .status-aprovação-final { background: rgba(59, 130, 246, 0.2); color: #60a5fa; border: 1px solid rgba(59, 130, 246, 0.5); font-weight: 800; }
        .status-ajuste { background: rgba(239, 68, 68, 0.15); color: #ef4444; border: 1px solid rgba(239, 68, 68, 0.4); }
        .status-ajuste-de-produção { background: rgba(236, 72, 153, 0.15); color: #ec4899; border: 1px solid rgba(236, 72, 153, 0.4); }
        .status-produção { background: rgba(245, 158, 11, 0.15); color: #f59e0b; border: 1px solid rgba(245, 158, 11, 0.4); }
        .status-pronto { background: #10b981; color: #fff; border: 1px solid #10b981; font-weight: 900; }
        .status-planejamento { background: rgba(139, 92, 246, 0.15); color: #a78bfa; border: 1px solid rgba(139, 92, 246, 0.4); }
        .status-publicado { background: #000; color: #10b981; border: 1px solid #10b981; box-shadow: 0 0 10px rgba(16, 185, 129, 0.2); }
        
        @media (max-width: 768px) {
            .calendar-grid { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>
<body>
    <header class="portal-header">
        <div style="color:var(--os-primary); font-weight:900; font-size:0.7rem; letter-spacing:3px; margin-bottom:10px;">FLUXAI OS™</div>
        <div class="success-msg" id="success-ui" style="display:none;">
            <i class="fa-solid fa-circle-check"></i>
            <h2 id="success-title">Planejamento Aprovado!</h2>
            <p id="success-message">Excelente. Esta pauta foi enviada para a Execução Operacional.</p>
            <button class="btn btn-approve" style="margin-top: 30px; padding: 15px 40px; font-size: 0.9rem; background: var(--os-primary); color: #000; font-weight: 800; border: none; border-radius: 4px; cursor: pointer; display: inline-flex; align-items: center; gap: 10px; box-shadow: 0 4px 20px rgba(142, 158, 104, 0.4);" onclick="window.location.reload()">
                <i class="fa-solid fa-rotate"></i> ATUALIZAR CALENDÁRIO
            </button>
        </div>
        <h1 id="portal-title">Fluxo Estratégico</h1>
        <p id="client-name">Sincronizando dados...</p>
    </header>

    <div class="calendar-grid" id="calendar-body"></div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script type="module">
        import { getSupabase } from '/os/services/supabase-client.js';

        const params = new URLSearchParams(window.location.search);
        const projectId = params.get('project_id');

        async function getStatusBg(status) {
            if (status === 'PLANEJAMENTO') return '#8b5cf6';
            if (status === 'REVISÃO GESTÃO') return '#8b5cf6';
            if (status === 'APROVAÇÃO PLANEJAMENTO') return '#3b82f6';
            if (status === 'APROVAÇÃO ESTRATÉGICA') return '#3b82f6';
            if (status === 'AJUSTE') return '#ef4444';
            if (status === 'PRODUÇÃO') return '#f59e0b';
            if (status === 'AJUSTE DE PRODUÇÃO') return '#ec4899';
            if (status === 'APROVAÇÃO FINAL') return '#3b82f6';
            if (status === 'PRONTO') return '#10b981';
            if (status === 'PUBLICADO') return '#059669';
            if (status === 'ATRASADO') return '#7f1d1d';
            return '#444';
        }

        async function init() {
            if (!projectId) return document.body.innerHTML = '<h1>Acesso negado.</h1>';

            const supabase = getSupabase();
            
            // Buscar Projeto (com tratamento de erro para RLS ou rede)
            try {
                const { data: projData } = await supabase.from('projects').select('company_name, name').eq('id', projectId).single();
                const project = projData;
                
                if (project) {
                    const now = new Date();
                    const currentMonth = now.toLocaleString('pt-BR', { month: 'long' });
                    const titleEl = document.getElementById('portal-title');
                    if (titleEl) titleEl.innerText = `Fluxo Estratégico: ${currentMonth.charAt(0).toUpperCase() + currentMonth.slice(1)}`;
                    
                    const nameEl = document.getElementById('client-name');
                    if (nameEl) nameEl.innerText = `${project.company_name || project.name}`;
                }
            } catch (err) {
                console.warn('[PORTAL] Erro ao carregar nome do projeto:', err);
                document.getElementById('client-name').innerText = 'Cronograma de Conteúdo';
            }

            // Buscar Ativos
            try {
                const { data: assets, error } = await supabase.from('content_assets')
                    .select('*')
                    .eq('project_id', projectId)
                    .order('scheduled_at', { ascending: true });

                if (error) throw error;
                renderCalendar(assets || []);
            } catch (err) {
                console.error('[PORTAL] Erro ao carregar ativos:', err);
                renderCalendar([]);
            }
        }

        // ATUALIZAÇÃO AUTOMÁTICA: Quando o cliente volta para esta aba
        window.onfocus = () => {
            init();
        };

        function renderCalendar(contents) {
            const grid = document.getElementById('calendar-body');
            grid.innerHTML = '';

            const now = new Date();
            const year = now.getFullYear();
            const month = now.getMonth();
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            const monthName = ["Janeiro", "Fevereiro", "Março", "Abril", "Maio", "Junho", "Julho", "Agosto", "Setembro", "Outubro", "Novembro", "Dezembro"][month];
            
            document.querySelector('.portal-header h1').innerText = `Fluxo Estratégico: ${monthName}`;

            for (let i = 1; i <= daysInMonth; i++) {
                const dayStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(i).padStart(2, '0')}`;
                const dayAssets = contents.filter(c => c.scheduled_at && c.scheduled_at.startsWith(dayStr));

                const dayHtml = `
                    <div class="calendar-day">
                        <div class="day-num">${i}</div>
                        ${dayAssets.map(c => {
                            const statusClass = c.status.toLowerCase().replace(/\s+/g, '-');
                            return `
                                <div class="asset-card status-${statusClass}" onclick="window.openApproval('${c.id}')">
                                    <div style="font-weight:800; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">${c.title}</div>
                                    <div style="font-size:0.5rem; opacity:0.7; margin-top:2px;">${c.status}</div>
                                </div>
                            `;
                        }).join('')}
                    </div>
                `;
                grid.innerHTML += dayHtml;
            }
        }

        window.openApproval = (id) => {
            window.location.href = `/os/approval.html?id=${id}`;
        };

        // EXPOR FUNÇÕES PARA O GLOBAL
        window.initPortal = init;

        init();
    </script>
</body>
</html>
