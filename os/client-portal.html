<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal do Cliente | FluxAI OS™</title>
    <link rel="stylesheet" href="/os/styles/interface.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --os-primary: #8e9e68;
            --os-bg: #050505;
            --os-surface: rgba(20, 20, 20, 0.6);
            --os-border: rgba(255, 255, 255, 0.08);
            --os-text: #ffffff;
            --os-text-muted: #888888;
            --glass-bg: rgba(255, 255, 255, 0.03);
        }

        body { 
            background: radial-gradient(circle at 50% 0%, #1a1f14 0%, var(--os-bg) 80%); 
            color: var(--os-text); 
            font-family: 'Inter', sans-serif; 
            margin:0; 
            padding:0; 
            overflow-x: hidden;
        }

        .portal-header { 
            padding: 40px 20px 30px; 
            text-align: center; 
            border-bottom: 1px solid var(--os-border); 
            background: transparent;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            position: relative;
        }

        .portal-header h1 { 
            font-size: 1.8rem; 
            letter-spacing: -1.5px; 
            margin: 5px 0; 
            color: #fff; 
            text-transform: uppercase; 
            font-weight: 900;
            background: linear-gradient(to bottom, #fff, #aaa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .month-nav {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 30px;
            margin-top: 20px;
        }

        .nav-btn {
            background: var(--glass-bg);
            border: 1px solid var(--os-border);
            color: #fff;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .nav-btn:hover { background: var(--os-primary); color: #000; transform: scale(1.1); border-color: var(--os-primary); }

        #current-month-display { 
            font-size: 0.75rem; 
            font-weight: 900; 
            color: var(--os-primary); 
            text-transform: uppercase; 
            letter-spacing: 3px; 
            min-width: 160px; 
        }

        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 10px;
            padding: 20px;
            max-width: 1400px;
            margin: 0 auto;
            animation: fadeInUp 0.8s ease;
        }

        .calendar-day {
            background: var(--os-surface);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid var(--os-border);
            padding: 10px;
            border-radius: 12px;
            position: relative;
            min-height: 100px;
            display: flex;
            flex-direction: column;
            transition: all 0.3s;
        }

        .calendar-day:hover { border-color: rgba(255,255,255,0.2); background: rgba(255,255,255,0.05); }

        .day-num { font-size: 0.7rem; color: var(--os-text-muted); margin-bottom: 10px; font-weight: 900; }
        
        .asset-card {
            font-size: 0.65rem;
            padding: 8px 10px;
            border-radius: 8px;
            margin-bottom: 6px;
            cursor: pointer;
            transition: all 0.3s;
            border: 1px solid transparent;
            font-weight: 700;
            background: rgba(255,255,255,0.03);
        }

        .asset-card:hover:not(.non-clickable) { 
            transform: translateY(-3px); 
            border-color: var(--os-primary); 
            box-shadow: 0 10px 20px rgba(0,0,0,0.5); 
            background: rgba(255,255,255,0.08);
        }
        
        /* Status visíveis ao cliente */
        .status-aprovação-planejamento { background: rgba(59, 130, 246, 0.1); color: #60a5fa; border: 1px solid rgba(59, 130, 246, 0.3); }
        .status-aprovação-final { background: rgba(139, 92, 246, 0.15); color: #a78bfa; border: 1px solid rgba(139, 92, 246, 0.5); }
        .status-ajuste { background: rgba(239, 68, 68, 0.1); color: #f87171; border: 1px solid rgba(239, 68, 68, 0.3); }
        .status-ajuste-de-produção { background: rgba(236, 72, 153, 0.1); color: #f472b6; border: 1px solid rgba(236, 72, 153, 0.3); }
        .status-produção { background: rgba(245, 158, 11, 0.1); color: #fbbf24; border: 1px solid rgba(245, 158, 11, 0.3); }
        .status-pronto { background: rgba(16, 185, 129, 0.15); color: #34d399; border: 1px solid #10b981; }
        .status-publicado { background: #000; color: #34d399; border: 1px solid #10b981; box-shadow: 0 0 15px rgba(16, 185, 129, 0.1); }
        
        /* Status internos */
        .status-planejamento, .status-revisão-gestão, .status-aprovação-estratégica, .status-revisão-interna-final { 
            background: transparent; color: #555; border: 1px dashed rgba(255, 255, 255, 0.1); opacity: 0.6; 
        }
        
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .btn-back-portal {
            position: absolute;
            left: 30px;
            top: 40px;
            background: var(--glass-bg);
            border: 1px solid var(--os-border);
            color: var(--os-text-muted);
            padding: 10px 18px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s;
        }
        
        .btn-back-portal:hover {
            border-color: var(--os-primary);
            color: var(--os-primary);
            background: rgba(142, 158, 104, 0.1);
            transform: scale(1.02) translateX(-2px);
        }

        @media (max-width: 1000px) { 
            .calendar-grid { grid-template-columns: repeat(4, 1fr); } 
            .btn-back-portal { position: static; display: inline-flex; margin-bottom: 20px; }
        }
        @media (max-width: 600px) { .calendar-grid { grid-template-columns: repeat(2, 1fr); } }

        /* PREMIUM FINANCE & PIX SYSTEM ALERTS */
        .expiration-banner {
            background: linear-gradient(135deg, rgba(239, 68, 68, 0.1) 0%, rgba(245, 158, 11, 0.1) 100%);
            border: 1px solid rgba(239, 68, 68, 0.25);
            border-radius: 12px;
            padding: 20px 30px;
            margin: 20px auto 10px;
            max-width: 1350px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            animation: slideDown 0.6s cubic-bezier(0.16, 1, 0.3, 1) both;
            box-shadow: 0 10px 30px rgba(239, 68, 68, 0.05);
            width: calc(100% - 40px);
            box-sizing: border-box;
        }
        .expiration-banner.warning {
            background: linear-gradient(135deg, rgba(245, 158, 11, 0.1) 0%, rgba(142, 158, 104, 0.08) 100%);
            border-color: rgba(245, 158, 11, 0.25);
            box-shadow: 0 10px 30px rgba(245, 158, 11, 0.03);
        }
        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .pix-details-modal {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.85);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 10000;
            backdrop-filter: blur(15px);
        }
        .pix-modal-content {
            background: #0f120f;
            border: 1px solid var(--os-primary);
            border-radius: 16px;
            padding: 40px;
            max-width: 500px;
            width: 90%;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
            position: relative;
            animation: zoomIn 0.3s cubic-bezier(0.34, 1.56, 0.64, 1) both;
        }
        @keyframes zoomIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }
    </style>
</head>
<body>
    <header class="portal-header">
        <a href="command-center.html" class="btn-back-portal">
            <i class="fa-solid fa-arrow-left"></i> Voltar ao Painel
        </a>
        <div style="color:var(--os-primary); font-weight:900; font-size:0.6rem; letter-spacing:4px; margin-bottom:10px; opacity: 0.8;">FLUXAI OS™</div>
        
        <h1 id="portal-title">Portal do Cliente</h1>
        <p id="client-name" style="font-weight: 700; color: #eee; font-size: 1rem; margin-top: 10px;">Aguarde...</p>
        <p id="client-profession" style="opacity: 0.5; margin-top: 5px; font-size: 0.7rem; letter-spacing: 1px;">SINCRONIZANDO ECOSSISTEMA DIGITAL...</p>

        <div class="month-nav">
            <button class="nav-btn" onclick="changeMonth(-1)"><i class="fa-solid fa-chevron-left"></i></button>
            <span id="current-month-display">---</span>
            <button class="nav-btn" onclick="changeMonth(1)"><i class="fa-solid fa-chevron-right"></i></button>
        </div>
    </header>

    <div id="expiration-alert-container"></div>
    <div class="calendar-grid" id="calendar-body"></div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        let _supabaseClient = null;
        let _allAssets = [];
        let currentYear = new Date().getFullYear();
        let currentMonth = new Date().getMonth();

        const params = new URLSearchParams(window.location.search);
        const projectId = params.get('project_id') || params.get('project') || localStorage.getItem('fluxai_current_project_id') || 'p_c1';

        async function init() {
            // Controle de Exibição do Botão de Voltar (esconde se for CLIENT real)
            const session = JSON.parse(localStorage.getItem('fluxai_session') || '{}');
            if (session.role === 'CLIENT') {
                const backBtn = document.querySelector('.btn-back-portal');
                if (backBtn) backBtn.style.display = 'none';
            }

            if (!projectId) return document.getElementById('client-name').innerText = 'Acesso Negado: ID do Projeto Ausente';

            if (!_supabaseClient) {
                _supabaseClient = window.supabase.createClient("https://mufgwetfhfhhmhowbhjj.supabase.co", "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im11Zmd3ZXRmaGZoaG1ob3diaGpqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg1Mzg1MDYsImV4cCI6MjA5NDExNDUwNn0.G0VxvE6acPRKZIwee7d2ARBkIdqf9SRvVI1uagMrBZI");
            }


            try {
                // 1. Dados do Projeto
                const { data: proj } = await _supabaseClient.from('projects').select('name, company_name, metadata').eq('id', projectId).single();
                
                if (proj) {
                    document.getElementById('client-name').innerText = (proj.name || proj.company_name).toUpperCase();
                    const profession = proj.metadata?.onboarding?.profession || 'Estratégia Institucional';
                    document.getElementById('client-profession').innerText = profession.toUpperCase();
                } else {
                    document.getElementById('client-name').innerText = 'PROJETO FLUXAI OS™';
                    document.getElementById('client-profession').innerText = 'SINCRONIZAÇÃO DE ATIVOS';
                }

                const { data: assets } = await _supabaseClient.from('content_assets')
                    .select('*')
                    .eq('project_id', projectId)
                    .order('scheduled_at', { ascending: true });

                _allAssets = assets || [];
                renderCalendar();
            } catch (err) {
                console.warn('[PORTAL] Offline ou Erro de ID. Iniciando Fallback LocalStorage Mocks...', err);
                
                const mockProjects = JSON.parse(localStorage.getItem('fluxai_mock_projects') || '[]');
                const proj = mockProjects.find(p => p.id === projectId);
                
                if (proj) {
                    document.getElementById('client-name').innerText = (proj.company_name || proj.name).toUpperCase();
                    const profession = proj.metadata?.onboarding?.profession || proj.segment || 'Estratégia Institucional';
                    document.getElementById('client-profession').innerText = profession.toUpperCase();
                } else {
                    if (projectId === 'p_c1') {
                        document.getElementById('client-name').innerText = 'MARIA APARECIDA NUTRICIONISTA & CONSULTORA ALIMENTAR';
                        document.getElementById('client-profession').innerText = 'NUTRIÇÃO CLÍNICA + CONSULTORIA ALIMENTAR';
                    } else {
                        document.getElementById('client-name').innerText = 'PROJETO FLUXAI OS™';
                        document.getElementById('client-profession').innerText = 'SINCRONIZAÇÃO DE ATIVOS';
                    }
                }

                const mockAssets = JSON.parse(localStorage.getItem('fluxai_mock_assets') || '[]');
                _allAssets = mockAssets.filter(c => c && c.project_id === projectId);
                
                if (_allAssets.length === 0 && projectId === 'p_c1') {
                    _allAssets = [
                        {
                            id: "m_a1",
                            project_id: "p_c1",
                            title: "Direção Audiovisual (Reels): Organização Alimentar Real",
                            status: "APROVAÇÃO PLANEJAMENTO",
                            caption: "🎯 OBJETIVO: Fortalecer autoridade regional e combater o terrorismo nutricional.\n\n🎬 HOOK: Você não precisa comer comida sem graça para ter saúde.\n\n💬 FALAS: No consultório, o que eu mais vejo são pessoas cansadas de radicalismo...\n\n✨ CTA: Comente ROTINA para acessar meu guia prático de alimentos regionais.",
                            scheduled_at: `${currentYear}-${String(currentMonth + 1).padStart(2, '0')}-05T12:00:00.000Z`,
                            platform: "INSTAGRAM",
                            priority: "MÉDIA",
                            metadata: { version: "V1", approval_deadline: `${currentYear}-${String(currentMonth + 1).padStart(2, '0')}-04T18:00:00.000Z` }
                        },
                        {
                            id: "m_a2",
                            project_id: "p_c1",
                            title: "Estrutura Narrativa (Carrossel): Substituições Inteligentes",
                            status: "APROVAÇÃO PLANEJAMENTO",
                            caption: "🎯 OBJETIVO: Oferecer educação alimentar prática com alimentos acessíveis.\n\nSlide 1: Substituições saudáveis de verdade e baratas.\n\nSlide 2: Em vez de ingredientes caros importados, use raízes locais e peixes frescos.\n\n✨ CTA: Compartilhe este post com quem precisa de mais praticidade na cozinha.",
                            scheduled_at: `${currentYear}-${String(currentMonth + 1).padStart(2, '0')}-12T15:00:00.000Z`,
                            platform: "INSTAGRAM",
                            priority: "MÉDIA",
                            metadata: { version: "V1", approval_deadline: `${currentYear}-${String(currentMonth + 1).padStart(2, '0')}-10T18:00:00.000Z` }
                        },
                        {
                            id: "m_a3",
                            project_id: "p_c1",
                            title: "Direção Audiovisual (Reels): Bastidores da Nutrição Humana",
                            status: "PRODUÇÃO",
                            caption: "🎯 OBJETIVO: Humanizar a marca e gerar conexão com pacientes locais.\n\n🎬 HOOK: O que acontece nos bastidores de um consultório de nutrição real?\n\n💬 FALAS: Meu trabalho vai muito além de prescrever dietas. É escuta ativa...\n\n✨ CTA: Agende sua consulta pelo WhatsApp no link da Bio.",
                            scheduled_at: `${currentYear}-${String(currentMonth + 1).padStart(2, '0')}-19T18:00:00.000Z`,
                            platform: "INSTAGRAM",
                            priority: "MÉDIA",
                            metadata: { version: "V1", approval_deadline: `${currentYear}-${String(currentMonth + 1).padStart(2, '0')}-17T18:00:00.000Z` }
                        },
                        {
                            id: "m_a4",
                            project_id: "p_c1",
                            title: "Estrutura Narrativa (Carrossel): Ética CFN na Nutrição",
                            status: "PRONTO",
                            caption: "🎯 OBJETIVO: Construir autoridade ética premium, explicando porque não fazemos antes e depois.\n\nSlide 1: Por que sua saúde vale mais que uma foto de 'antes e depois'.\n\nSlide 2: De acordo com o Conselho Federal de Nutrição, a imagem corporal é privada e de responsabilidade ética...\n\n✨ CTA: Agende seu acompanhamento ético pelo WhatsApp.",
                            scheduled_at: `${currentYear}-${String(currentMonth + 1).padStart(2, '0')}-26T09:00:00.000Z`,
                            platform: "INSTAGRAM",
                            priority: "ALTA",
                            metadata: { version: "V1", approval_deadline: `${currentYear}-${String(currentMonth + 1).padStart(2, '0')}-24T18:00:00.000Z` }
                        }
                    ];
                    const allMocks = JSON.parse(localStorage.getItem('fluxai_mock_assets') || '[]');
                    const filteredOthers = allMocks.filter(c => c.project_id !== projectId);
                    localStorage.setItem('fluxai_mock_assets', JSON.stringify([...filteredOthers, ..._allAssets]));
                }
                
                renderCalendar();
            }
            await checkFinancialAlerts();
        }

        function renderCalendar() {
            const grid = document.getElementById('calendar-body');
            const display = document.getElementById('current-month-display');
            if (!grid) return;

            const monthNames = ["Janeiro", "Fevereiro", "Março", "Abril", "Maio", "Junho", "Julho", "Agosto", "Setembro", "Outubro", "Novembro", "Dezembro"];
            display.innerText = `${monthNames[currentMonth]} ${currentYear}`;
            
            grid.innerHTML = '';
            const daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();
            
            for (let i = 1; i <= daysInMonth; i++) {
                const dayStr = `${currentYear}-${String(currentMonth + 1).padStart(2, '0')}-${String(i).padStart(2, '0')}`;
                const dayAssets = _allAssets.filter(c => c && c.scheduled_at && c.scheduled_at.startsWith(dayStr));

                const dayHtml = `
                    <div class="calendar-day">
                        <div class="day-num">${i}</div>
                        ${dayAssets.map(c => {
                            const statusClass = (c.status || '').toLowerCase().replace(/\s+/g, '-');
                            const isActionable = c.status === 'APROVAÇÃO PLANEJAMENTO' || c.status === 'APROVAÇÃO FINAL';
                            const statusName = c.status || 'SEM STATUS';
                            
                            if (isActionable) {
                                return `
                                    <div class="asset-card status-${statusClass}" onclick="window.location.href='approval.html?id=${c.id}'">
                                        <div style="font-size:0.5rem; opacity:0.8; margin-bottom:2px; text-transform:uppercase; font-weight:800;">${statusName}</div>
                                        <div style="overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">${c.title}</div>
                                    </div>
                                `;
                            } else {
                                return `
                                    <div class="asset-card status-${statusClass} non-clickable" style="cursor: default;">
                                        <div style="font-size:0.5rem; opacity:0.8; margin-bottom:2px; text-transform:uppercase; font-weight:800;">${statusName}</div>
                                        <div style="overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">${c.title}</div>
                                    </div>
                                `;
                            }
                        }).join('')}
                    </div>
                `;
                grid.insertAdjacentHTML('beforeend', dayHtml);
            }
        }

        window.changeMonth = (delta) => {
            currentMonth += delta;
            if (currentMonth > 11) { currentMonth = 0; currentYear++; }
            if (currentMonth < 0) { currentMonth = 11; currentYear--; }
            renderCalendar();
        };

        async function checkFinancialAlerts() {
            // Sincronizar/Garantir datas de teste no localStorage para simulação perfeita
            let mockPayments = JSON.parse(localStorage.getItem('fluxai_mock_payments') || '[]');
            const todayStr = new Date().toISOString().split('T')[0] + 'T00:00:00.000Z';
            
            // 2 dias a partir de hoje
            const in2Days = new Date();
            in2Days.setDate(in2Days.getDate() + 2);
            const in2DaysStr = in2Days.toISOString().split('T')[0] + 'T00:00:00.000Z';
            
            if (mockPayments.length > 0) {
                // Maria Aparecida (p_c1) -> Vencimento em 2 dias (Warning)
                const p1 = mockPayments.find(p => p.id === 'p1' || p.contract_id === 'c1');
                if (p1) {
                    p1.due_date = in2DaysStr;
                    p1.status = 'PENDENTE';
                    p1.amount_due = 800;
                }
                
                // Alves Odonto (p_c2) -> Vencimento Hoje (Critical PIX)
                const p2 = mockPayments.find(p => p.id === 'p2' || p.contract_id === 'c2');
                if (p2) {
                    p2.due_date = todayStr;
                    p2.status = 'PENDENTE';
                    p2.amount_due = 5000;
                }
                
                localStorage.setItem('fluxai_mock_payments', JSON.stringify(mockPayments));
            }

            // Verificar status financeiro/vencimento para o cliente atual
            const mockContracts = JSON.parse(localStorage.getItem('fluxai_mock_contracts') || '[]');
            const activeContract = mockContracts.find(c => c.project_id === projectId);
            
            if (activeContract) {
                const activePayment = mockPayments.find(p => p.contract_id === activeContract.id && p.status !== 'PAGO');
                if (activePayment) {
                    const dueDate = new Date(activePayment.due_date);
                    const today = new Date();
                    today.setHours(0,0,0,0);
                    dueDate.setHours(0,0,0,0);
                    
                    const diffTime = dueDate - today;
                    const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
                    
                    const alertContainer = document.getElementById('expiration-alert-container');
                    
                    if (diffDays === 2) {
                        // Alerta de 2 dias antes
                        alertContainer.innerHTML = `
                            <div class="expiration-banner warning">
                                <div style="display:flex; align-items:center; gap:15px;">
                                    <i class="fa-solid fa-circle-exclamation" style="font-size:1.5rem; color:var(--os-warning);"></i>
                                    <div>
                                        <h4 style="margin:0; font-size:0.85rem; color:#fff; font-weight:800;">Lembrete de Vencimento Próximo</h4>
                                        <p style="margin:3px 0 0 0; font-size:0.7rem; color:var(--os-text-muted);">
                                            Sua recorrência mensal no valor de R$ ${activePayment.amount_due.toFixed(2)} vence em 2 dias (${dueDate.toLocaleDateString('pt-BR')}).
                                        </p>
                                    </div>
                                </div>
                                <button onclick="window.location.href='/os/content-engine.html?project=${projectId}'" style="background:var(--os-primary); border:none; color:#000; padding:10px 20px; border-radius:4px; font-size:0.7rem; font-weight:800; cursor:pointer; text-transform:uppercase; letter-spacing:1px; transition:0.2s;">
                                    Ver Pautas & Estratégia
                                </button>
                            </div>
                        `;
                    } else if (diffDays === 0) {
                        // Alerta do Dia do Vencimento (PIX)
                        alertContainer.innerHTML = `
                            <div class="expiration-banner">
                                <div style="display:flex; align-items:center; gap:15px;">
                                    <i class="fa-solid fa-triangle-exclamation" style="font-size:1.5rem; color:var(--os-danger); animation: pulse 1.5s infinite;"></i>
                                    <div>
                                        <h4 style="margin:0; font-size:0.85rem; color:#fff; font-weight:800;">Recorrência com Vencimento Hoje!</h4>
                                        <p style="margin:3px 0 0 0; font-size:0.7rem; color:var(--os-text-muted);">
                                            Sua mensalidade no valor de R$ ${activePayment.amount_due.toFixed(2)} vence hoje. Efetue o pagamento via PIX para manter seus disparos e automações ativos.
                                        </p>
                                    </div>
                                </div>
                                <button onclick="openPixModal(${activePayment.amount_due}, '${activeContract.company_name}')" style="background:var(--os-primary); border:none; color:#000; padding:10px 20px; border-radius:4px; font-size:0.7rem; font-weight:800; cursor:pointer; text-transform:uppercase; letter-spacing:1px; transition:0.2s; box-shadow: 0 4px 15px rgba(142, 158, 104, 0.3);">
                                    Pagar com PIX <i class="fa-solid fa-qrcode" style="margin-left:4px;"></i>
                                </button>
                            </div>
                        `;
                    }
                }
            }
        }

        window.openPixModal = (value, companyName) => {
            const formattedValue = value.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
            const message = encodeURIComponent(`Olá! Acabei de realizar o pagamento PIX no valor de ${formattedValue} referente à mensalidade da ${companyName} no FluxAI OS™. Segue o comprovante em anexo.`);
            document.getElementById('btn-whatsapp-receipt').href = `https://wa.me/5582993051282?text=${message}`;
            document.getElementById('pix-details-modal').style.display = 'flex';
        };

        window.copyPixKey = () => {
            const keyText = document.getElementById('pix-key-display').innerText;
            navigator.clipboard.writeText(keyText).then(() => {
                alert('Chave PIX copiada com sucesso!');
            });
        };

        init();
    </script>

    <!-- MODAL PIX PREMIUM -->
    <div id="pix-details-modal" class="pix-details-modal">
        <div class="pix-modal-content">
            <button onclick="document.getElementById('pix-details-modal').style.display='none'" style="position:absolute; right:20px; top:20px; background:transparent; border:none; color:var(--os-text-muted); cursor:pointer; font-size:1.5rem;">&times;</button>
            <i class="fa-solid fa-qrcode" style="font-size: 3rem; color: var(--os-primary); margin-bottom: 20px;"></i>
            <h2 style="color: #fff; margin: 0 0 10px 0; font-size: 1.4rem; font-weight: 800;">Pagamento Instantâneo PIX</h2>
            <p style="font-size: 0.8rem; color: var(--os-text-muted); margin-bottom: 25px; line-height: 1.5;">
                Realize o pagamento escaneando o QR Code ou copiando a chave abaixo. Seu ecossistema continuará totalmente ativo.
            </p>
            
            <div style="background: rgba(255,255,255,0.02); border: 1px solid var(--os-border); border-radius: 8px; padding: 20px; margin-bottom: 25px;">
                <div style="font-size: 0.65rem; color: var(--os-primary); font-weight: 800; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 5px;">Chave CNPJ PIX</div>
                <div id="pix-key-display" style="font-family: monospace; font-size: 0.95rem; color: #fff; font-weight: 700; margin-bottom: 15px;">45.291.901/0001-88</div>
                
                <button onclick="copyPixKey()" style="background: rgba(142, 158, 104, 0.15); border: 1px solid var(--os-primary); color: var(--os-primary); padding: 8px 16px; border-radius: 4px; font-size: 0.7rem; font-weight: 800; cursor: pointer; text-transform: uppercase; letter-spacing: 1px; display: inline-flex; align-items: center; gap: 8px; transition: 0.2s;">
                    <i class="fa-solid fa-copy"></i> Copiar Chave
                </button>
            </div>
            
            <div style="display: flex; flex-direction: column; gap: 10px;">
                <a id="btn-whatsapp-receipt" href="#" target="_blank" style="background: #25d366; color: #000; padding: 12px; border-radius: 6px; font-size: 0.8rem; font-weight: 800; text-transform: uppercase; text-decoration: none; display: flex; align-items: center; justify-content: center; gap: 8px; box-shadow: 0 4px 15px rgba(37, 211, 102, 0.2); transition: 0.2s;">
                    <i class="fa-brands fa-whatsapp"></i> Enviar Comprovante
                </a>
                <button onclick="document.getElementById('pix-details-modal').style.display='none'" style="background: transparent; border: 1px solid var(--os-border); color: #fff; padding: 12px; border-radius: 6px; font-size: 0.8rem; font-weight: 700; cursor: pointer;">
                    Fechar Janela
                </button>
            </div>
        </div>
    </div>
</body>
</html>
