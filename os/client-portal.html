<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal do Cliente | FluxAI OS™</title>
    <link rel="stylesheet" href="/os/styles/interface.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --os-primary: #8e9e68;
            --os-bg: #050505;
            --os-widget-bg: #0d0d0d;
            --os-border: #1a1a1a;
            --os-text: #ffffff;
            --os-text-muted: #666666;
        }
        body { background: var(--os-bg); color: var(--os-text); font-family: 'Inter', sans-serif; }
        .portal-header { padding: 40px 20px; text-align: center; border-bottom: 1px solid var(--os-border); margin-bottom: 40px; }
        .portal-header h1 { font-size: 1.8rem; letter-spacing: -1px; margin-bottom: 10px; }
        .portal-header p { color: var(--os-text-muted); font-size: 0.9rem; }
        
        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 10px;
            padding: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }
        .calendar-day {
            background: var(--os-widget-bg);
            border: 1px solid var(--os-border);
            padding: 10px;
            border-radius: 4px;
            position: relative;
            min-height: 80px;
        }
        .day-num { font-size: 0.7rem; color: var(--os-text-muted); margin-bottom: 8px; font-weight: 800; }
        
        .asset-card {
            font-size: 0.65rem;
            padding: 6px;
            border-radius: 3px;
            margin-bottom: 4px;
            cursor: pointer;
            transition: 0.2s;
            border: 1px solid transparent;
        }
        .asset-card:hover { transform: translateY(-2px); border-color: var(--os-primary); }
        
        .status-aprovação-planejamento { background: rgba(59, 130, 246, 0.15); color: #60a5fa; border: 1px solid rgba(59, 130, 246, 0.4); }
        .status-revisão-gestão { background: rgba(139, 92, 246, 0.15); color: #a78bfa; border: 1px solid rgba(139, 92, 246, 0.4); }
        .status-aprovação-final { background: rgba(59, 130, 246, 0.2); color: #60a5fa; border: 1px solid rgba(59, 130, 246, 0.5); font-weight: 800; }
        .status-ajuste { background: rgba(239, 68, 68, 0.15); color: #ef4444; border: 1px solid rgba(239, 68, 68, 0.4); }
        .status-ajuste-de-produção { background: rgba(236, 72, 153, 0.15); color: #ec4899; border: 1px solid rgba(236, 72, 153, 0.4); }
        .status-produção { background: rgba(245, 158, 11, 0.15); color: #f59e0b; border: 1px solid rgba(245, 158, 11, 0.4); }
        .status-pronto { background: #10b981; color: #fff; border: 1px solid #10b981; font-weight: 900; }
        .status-planejamento { background: rgba(139, 92, 246, 0.15); color: #a78bfa; border: 1px solid rgba(139, 92, 246, 0.4); }
        .status-publicado { background: #000; color: #10b981; border: 1px solid #10b981; box-shadow: 0 0 10px rgba(16, 185, 129, 0.2); }
        
        @media (max-width: 768px) {
            .calendar-grid { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>
<body>
    <header class="portal-header">
        <div style="color:var(--os-primary); font-weight:900; font-size:0.7rem; letter-spacing:3px; margin-bottom:10px;">FLUXAI OS™</div>
        <div class="success-msg" id="success-ui" style="display:none;">
            <i class="fa-solid fa-circle-check"></i>
            <h2 id="success-title">Planejamento Aprovado!</h2>
            <p id="success-message">Excelente. Esta pauta foi enviada para a Execução Operacional.</p>
            <button class="btn btn-approve" style="margin-top: 30px; padding: 15px 40px; font-size: 0.9rem; background: var(--os-primary); color: #000; font-weight: 800; border: none; border-radius: 4px; cursor: pointer; display: inline-flex; align-items: center; gap: 10px; box-shadow: 0 4px 20px rgba(142, 158, 104, 0.4);" onclick="window.location.reload()">
                <i class="fa-solid fa-rotate"></i> ATUALIZAR CALENDÁRIO
            </button>
        </div>
        <h1 id="portal-title">Fluxo Estratégico</h1>
        <p id="client-name">Sincronizando dados...</p>
    </header>

    <div class="calendar-grid" id="calendar-body"></div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        let supabase;
        let initAttempts = 0;

        function getSupabaseClient() {
            if (supabase) return supabase;
            
            // Tenta capturar a biblioteca global em diferentes escopos
            const lib = window.supabase || (typeof supabase !== 'undefined' ? supabase : null);
            
            if (lib && typeof lib.createClient === 'function') {
                supabase = lib.createClient("https://mufgwetfhfhhmhowbhjj.supabase.co", "sb_publishable_Ui_zR38kkGVdTxRUELcRfw_5ahurUs5");
                return supabase;
            }
            return null;
        }

        const params = new URLSearchParams(window.location.search);
        const projectId = params.get('project_id') || params.get('project');

        async function init() {
            const nameEl = document.getElementById('client-name');
            
            if (!projectId) {
                console.error('[PORTAL] Nenhum ID de projeto fornecido.');
                if (nameEl) nameEl.innerText = 'Acesso Negado: ID do Projeto Ausente';
                return document.body.innerHTML = '<div style="padding:50px; text-align:center;"><h1>Acesso negado.</h1><p>ID do projeto não encontrado na URL.</p></div>';
            }

            const client = getSupabaseClient();
            if (!client) {
                initAttempts++;
                if (initAttempts > 20) { // 10 segundos
                    console.error('[PORTAL] Falha ao carregar biblioteca Supabase após 10s.');
                    if (nameEl) nameEl.innerText = 'Erro de Conexão: Biblioteca não carregada.';
                    return;
                }
                console.log(`[PORTAL] Aguardando Supabase (Tentativa ${initAttempts})...`);
                return setTimeout(init, 500);
            }

            if (nameEl) nameEl.innerText = 'Sincronizando Ativos...';
            console.log('[PORTAL] Iniciando sincronização para projeto:', projectId);

            // 1. Buscar Nome do Projeto/Cliente
            try {
                const { data: projData, error: pError } = await client.from('projects').select('company_name, name').eq('id', projectId).single();
                
                if (projData) {
                    const now = new Date();
                    const currentMonth = now.toLocaleString('pt-BR', { month: 'long' });
                    const titleEl = document.getElementById('portal-title');
                    if (titleEl) titleEl.innerText = `Fluxo Estratégico: ${currentMonth.charAt(0).toUpperCase() + currentMonth.slice(1)}`;
                    
                    if (nameEl) nameEl.innerText = `${projData.company_name || projData.name}`;
                } else {
                    console.warn('[PORTAL] Projeto não encontrado ou erro:', pError);
                    if (nameEl) nameEl.innerText = 'Projeto não localizado no Ecossistema';
                }
            } catch (err) {
                console.error('[PORTAL] Falha ao buscar projeto:', err);
                if (nameEl) nameEl.innerText = 'Cronograma de Conteúdo';
            }

            // 2. Buscar Ativos do Calendário
            try {
                const { data: assets, error } = await client.from('content_assets')
                    .select('*')
                    .eq('project_id', projectId)
                    .order('scheduled_at', { ascending: true });

                if (error) {
                    console.error('[PORTAL] Erro ao buscar ativos:', error);
                    renderCalendar([]);
                } else {
                    renderCalendar(assets || []);
                }
            } catch (err) {
                console.error('[PORTAL] Falha ao carregar ativos:', err);
                renderCalendar([]);
            }
        }

        // Inicialização Segura
        document.addEventListener('DOMContentLoaded', () => {
            init();
        });

        // ATUALIZAÇÃO AUTOMÁTICA: Quando o cliente volta para esta aba
        window.onfocus = () => {
            init();
        };

        function renderCalendar(contents) {
            console.log('[PORTAL] Renderizando calendário com', contents.length, 'ativos');
            const grid = document.getElementById('calendar-body');
            if (!grid) return;
            grid.innerHTML = '';

            const now = new Date();
            const year = now.getFullYear();
            const month = now.getMonth();
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            const monthNames = ["Janeiro", "Fevereiro", "Março", "Abril", "Maio", "Junho", "Julho", "Agosto", "Setembro", "Outubro", "Novembro", "Dezembro"];
            const monthName = monthNames[month];
            
            const titleEl = document.getElementById('portal-title');
            if (titleEl) titleEl.innerText = `Fluxo Estratégico: ${monthName}`;

            for (let i = 1; i <= daysInMonth; i++) {
                const dayStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(i).padStart(2, '0')}`;
                const dayAssets = (contents || []).filter(c => c && c.scheduled_at && c.scheduled_at.startsWith(dayStr));

                const dayHtml = `
                    <div class="calendar-day">
                        <div class="day-num">${i}</div>
                        ${dayAssets.map(c => {
                            const statusClass = (c.status || '').toLowerCase().replace(/\s+/g, '-');
                            return `
                                <div class="asset-card status-${statusClass}" onclick="window.openApproval('${c.id}')">
                                    <div style="font-weight:800; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">${c.title || 'Sem Título'}</div>
                                    <div style="font-size:0.5rem; opacity:0.7; margin-top:2px;">${c.status || 'Pendente'}</div>
                                </div>
                            `;
                        }).join('')}
                    </div>
                `;
                grid.insertAdjacentHTML('beforeend', dayHtml);
            }
        }

        window.openApproval = (id) => {
            window.location.href = `/os/approval.html?id=${id}`;
        };

        // EXPOR FUNÇÕES PARA O GLOBAL
        window.initPortal = init;

        init();
    </script>
</body>
</html>
