<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal do Cliente | FluxAI OS™</title>
    <link rel="stylesheet" href="/os/styles/interface.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --os-primary: #8e9e68;
            --os-bg: #050505;
            --os-surface: rgba(20, 20, 20, 0.6);
            --os-border: rgba(255, 255, 255, 0.08);
            --os-text: #ffffff;
            --os-text-muted: #888888;
            --glass-bg: rgba(255, 255, 255, 0.03);
        }

        body { 
            background: radial-gradient(circle at 50% 0%, #1a1f14 0%, var(--os-bg) 80%); 
            color: var(--os-text); 
            font-family: 'Inter', sans-serif; 
            margin:0; 
            padding:0; 
            overflow-x: hidden;
        }

        .portal-header { 
            padding: 40px 20px 30px; 
            text-align: center; 
            border-bottom: 1px solid var(--os-border); 
            background: transparent;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            position: relative;
        }

        .portal-header h1 { 
            font-size: 1.8rem; 
            letter-spacing: -1.5px; 
            margin: 5px 0; 
            color: #fff; 
            text-transform: uppercase; 
            font-weight: 900;
            background: linear-gradient(to bottom, #fff, #aaa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .month-nav {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 30px;
            margin-top: 20px;
        }

        .nav-btn {
            background: var(--glass-bg);
            border: 1px solid var(--os-border);
            color: #fff;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .nav-btn:hover { background: var(--os-primary); color: #000; transform: scale(1.1); border-color: var(--os-primary); }

        #current-month-display { 
            font-size: 0.75rem; 
            font-weight: 900; 
            color: var(--os-primary); 
            text-transform: uppercase; 
            letter-spacing: 3px; 
            min-width: 160px; 
        }

        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 10px;
            padding: 20px;
            max-width: 1400px;
            margin: 0 auto;
            animation: fadeInUp 0.8s ease;
        }

        .calendar-day {
            background: var(--os-surface);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid var(--os-border);
            padding: 10px;
            border-radius: 12px;
            position: relative;
            min-height: 100px;
            display: flex;
            flex-direction: column;
            transition: all 0.3s;
        }

        .calendar-day:hover { border-color: rgba(255,255,255,0.2); background: rgba(255,255,255,0.05); }

        .day-num { font-size: 0.7rem; color: var(--os-text-muted); margin-bottom: 10px; font-weight: 900; }
        
        .asset-card {
            font-size: 0.65rem;
            padding: 8px 10px;
            border-radius: 8px;
            margin-bottom: 6px;
            cursor: pointer;
            transition: all 0.3s;
            border: 1px solid transparent;
            font-weight: 700;
            background: rgba(255,255,255,0.03);
        }

        .asset-card:hover:not(.non-clickable) { 
            transform: translateY(-3px); 
            border-color: var(--os-primary); 
            box-shadow: 0 10px 20px rgba(0,0,0,0.5); 
            background: rgba(255,255,255,0.08);
        }
        
        /* Status visíveis ao cliente */
        .status-aprovação-planejamento { background: rgba(59, 130, 246, 0.1); color: #60a5fa; border: 1px solid rgba(59, 130, 246, 0.3); }
        .status-aprovação-final { background: rgba(139, 92, 246, 0.15); color: #a78bfa; border: 1px solid rgba(139, 92, 246, 0.5); }
        .status-ajuste { background: rgba(239, 68, 68, 0.1); color: #f87171; border: 1px solid rgba(239, 68, 68, 0.3); }
        .status-ajuste-de-produção { background: rgba(236, 72, 153, 0.1); color: #f472b6; border: 1px solid rgba(236, 72, 153, 0.3); }
        .status-produção { background: rgba(245, 158, 11, 0.1); color: #fbbf24; border: 1px solid rgba(245, 158, 11, 0.3); }
        .status-pronto { background: rgba(16, 185, 129, 0.15); color: #34d399; border: 1px solid #10b981; }
        .status-publicado { background: #000; color: #34d399; border: 1px solid #10b981; box-shadow: 0 0 15px rgba(16, 185, 129, 0.1); }
        
        /* Status internos */
        .status-planejamento, .status-revisão-gestão, .status-aprovação-estratégica, .status-revisão-interna-final { 
            background: transparent; color: #555; border: 1px dashed rgba(255, 255, 255, 0.1); opacity: 0.6; 
        }
        
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 1000px) { .calendar-grid { grid-template-columns: repeat(4, 1fr); } }
        @media (max-width: 600px) { .calendar-grid { grid-template-columns: repeat(2, 1fr); } }
    </style>
</head>
<body>
    <header class="portal-header">
        <div style="color:var(--os-primary); font-weight:900; font-size:0.6rem; letter-spacing:4px; margin-bottom:10px; opacity: 0.8;">FLUXAI OS™</div>
        
        <h1 id="portal-title">Portal do Cliente</h1>
        <p id="client-name" style="font-weight: 700; color: #eee; font-size: 1rem; margin-top: 10px;">Aguarde...</p>
        <p id="client-profession" style="opacity: 0.5; margin-top: 5px; font-size: 0.7rem; letter-spacing: 1px;">SINCRONIZANDO ECOSSISTEMA DIGITAL...</p>

        <div class="month-nav">
            <button class="nav-btn" onclick="changeMonth(-1)"><i class="fa-solid fa-chevron-left"></i></button>
            <span id="current-month-display">---</span>
            <button class="nav-btn" onclick="changeMonth(1)"><i class="fa-solid fa-chevron-right"></i></button>
        </div>
    </header>

    <div class="calendar-grid" id="calendar-body"></div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        let _supabaseClient = null;
        let _allAssets = [];
        let currentYear = new Date().getFullYear();
        let currentMonth = new Date().getMonth();

        const params = new URLSearchParams(window.location.search);
        const projectId = params.get('project_id') || params.get('project');

        async function init() {
            if (!projectId) return document.getElementById('client-name').innerText = 'Acesso Negado: ID do Projeto Ausente';

            if (!_supabaseClient) {
                _supabaseClient = window.supabase.createClient("https://mufgwetfhfhhmhowbhjj.supabase.co", "sb_publishable_Ui_zR38kkGVdTxRUELcRfw_5ahurUs5");
            }

            try {
                // 1. Dados do Projeto
                const { data: proj } = await _supabaseClient.from('projects').select('name, company_name, metadata').eq('id', projectId).single();
                
                if (proj) {
                    document.getElementById('client-name').innerText = (proj.name || proj.company_name).toUpperCase();
                    const profession = proj.metadata?.onboarding?.profession || 'Estratégia Institucional';
                    document.getElementById('client-profession').innerText = profession.toUpperCase();
                } else {
                    document.getElementById('client-name').innerText = 'PROJETO FLUXAI OS™';
                    document.getElementById('client-profession').innerText = 'SINCRONIZAÇÃO DE ATIVOS';
                }

                const { data: assets } = await _supabaseClient.from('content_assets')
                    .select('*')
                    .eq('project_id', projectId)
                    .order('scheduled_at', { ascending: true });

                _allAssets = assets || [];
                renderCalendar();
            } catch (err) {
                console.warn('[PORTAL] Offline ou Erro de ID. Exibindo Estado de Manutenção Segura.', err);
                
                document.getElementById('client-name').innerText = 'MANUTENÇÃO PROGRAMADA';
                document.getElementById('client-name').style.color = 'var(--os-warning)';
                document.getElementById('client-profession').innerText = 'Sincronização Temporariamente Indisponível';
                
                const grid = document.getElementById('calendar-body');
                if (grid) {
                    grid.style.display = 'flex';
                    grid.style.justifyContent = 'center';
                    grid.style.alignItems = 'center';
                    grid.style.padding = '60px 20px';
                    grid.innerHTML = `
                        <div style="text-align:center; background: rgba(255,255,255,0.02); border: 1px dashed rgba(255,255,255,0.1); padding: 40px; border-radius: 12px; max-width: 500px;">
                            <i class="fa-solid fa-shield-halved" style="font-size: 2.5rem; color: var(--os-warning); margin-bottom: 20px; opacity: 0.8;"></i>
                            <h2 style="font-size: 1.2rem; margin-bottom: 10px; font-weight: 800;">Protocolo de Segurança Ativo</h2>
                            <p style="font-size: 0.8rem; color: var(--os-text-muted); line-height: 1.6;">O acesso ao portal foi pausado temporariamente para manutenção estrutural ou validação de ID. A operação retornará em breve.</p>
                        </div>
                    `;
                }
            }
        }

        function renderCalendar() {
            const grid = document.getElementById('calendar-body');
            const display = document.getElementById('current-month-display');
            if (!grid) return;

            const monthNames = ["Janeiro", "Fevereiro", "Março", "Abril", "Maio", "Junho", "Julho", "Agosto", "Setembro", "Outubro", "Novembro", "Dezembro"];
            display.innerText = `${monthNames[currentMonth]} ${currentYear}`;
            
            grid.innerHTML = '';
            const daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();
            
            for (let i = 1; i <= daysInMonth; i++) {
                const dayStr = `${currentYear}-${String(currentMonth + 1).padStart(2, '0')}-${String(i).padStart(2, '0')}`;
                const dayAssets = _allAssets.filter(c => c && c.scheduled_at && c.scheduled_at.startsWith(dayStr));

                const dayHtml = `
                    <div class="calendar-day">
                        <div class="day-num">${i}</div>
                        ${dayAssets.map(c => {
                            const statusClass = (c.status || '').toLowerCase().replace(/\s+/g, '-');
                            const isActionable = c.status === 'APROVAÇÃO PLANEJAMENTO' || c.status === 'APROVAÇÃO FINAL';
                            const statusName = c.status || 'SEM STATUS';
                            
                            if (isActionable) {
                                return `
                                    <div class="asset-card status-${statusClass}" onclick="window.location.href='/os/approval.html?id=${c.id}'">
                                        <div style="font-size:0.5rem; opacity:0.8; margin-bottom:2px; text-transform:uppercase; font-weight:800;">${statusName}</div>
                                        <div style="overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">${c.title}</div>
                                    </div>
                                `;
                            } else {
                                return `
                                    <div class="asset-card status-${statusClass} non-clickable" style="cursor: default;">
                                        <div style="font-size:0.5rem; opacity:0.8; margin-bottom:2px; text-transform:uppercase; font-weight:800;">${statusName}</div>
                                        <div style="overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">${c.title}</div>
                                    </div>
                                `;
                            }
                        }).join('')}
                    </div>
                `;
                grid.insertAdjacentHTML('beforeend', dayHtml);
            }
        }

        window.changeMonth = (delta) => {
            currentMonth += delta;
            if (currentMonth > 11) { currentMonth = 0; currentYear++; }
            if (currentMonth < 0) { currentMonth = 11; currentYear--; }
            renderCalendar();
        };

        init();
    </script>
</body>
</html>
