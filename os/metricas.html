<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FluxAI OS™ | Métricas Operacionais</title>
    <link rel="stylesheet" href="./styles/interface.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
    <style>
        .os-widget.half { grid-column: span 6; }
    </style>
</head>
<body class="os-mode">
    <div class="os-bg-glow"></div>
    <div class="os-shell">
        <aside class="os-sidebar"></aside>
        <div class="os-viewport-wrapper">
            <header class="os-topbar"></header>
            <main class="os-viewport">
                <div class="os-page-title">
                    <h1>Métricas Consolidadas</h1>
                    <p>Leitura diária das fontes de tráfego, orgânico e ads orquestradas pelo Make.</p>
                </div>
                
                <div class="os-widget-grid" id="metrics-grid">
                    <!-- Injetado via JS -->
                    <div style="opacity: 0.5; padding: 20px;">Sincronizando com Google Sheets via Make...</div>
                </div>
            </main>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script type="module" src="./js/modules/metrics.js"></script>
</body>
</html>
