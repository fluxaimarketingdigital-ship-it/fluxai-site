<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FluxAI OS™ | Aprovação de Conteúdo</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet" />
    <style>
        :root { --os-primary: #6b7a45; --os-bg: #0a0a0a; --os-surface: #141414; --os-text: #ffffff; --os-border: rgba(255,255,255,0.1); }
        body { background: var(--os-bg); color: var(--os-text); font-family: 'Inter', sans-serif; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; justify-content: center; }
        .approval-container { width: 100%; max-width: 800px; background: var(--os-surface); border: 1px solid var(--os-border); border-radius: 16px; padding: 40px; box-sizing: border-box; box-shadow: 0 20px 50px rgba(0,0,0,0.5); border-top: 4px solid var(--os-primary); }
        
        .header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 40px; border-bottom: 1px solid var(--os-border); padding-bottom: 25px; }
        .header h1 { font-size: 1.4rem; font-weight: 900; margin: 0; letter-spacing: -1px; }
        .status-badge { padding: 6px 14px; border-radius: 20px; font-size: 0.7rem; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; }
        
        .meta-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; margin-bottom: 35px; background: rgba(255,255,255,0.03); padding: 20px; border-radius: 12px; border: 1px solid var(--os-border); }
        .meta-item { display: flex; flex-direction: column; gap: 5px; }
        .meta-label { font-size: 0.65rem; color: var(--os-primary); font-weight: 800; text-transform: uppercase; letter-spacing: 1px; }
        .meta-value { font-size: 0.9rem; font-weight: 600; color: #fff; }

        .content-body { line-height: 1.8; font-size: 0.95rem; color: rgba(255,255,255,0.9); }
        .content-body h2 { font-size: 0.8rem; text-transform: uppercase; color: var(--os-primary); margin: 30px 0 15px 0; border-bottom: 1px solid var(--os-primary); display: inline-block; padding-bottom: 2px; }

        .actions { display: grid; grid-template-columns: 1fr 1.5fr; gap: 15px; margin-top: 40px; }
        .btn { border: none; padding: 18px; border-radius: 10px; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; font-size: 0.9rem; transition: 0.3s; }
        .btn-approve { background: var(--os-primary); color: #fff; box-shadow: 0 10px 20px rgba(107,122,69,0.3); }
        .btn-reject { background: transparent; border: 1px solid rgba(255,68,68,0.5); color: #ff4444; }
        .btn:hover { transform: translateY(-2px); opacity: 0.9; }
        .btn-secondary { background: var(--os-primary); color: #000; font-weight: 800; border: none; box-shadow: 0 5px 15px rgba(107, 122, 69, 0.4); }
        .btn-secondary:hover { transform: translateY(-3px); box-shadow: 0 8px 25px rgba(107, 122, 69, 0.6); }

        .feedback-area { display: none; margin-top: 30px; animation: fadeIn 0.4s ease; }
        .check-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .check-item { display: flex; align-items: center; gap: 10px; background: rgba(255,255,255,0.03); padding: 12px; border-radius: 8px; font-size: 0.8rem; cursor: pointer; border: 1px solid transparent; }
        .check-item input { accent-color: var(--os-primary); }
        .check-item:hover { border-color: var(--os-primary); }
        
        textarea { width: 100%; background: #000; border: 1px solid var(--os-border); color: #fff; padding: 15px; border-radius: 10px; box-sizing: border-box; margin-bottom: 15px; font-family: inherit; }
        
        .success-msg { display: none; text-align: center; padding: 50px 20px; }
        .success-msg i { font-size: 4rem; color: var(--os-primary); margin-bottom: 20px; }

        @keyframes pulse-red {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.05); color: #ff4444; text-shadow: 0 0 15px rgba(255,68,68,0.5); }
            100% { transform: scale(1); opacity: 1; }
        }
        .deadline-alert { animation: pulse-red 2s infinite ease-in-out; display: inline-block; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div class="approval-container" id="main-ui" style="display:none;">
        <div class="header">
            <div>
                <h1>FluxAI <span>OS™</span></h1>
                <p style="font-size:0.7rem; opacity:0.5; margin:5px 0 0 0;">PLANEJAMENTO ESTRATÉGICO</p>
            </div>
            <div id="status-badge-container">
                <!-- Status Badge Injected -->
            </div>
        </div>

        <div id="loading-state" style="text-align: center; padding: 40px; opacity: 0.5;">
            <i class="fa-solid fa-spinner fa-spin"></i> Sincronizando diretrizes...
        </div>

        <div id="content-data" style="display: none;">
            <div class="meta-grid">
                <div class="meta-item">
                    <span class="meta-label">Objetivo</span>
                    <span class="meta-value" id="meta-obj">---</span>
                </div>
                <div class="meta-item">
                    <span class="meta-label">Formato</span>
                    <span class="meta-value" id="meta-format">---</span>
                </div>
                <div class="meta-item">
                    <span class="meta-label">Publicação</span>
                    <span class="meta-value" id="meta-time">---</span>
                </div>
                <div class="meta-item">
                    <span class="meta-label">Prazo p/ Aprovação</span>
                    <span class="meta-value" id="meta-date" style="color:#60a5fa; font-weight:800;">---</span>
                </div>
                <div class="meta-item">
                    <span class="meta-label">Versão</span>
                    <span class="meta-value" id="meta-version">V1</span>
                </div>
            </div>
            
            <div id="ref-link-container"></div>

            <div class="content-body">
                <h2>Roteiro Estratégico</h2>
                <div id="asset-caption" style="white-space: pre-wrap;"></div>
            </div>

            <div class="actions">
                <button class="btn btn-reject" id="btn-reject-action">
                    <i class="fa-solid fa-xmark"></i> SOLICITAR REVISÃO
                </button>
                <button class="btn btn-approve" id="btn-approve-action">
                    <i class="fa-solid fa-check"></i> APROVAR PLANEJAMENTO
                </button>
            </div>

            <div class="feedback-area" id="feedback-ui">
                <h3 style="font-size:0.8rem; color:var(--os-primary); margin-bottom:15px;">O que precisa ser ajustado antes da aprovação?</h3>
                <div class="check-grid" id="adjustment-checks">
                    <!-- Checkboxes Injected -->
                </div>
                <textarea id="feedback-text" rows="4" placeholder="Outras observações estratégicas..."></textarea>
                <button class="btn btn-approve" style="width: 100%;" id="btn-submit-feedback">ENVIAR SOLICITAÇÃO DE REVISÃO</button>
            </div>
        </div>
    </div>

    <div class="success-msg" id="success-ui">
        <i class="fa-solid fa-circle-check"></i>
        <h2 id="success-title">Planejamento Aprovado!</h2>
        <p id="success-message">Excelente. Esta pauta foi enviada para a Execução Operacional.</p>
        <button class="btn btn-secondary" style="margin: 20px auto; width: auto; padding: 15px 35px; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px;" onclick="window.history.back()">
            <i class="fa-solid fa-calendar-days"></i> VOLTAR PARA O CALENDÁRIO
        </button>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const CLIENT_VIEW_MATRIX = {
            'Direção Operacional Audiovisual': 'REELS',
            'Direção Estratégica Visual': 'POST',
            'Estrutura Narrativa de Carrossel': 'CARROSSEL',
            'Arquitetura Estratégica Digital': 'SITE',
            'Arquitetura de Posicionamento': 'BRANDING'
        };

        const ADJUSTMENT_CHECKS = {
            'REELS': ['Tema', 'Hook (Gancho)', 'Tempo', 'CTA', 'Linguagem', 'Abordagem'],
            'CARROSSEL': ['Tema', 'Quantidade de Slides', 'Estrutura Narrativa', 'Abordagem Visual', 'Tensão'],
            'SITE': ['Estrutura', 'Páginas', 'Navegação', 'Copy', 'CTA', 'SEO'],
            'BRANDING': ['Posicionamento', 'Tom de voz', 'Paleta', 'Tipografia', 'Narrativa'],
            'TRÁFEGO PAGO': ['Canais', 'Públicos', 'Criativos', 'Orçamento', 'CTA'],
            'CRM': ['Pipeline', 'Gatilhos', 'Automações', 'Health Score'],
            'AUTOMAÇÃO': ['Fluxo Lógico', 'Integrações', 'Gatilhos', 'Eficiência'],
            'DEFAULT': ['Tema', 'Objetivo', 'Abordagem', 'Contexto Estratégico']
        };

        function formatClientTitle(title) {
            if (!title) return { prefix: 'POST', obj: 'Estratégia' };
            const parts = title.split(':');
            const internalName = parts[0].trim();
            const objective = parts[1] ? parts[1].trim() : 'Estratégia';
            return { prefix: CLIENT_VIEW_MATRIX[internalName] || 'POST', obj: objective };
        }

        async function load() {
            const params = new URLSearchParams(window.location.search);
            const id = params.get('id');
            if (!id) {
                document.getElementById('loading-state').innerText = 'ID do ativo não encontrado.';
                return;
            }

            try {
                const supabaseUrl = "https://mufgwetfhfhhmhowbhjj.supabase.co";
                const supabaseKey = "sb_publishable_Ui_zR38kkGVdTxRUELcRfw_5ahurUs5";
                const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

                const { data: c, error } = await supabase.from('content_assets').select('*').eq('id', id).single();
                
                if (error || !c) throw new Error('Conteúdo não encontrado.');

                // BLOQUEIO DE ACESSO PÓS-APROVAÇÃO OU EM REVISÃO
                const currentStatus = (c.status || '').toUpperCase();
                const allowedStatus = ['APROVAÇÃO ESTRATÉGICA', 'APROVAÇÃO FINAL', 'PLANEJAMENTO'];
                
                if (!allowedStatus.includes(currentStatus)) {
                    document.getElementById('loading-state').style.display = 'none';
                    document.getElementById('main-ui').style.display = 'none';
                    
                    if (currentStatus === 'AJUSTE' || currentStatus === 'REVISÃO INTERNA' || (currentStatus === 'PRODUÇÃO' && !c.metadata?.final_asset_url)) {
                        document.getElementById('success-title').innerText = 'Aguardando Revisão';
                        const feedbackMsg = c.internal_notes ? `<br><br><div style="background:rgba(245,158,11,0.1); border:1px solid rgba(245,158,11,0.3); padding:15px; border-radius:8px; font-size:0.8rem; text-align:left; color:#fff;"><strong style="color:var(--os-primary);">Sua Solicitação:</strong><br>${c.internal_notes}</div>` : '';
                        document.getElementById('success-message').innerHTML = `Seus apontamentos já foram enviados para a nossa equipe técnica. No momento, o planejamento está sendo ajustado conforme suas diretrizes. ${feedbackMsg}`;
                    } else {
                        document.getElementById('success-title').innerText = 'Acesso Encerrado';
                        document.getElementById('success-message').innerText = 'Este planejamento já foi validado e seguiu para a Etapa de Produção Operacional. Você pode acompanhar o progresso no seu Calendário.';
                    }
                    
                    document.getElementById('success-ui').style.display = 'block';
                    return;
                }

                // DETECTAR SE É VALIDAÇÃO DE ARTE OU ESTRATÉGIA
                const isArtValidation = currentStatus === 'APROVAÇÃO FINAL';

                // ACESSO PERMITIDO - MOSTRAR UI
                document.getElementById('main-ui').style.display = 'block';

                if (isArtValidation) {
                    document.querySelector('h1').innerHTML = 'FluxAI <span>OS™</span>';
                    document.querySelector('p[style*="font-size:0.7rem"]').innerText = 'APROVAÇÃO DE ARTE FINAL';
                }

                // Proteção contra dados malformados
                let prefix = 'POST', obj = 'Estratégia';
                try {
                    const titleParts = formatClientTitle(c.title);
                    prefix = titleParts.prefix;
                    obj = titleParts.obj;
                } catch (e) { console.warn('[APPROVAL] Meta parsing failed:', e); }

                document.getElementById('meta-obj').innerText = obj || 'Estratégia';
                document.getElementById('meta-format').innerText = prefix || 'POST';
                
                const pubDate = new Date(c.scheduled_at);
                const appDeadline = c.metadata?.approval_deadline ? new Date(c.metadata.approval_deadline) : null;

                document.getElementById('meta-time').innerText = pubDate.toLocaleString('pt-BR', { day: '2-digit', month: '2-digit', hour: '2-digit', minute: '2-digit' });
                
                const deadlineEl = document.getElementById('meta-date');
                if (appDeadline) {
                    deadlineEl.innerText = appDeadline.toLocaleString('pt-BR', { day: '2-digit', month: '2-digit', hour: '2-digit', minute: '2-digit' });
                    
                    // LÓGICA DE PULSO: Se faltar menos de 24h para o prazo
                    const now = new Date();
                    const diffHours = (appDeadline - now) / (1000 * 60 * 60);
                    if (diffHours < 24 && diffHours > 0) {
                        deadlineEl.classList.add('deadline-alert');
                    } else {
                        deadlineEl.classList.remove('deadline-alert');
                    }
                } else {
                    deadlineEl.innerText = 'S/ Prazo';
                    deadlineEl.classList.remove('deadline-alert');
                }
                
                // EXIBIÇÃO DE VERSÃO
                document.getElementById('meta-version').innerText = c.metadata?.version || 'V1';
                
                // MOSTRAR APENAS O ROTEIRO (SEM LEGENDA/HASHTAGS NA ETAPA 1)
                let roadmap = c.caption ? c.caption.split('📝 LEGENDA:')[0].trim() : 'Diretriz estratégica em definição.';
                
                // Formatação Elegante do Roteiro
                roadmap = roadmap
                    .replace(/🎯 OBJETIVO:/g, '<b style="color:var(--os-primary);">🎯 OBJETIVO:</b>')
                    .replace(/🎬 HOOK:/g, '<br><b style="color:var(--os-primary);">🎬 HOOK:</b>')
                    .replace(/💬 FALAS:/g, '<br><b style="color:var(--os-primary);">💬 FALAS:</b>')
                    .replace(/✨ CTA:/g, '<br><b style="color:var(--os-primary);">✨ CTA:</b>')
                    .replace(/\n/g, '<br>');
                
                if (isArtValidation && c.metadata?.final_asset_url) {
                    document.getElementById('asset-caption').innerHTML = `
                        <div style="background: rgba(139, 92, 246, 0.1); border: 1px solid #8b5cf6; padding: 20px; border-radius: 12px; text-align: center; margin-bottom: 25px;">
                            <i class="fa-solid fa-file-circle-check" style="font-size: 3rem; color: #8b5cf6; margin-bottom: 15px;"></i>
                            <h3 style="color: #fff; margin-bottom: 10px;">A Arte Final está pronta!</h3>
                            <p style="font-size: 0.8rem; opacity: 0.7; margin-bottom: 20px;">Clique no botão abaixo para visualizar o arquivo final em alta resolução.</p>
                            <a href="${c.metadata.final_asset_url}" target="_blank" class="btn btn-approve" style="background: #8b5cf6; color: #fff; width: auto; display: inline-flex; padding: 12px 30px;">
                                <i class="fa-solid fa-eye"></i> VISUALIZAR ARTE FINAL
                            </a>
                        </div>
                        <div style="opacity: 0.5; font-size: 0.8rem;">
                            <strong>Lembrete do Planejamento:</strong><br>
                            ${roadmap}
                        </div>
                    `;
                    document.getElementById('btn-approve-action').innerHTML = '<i class="fa-solid fa-circle-check"></i> APROVAR ARTE PARA POSTAGEM';
                    document.getElementById('btn-reject-action').innerHTML = '<i class="fa-solid fa-rotate-left"></i> SOLICITAR AJUSTE NA ARTE';
                } else {
                    document.getElementById('btn-approve-action').innerHTML = '<i class="fa-solid fa-check"></i> APROVAR PLANEJAMENTO';
                    document.getElementById('btn-reject-action').innerHTML = '<i class="fa-solid fa-xmark"></i> SOLICITAR REVISÃO';
                    document.getElementById('asset-caption').innerHTML = roadmap;
                }
                
                // LINK DE REFERÊNCIA (Oculto para o cliente por segurança operacional)
                const refBtn = document.getElementById('ref-link-container');
                if (refBtn) refBtn.innerHTML = '';

                const badge = document.getElementById('status-badge-container');
                if (c.status === 'APROVAÇÃO FINAL') {
                    badge.innerHTML = `<span class="status-badge" style="background:rgba(139, 92, 246,0.2); color:#a78bfa; border:1px solid #8b5cf6;">🟣 AGUARDANDO APROVAÇÃO FINAL</span>`;
                } else if (c.status === 'PRODUÇÃO') {
                    badge.innerHTML = `<span class="status-badge" style="background:rgba(245,158,11,0.2); color:#f59e0b; border:1px solid #f59e0b;">🟡 EM PRODUÇÃO</span>`;
                } else if (c.status === 'APROVAÇÃO ESTRATÉGICA' || c.status === 'PLANEJAMENTO') {
                    badge.innerHTML = `<span class="status-badge" style="background:rgba(16,185,129,0.2); color:#10b981; border:1px solid #10b981;">🟢 AGUARDANDO APROVAÇÃO</span>`;
                } else if (c.status === 'AJUSTE') {
                    badge.innerHTML = `<span class="status-badge" style="background:rgba(239, 68, 68, 0.2); color:#ef4444; border:1px solid #ef4444;">🔴 EM REVISÃO</span>`;
                }

                const checks = ADJUSTMENT_CHECKS[prefix] || ADJUSTMENT_CHECKS['DEFAULT'];
                document.getElementById('adjustment-checks').innerHTML = checks.map(check => `
                    <label class="check-item">
                        <input type="checkbox" value="${check}"> ${check}
                    </label>
                `).join('');

                document.getElementById('loading-state').style.display = 'none';
                document.getElementById('content-data').style.display = 'block';

                document.getElementById('btn-approve-action').onclick = async () => {
                    try {
                        const now = new Date().toLocaleDateString('pt-BR');
                        const targetStatus = isArtValidation ? 'PRONTO' : 'PRODUÇÃO';
                        
                        const { error } = await supabase.from('content_assets').update({ 
                            status: targetStatus,
                            internal_notes: `APROVADO PELO CLIENTE EM ${now}`
                        }).eq('id', id);
                        
                        if (error) throw error;
                        
                        document.getElementById('main-ui').style.display = 'none';
                        document.getElementById('success-title').innerText = isArtValidation ? 'Tudo Pronto!' : 'Planejamento Aprovado!';
                        document.getElementById('success-message').innerText = isArtValidation ? 'A arte final foi validada com sucesso e já está disponível para publicação.' : 'Excelente. Esta pauta foi enviada para a Execução Operacional.';
                        document.getElementById('success-ui').style.display = 'block';
                        // Forçar recarregamento após 2s para garantir o bloqueio
                        setTimeout(() => window.location.reload(), 2000);
                    } catch (err) {
                        alert('Erro ao processar aprovação: ' + err.message);
                    }
                };

                document.getElementById('btn-reject-action').onclick = () => {
                    document.getElementById('feedback-ui').style.display = 'block';
                };

                document.getElementById('btn-submit-feedback').onclick = async () => {
                    try {
                        const selected = Array.from(document.querySelectorAll('#adjustment-checks input:checked')).map(i => i.value);
                        const note = document.getElementById('feedback-text').value;
                        const fullNote = `REVISÃO SOLICITADA | ITENS: ${selected.join(', ')} | OBS: ${note}`;
                        
                        const newDeadline = new Date();
                        newDeadline.setHours(newDeadline.getHours() + 48); // Mais 48h para revisão
                        
                        const { error } = await supabase.from('content_assets').update({ 
                            status: 'AJUSTE', 
                            internal_notes: fullNote,
                            metadata: {
                                ...c.metadata,
                                approval_deadline: newDeadline.toISOString()
                            }
                        }).eq('id', id);
                        
                        if (error) throw error;

                        document.getElementById('main-ui').style.display = 'none';
                        document.getElementById('success-title').innerText = 'Solicitação Enviada!';
                        document.getElementById('success-message').innerText = 'Recebemos seus apontamentos estratégicos. Vamos ajustar o planejamento conforme as diretrizes enviadas.';
                        document.getElementById('success-ui').style.display = 'block';
                        // Forçar recarregamento após 2s para garantir o bloqueio
                        setTimeout(() => window.location.reload(), 2000);
                    } catch (err) {
                        alert('Erro ao enviar solicitação: ' + err.message);
                    }
                };

            } catch (err) {
                document.getElementById('loading-state').innerText = 'Erro ao carregar.';
            }
        }
        window.onload = load;
    </script>
</body>
</html>
