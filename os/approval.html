<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FluxAI OS™ | Aprovação de Conteúdo</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet" />
    <style>
        :root { --os-primary: #6b7a45; --os-bg: #0a0a0a; --os-surface: #141414; --os-text: #ffffff; --os-border: rgba(255,255,255,0.1); }
        body { background: var(--os-bg); color: var(--os-text); font-family: 'Inter', sans-serif; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .approval-container { width: 100%; max-width: 500px; background: var(--os-surface); border: 1px solid var(--os-border); border-radius: 12px; padding: 30px; box-sizing: border-box; }
        .header { text-align: center; margin-bottom: 30px; }
        .header img { width: 120px; margin-bottom: 15px; }
        .header h1 { font-size: 1.2rem; font-weight: 800; margin: 0; color: var(--os-primary); }
        .header p { font-size: 0.8rem; color: rgba(255,255,255,0.5); margin-top: 5px; }
        
        .content-preview { background: #000; border-radius: 8px; margin-bottom: 25px; overflow: hidden; border: 1px solid var(--os-border); }
        .asset-img { width: 100%; display: block; }
        .caption-box { padding: 20px; border-top: 1px solid var(--os-border); }
        .caption-box h3 { font-size: 0.7rem; text-transform: uppercase; color: var(--os-primary); margin: 0 0 10px 0; letter-spacing: 1px; }
        .caption-box p { font-size: 0.9rem; line-height: 1.6; margin: 0; color: rgba(255,255,255,0.8); white-space: pre-wrap; }

        .actions { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .btn { border: none; padding: 15px; border-radius: 6px; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; font-size: 0.9rem; }
        .btn-approve { background: var(--os-primary); color: #fff; }
        .btn-reject { background: transparent; border: 1px solid #ff4444; color: #ff4444; }
        
        .feedback-area { display: none; margin-top: 20px; width: 100%; }
        .feedback-area textarea { width: 100%; background: #000; border: 1px solid var(--os-border); color: #fff; padding: 15px; border-radius: 6px; box-sizing: border-box; margin-bottom: 15px; }
        
        .success-msg { display: none; text-align: center; padding: 50px 20px; }
        .success-msg i { font-size: 4rem; color: var(--os-primary); margin-bottom: 20px; }
    </style>
</head>
<body>

    <div class="approval-container" id="main-ui">
        <div class="header">
            <h1>FluxAI <span>OS™</span></h1>
            <p>Portal de Aprovação de Conteúdo</p>
        </div>

        <div id="loading-state" style="text-align: center; padding: 40px; opacity: 0.5;">
            <i class="fa-solid fa-spinner fa-spin"></i> Carregando conteúdo...
        </div>

        <div id="content-data" style="display: none;">
            <div class="content-preview">
                <img id="asset-preview" class="asset-img" src="" alt="Preview do Conteúdo" />
                <div class="caption-box">
                    <h3>Legenda Sugerida</h3>
                    <p id="asset-caption"></p>
                </div>
            </div>

            <div class="actions">
                <button class="btn btn-reject" id="btn-reject-action">
                    <i class="fa-solid fa-xmark"></i> AJUSTAR
                </button>
                <button class="btn btn-approve" id="btn-approve-action">
                    <i class="fa-solid fa-check"></i> APROVAR
                </button>
            </div>

            <div class="feedback-area" id="feedback-ui">
                <textarea id="feedback-text" placeholder="O que você gostaria de mudar neste conteúdo?"></textarea>
                <button class="btn btn-approve" style="width: 100%;" id="btn-submit-feedback">ENVIAR SOLICITAÇÃO</button>
            </div>
        </div>
    </div>

    <div class="success-msg" id="success-ui">
        <i class="fa-solid fa-circle-check"></i>
        <h2>Conteúdo Aprovado!</h2>
        <p>Obrigado! Já estamos preparando tudo para a publicação.</p>
    </div>

    <script type="module">
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';

        // Mesma conexão direta para evitar erros de fetch
        const supabaseUrl = "https://mufgwetfhfhhmhowbhjj.supabase.co";
        const supabaseKey = "sb_publishable_Ui_zR38kkGVdTxRUELcRfw_5ahurUs5";
        const supabase = createClient(supabaseUrl, supabaseKey);

        async function load() {
            const params = new URLSearchParams(window.location.search);
            const id = params.get('id');
            if (!id) return;

            const { data: c, error } = await supabase.from('content_assets').select('*').eq('id', id).single();
            
            if (c) {
                document.getElementById('asset-preview').src = c.media_url || 'https://images.unsplash.com/photo-1493612276216-ee3925520721?w=800';
                document.getElementById('asset-caption').innerText = c.caption || 'Sem legenda.';
                document.getElementById('loading-state').style.display = 'none';
                document.getElementById('content-data').style.display = 'block';

                // Actions
                document.getElementById('btn-approve-action').onclick = async () => {
                    await supabase.from('content_assets').update({ status: 'PRONTO' }).eq('id', id);
                    document.getElementById('main-ui').style.display = 'none';
                    document.getElementById('success-ui').style.display = 'block';
                };

                document.getElementById('btn-reject-action').onclick = () => {
                    document.getElementById('feedback-ui').style.display = 'block';
                };

                document.getElementById('btn-submit-feedback').onclick = async () => {
                    const feedback = document.getElementById('feedback-text').value;
                    if (!feedback) return alert('Por favor, descreva o que precisa de ajuste.');
                    
                    await supabase.from('content_assets').update({ 
                        status: 'AJUSTE',
                        internal_notes: 'Feedback do Cliente: ' + feedback 
                    }).eq('id', id);
                    
                    alert('Feedback enviado com sucesso! Vamos trabalhar nos ajustes.');
                    window.close();
                };
            }
        }
        load();
    </script>
</body>
</html>
