name: OWASP ZAP Baseline

on:
  workflow_dispatch:

jobs:
  zap-baseline:
    name: ZAP Baseline Passive Scan
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        target:
          - https://fluxaidigital.com.br/
          - https://fluxaidigital.com.br/os/login

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.15.0
        with:
          target: ${{ matrix.target }}
          allow_issue_writing: false
          cmd_options: '-a -j -m 3 -T 10 -r zap-report.html -w zap-report.md -J zap-report.json'

      - name: Upload ZAP Reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: zap-report-${{ strategy.job-index }}
          path: |
            zap-report.html
            zap-report.md
            zap-report.json
