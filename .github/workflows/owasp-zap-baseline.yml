name: OWASP ZAP Baseline

permissions:
  contents: read

on:
  workflow_dispatch:

jobs:
  zap-baseline:
    name: ZAP Baseline Passive Scan
    runs-on: ubuntu-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    strategy:
      fail-fast: false
      matrix:
        include:
          - target: https://fluxaidigital.com.br/
            slug: root
          - target: https://fluxaidigital.com.br/os/login
            slug: login

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.15.0
        with:
          target: ${{ matrix.target }}
          allow_issue_writing: false
          cmd_options: '-a -j -m 3 -T 10 -r report_html.html -w report_md.md -J report_json.json'

      - name: List generated files
        if: always()
        run: ls -la

      - name: Upload ZAP Reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: zap-report-${{ matrix.slug }}
          path: |
            report_html.html
            report_md.md
            report_json.json
