name: Deploy Edge Functions

on:
  push:
    branches:
      - staging/fluxai-os
    paths:
      - 'supabase/functions/**'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      PROJECT_ID: rmbxeikejzbcfiooylsd

    steps:
      - uses: actions/checkout@v3

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy make-proxy
        run: supabase functions deploy make-proxy --project-ref $PROJECT_ID --no-verify-jwt
