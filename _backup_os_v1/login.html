<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FluxAI OS™ | Login</title>
    <link rel="stylesheet" href="/src/styles/os/interface.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <style>
        body.login-page {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #050505;
        }
        .login-card {
            width: 100%;
            max-width: 400px;
            padding: 50px;
            background: var(--os-sidebar);
            border: 1px solid var(--os-border);
            border-radius: 8px;
            text-align: center;
        }
        .login-header { margin-bottom: 40px; }
        .login-brand { font-weight: 800; font-size: 1.2rem; color: #fff; letter-spacing: 2px; }
        .login-brand span { color: var(--os-primary); }
        .login-form { text-align: left; }
        .form-group { margin-bottom: 25px; }
        .form-group label { display: block; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1.5px; color: var(--os-text-muted); margin-bottom: 10px; }
        .form-control { width: 100%; padding: 15px; background: var(--os-bg); border: 1px solid var(--os-border); border-radius: 4px; color: #fff; font-size: 0.9rem; }
        .form-control:focus { outline: none; border-color: var(--os-primary); }
        .btn-login { width: 100%; padding: 15px; background: var(--os-primary); border: none; color: #fff; font-weight: 700; border-radius: 4px; cursor: pointer; transition: all 0.2s; }
        .btn-login:hover { opacity: 0.9; transform: translateY(-2px); }
        .login-footer { margin-top: 30px; font-size: 0.8rem; color: var(--os-text-muted); }
    </style>

    <!-- FluxAI Tracking -->
    <script>
        window.dataLayer = window.dataLayer || [];
        function trackEvent(eventName, params = {}) {
            const payload = {
                event: eventName,
                page_path: window.location.pathname,
                page_location: window.location.href,
                timestamp: new Date().toISOString(),
                ...params
            };
            window.dataLayer.push(payload);
        }
    </script>
</head>
<body class="os-mode login-page">

    <div class="login-card">
        <div class="login-header">
            <div class="login-brand">
                FLUXAI <span>OS™</span>
            </div>
            <p style="color: var(--os-text-muted); font-size: 0.85rem; margin-top: 10px;">Ambiente Operacional Restrito</p>
        </div>

        <form class="login-form" id="loginForm">
            <div class="form-group">
                <label>Acesso do Operador</label>
                <input type="text" class="form-control" placeholder="ID ou E-mail" required />
            </div>
            <div class="form-group">
                <label>Chave de Acesso</label>
                <input type="password" class="form-control" placeholder="••••••••" required />
            </div>
            <button type="submit" class="btn-login">VALIDAR ACESSO <i class="fa-solid fa-shield-halved"></i></button>
        </form>

        <div class="login-footer">
            <p>Infraestrutura de Inteligência FluxAI Labs v1.0.4</p>
            <a href="../pages/fluxai-os.html" style="color: var(--os-primary); text-decoration: none; display: block; margin-top: 15px;">Solicitar Acesso à Infraestrutura</a>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', (e) => {
            e.preventDefault();
            // Simulação de autenticação
            localStorage.setItem('fluxai_session', 'active_operator_123');
            window.location.href = 'command-center.html';
        });
    </script>
</body>
</html>
