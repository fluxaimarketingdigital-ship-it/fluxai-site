    </style>
    <pattern id="grid" width="120" height="120" patternUnits="userSpaceOnUse">
      <path d="M 120 0 L 0 0 0 120" fill="none" class="grid-line"/>
    </pattern>
  </defs>

  <rect width="1080" height="1440" class="bg"/>
  <rect width="1080" height="1440" fill="url(#grid)" />

